<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIGIFORM Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;overscroll-behavior:none;}
body{background:#070B17;color:#E8EEFF;font-family:'DM Sans',sans-serif;}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:#070B17;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#1E2D55;border-radius:3px;}
@keyframes dg-spin{to{transform:rotate(360deg);}}
@keyframes dg-fin{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes dg-fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes dg-sh{from{background-position:-200%;}to{background-position:200%;}}
.page{animation:dg-fin .42s cubic-bezier(.22,1,.36,1) both;}
.shim{background:linear-gradient(90deg,#0D1426 25%,#1E2D55 50%,#0D1426 75%);background-size:200%;animation:dg-sh 1.5s infinite;}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:scale(.95);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.cy{background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;}
.cy:hover:not(:disabled){box-shadow:0 8px 24px rgba(0,212,255,.4);}
.go{background:linear-gradient(135deg,#FFB800,#FF7A00);color:#070B17;}
.rb{background:rgba(255,80,80,.1);color:#FF5050;border:1px solid rgba(255,80,80,.25)!important;}
.inp{background:#131C35;border:1px solid #1E2D55;border-radius:12px;color:#E8EEFF;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 15px;width:100%;outline:none;transition:border-color .2s;display:block;}
.inp:focus{border-color:#00D4FF;box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.inp::placeholder{color:#3A4A6E;}
textarea.inp{resize:vertical;min-height:80px;}
select.inp{cursor:pointer;-webkit-appearance:none;}
.grad-digi{background:linear-gradient(135deg,#fff 20%,#B0D8FF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.grad-form{background:linear-gradient(135deg,#FFB800,#FF6A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.lbl{font-size:11px;color:#5B6A90;display:block;margin-bottom:5px;font-weight:600;letter-spacing:.04em;}
.section-card{background:#0D1426;border-radius:15px;padding:15px;border:1px solid rgba(255,255,255,.07);margin-bottom:12px;}
</style>
</head>
<body>
<div id="app">
  <div id="toast-area"></div>
  <div id="view"></div>
</div>

<script>
/* ── CONSTANTS ── */
const SB   = "https://rxhjuetoxyjrairroycb.supabase.co";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q";
const TC   = {livre:"#FFB800",formation:"#FF6B35",logiciel:"#00E5A0",audio:"#B04FFF"};
const TYPES= [{id:"all",l:"Tout",e:"🌐"},{id:"livre",l:"Livres",e:"📚"},{id:"formation",l:"Formations",e:"🎬"},{id:"logiciel",l:"Logiciels",e:"💻"},{id:"audio",l:"Audio",e:"🎧"}];
// Buckets à essayer dans l'ordre
const BUCKETS = ["digiform","public","avatars","images","media"];

/* ── STATE ── */
const S = {
  session:null,profile:null,sub:"add",
  products:[],users:[],notifs:[],
  loadingUsers:false,loadingNotifs:false,
  featured:false,imgUploading:false,imgPreview:"",imgUrl:"",
  deleting:null,saving:false,sendingNotif:false,
  addingAdmin:false,
  toast:null,toastTimer:null,
  activeBucket:null  // bucket qui fonctionne
};

/* ── API ── */
const tok = () => S.session?.access_token || ANON;
async function db(path, opts={}) {
  try {
    const r = await fetch(`${SB}/rest/v1/${path}`, {
      ...opts,
      headers: {
        apikey:ANON, Authorization:`Bearer ${tok()}`,
        "Content-Type":"application/json",
        ...(["POST","PATCH","PUT"].includes(opts.method)?{Prefer:"return=representation"}:{}),
        ...(opts.headers||{})
      }
    });
    let data; try{data=await r.json();}catch{}
    return {ok:r.ok, data, status:r.status};
  } catch(e) { return {ok:false,data:null,status:0}; }
}
async function authReq(ep, body) {
  try {
    const r = await fetch(`${SB}/auth/v1/${ep}`,{method:"POST",headers:{"Content-Type":"application/json",apikey:ANON},body:JSON.stringify(body)});
    return await r.json();
  } catch { return {error:"network"}; }
}

/* ── UPLOAD IMAGE — essaie plusieurs buckets ── */
async function uploadImg(file) {
  const ext = (file.name.split(".").pop()||"jpg").toLowerCase();
  const name = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

  // Si on connaît déjà un bucket qui marche, l'utiliser directement
  if(S.activeBucket) {
    return await tryUpload(file, S.activeBucket, name);
  }

  // Sinon essayer tous les buckets
  for(const bucket of BUCKETS) {
    const url = await tryUpload(file, bucket, name);
    if(url) {
      S.activeBucket = bucket;
      showToast(`✅ Bucket '${bucket}' utilisé`);
      return url;
    }
  }
  return null;
}

async function tryUpload(file, bucket, name) {
  try {
    const r = await fetch(`${SB}/storage/v1/object/${bucket}/${name}`, {
      method:"POST",
      headers:{
        Authorization:`Bearer ${tok()}`,
        apikey:ANON,
        "Content-Type":file.type,
        "x-upsert":"true"
      },
      body:file
    });
    if(r.ok || r.status===200) {
      return `${SB}/storage/v1/object/public/${bucket}/${name}`;
    }
    return null;
  } catch { return null; }
}

/* ── HELPERS ── */
const tc = t => TC[t]||"#00D4FF";
const te = t => TYPES.find(x=>x.id===t)?.e||"📦";
const tp = p => Number(p).toLocaleString("fr-FR");
const esc= s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtDate = d => new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const tLogo = (sz=18) => `<span style="font-family:'Syne',sans-serif;font-weight:800;font-size:${sz}px;line-height:1;"><span class="grad-digi">DIGI</span><span class="grad-form">FORM</span></span>`;
const spin = () => `<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#070B17;border-radius:50%;animation:dg-spin .8s linear infinite;"></span>`;

/* ── TOAST ── */
function showToast(msg, type="success") {
  if(S.toastTimer) clearTimeout(S.toastTimer);
  S.toast={msg,type};
  S.toastTimer=setTimeout(()=>{S.toast=null;renderToast();},3500);
  renderToast();
}
function renderToast() {
  const el=document.getElementById("toast-area");if(!el)return;
  if(!S.toast){el.innerHTML="";return;}
  const colors={success:"linear-gradient(135deg,#00E5A0,#00A060)",error:"linear-gradient(135deg,#FF5050,#C00)",warning:"linear-gradient(135deg,#FFB800,#FF7A00)",info:"linear-gradient(135deg,#00D4FF,#0099FF)"};
  const bg=colors[S.toast.type]||colors.info;
  el.innerHTML=`<div style="position:fixed;top:70px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;padding:11px 22px;border-radius:20px;z-index:9999;font-weight:700;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.6);animation:dg-fin .3s ease;white-space:nowrap;max-width:92vw;text-align:center;">${msg}</div>`;
}

/* ── DATA ── */
async function loadProducts() {
  const{ok,data}=await db("products?order=created_at.desc");
  if(ok&&Array.isArray(data)) S.products=data;
}
async function loadUsers() {
  S.loadingUsers=true;
  const{ok,data}=await db("profiles?order=created_at.desc");
  if(ok&&Array.isArray(data)) S.users=data;
  S.loadingUsers=false;
}
async function loadNotifs() {
  S.loadingNotifs=true;
  const{ok,data}=await db("notifications?order=created_at.desc");
  if(ok&&Array.isArray(data)) S.notifs=data;
  S.loadingNotifs=false;
}

/* ── TEMPLATES ── */
function tEmpty(msg,sub="",emoji="📭") {
  return `<div style="display:flex;flex-direction:column;align-items:center;padding:52px 24px;gap:13px;text-align:center;">
    <div style="font-size:50px;animation:dg-fl 3s ease-in-out infinite;">${emoji}</div>
    <div style="font-size:15px;font-weight:600;color:#8899BB;">${esc(msg)}</div>
    ${sub?`<div style="font-size:12px;color:#3A4A6E;line-height:1.6;">${sub}</div>`:""}
  </div>`;
}
function tShim(n=3,h=64) {
  return `<div style="display:flex;flex-direction:column;gap:9px;">${Array.from({length:n},()=>`<div class="shim" style="height:${h}px;border-radius:13px;"></div>`).join("")}</div>`;
}

/* ── LOGIN ── */
function tLogin(err="",busy=false) {

      ${tLogo(30)}
      <div style="font-size:12px;color:#5B6A90;margin-top:6px;letter-spacing:.12em;">PANNEAU ADMINISTRATEUR</div>
    </div>
    <div style="width:100%;max-width:370px;background:#0D1426;border-radius:24px;padding:26px 22px;border:1px solid rgba(255,255,255,.09);">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div><label class="lbl">Email administrateur</label><input id="l-email" class="inp" type="email" placeholder="votre@email.com" autocomplete="email"></div>
        <div><label class="lbl">Mot de passe</label><input id="l-pwd" class="inp" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      </div>
      ${err?`<div style="margin-top:11px;font-size:12px;color:#FF8080;background:rgba(255,80,80,.08);padding:10px 12px;border-radius:10px;line-height:1.55;text-align:center;">${esc(err)}</div>`:""}
      <button id="l-submit" class="btn cy" style="width:100%;padding:15px;border-radius:14px;font-size:15px;margin-top:14px;" ${busy?"disabled":""}>
        ${busy?`${spin()} Vérification…`:"🔓 Accéder au panneau"}
      </button>
    </div>
    <a href="digiform.html" style="color:#5B6A90;font-size:13px;text-decoration:none;margin-top:18px;">← Retour à l'app</a>
  </div>`;
}

/* ── HEADER ── */
function tHeader() {
  return `<div style="background:rgba(7,11,23,.98);border-bottom:1px solid rgba(255,255,255,.07);padding:10px 13px;display:flex;align-items:center;gap:11px;flex-shrink:0;">
    <a href="digiform.html" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:none;cursor:pointer;color:#E8EEFF;font-size:18px;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;">←</a>
    <div style="flex:1;min-width:0;">
      <div style="line-height:1;">${tLogo(17)}<span style="color:#3A4A6E;font-size:12px;font-family:'DM Sans',sans-serif;margin-left:6px;">Admin</span></div>
      <div style="font-size:10px;color:#00D4FF;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(S.session?.user?.email||"")}</div>
    </div>
    <button id="hdr-logout" class="btn rb" style="padding:8px 12px;border-radius:10px;font-size:12px;flex-shrink:0;">🚪</button>
  </div>`;
}

/* ── TABS ── */
function tTabs() {
  const tabs=[{id:"add",l:"➕ Ajouter"},{id:"list",l:"📋 Produits"},{id:"users",l:"👥 Admins"},{id:"notifs",l:"🔔 Notifs"},{id:"sql",l:"⚙️ Setup"}];
  return `<div style="display:flex;gap:5px;overflow-x:auto;padding:9px 12px;flex-shrink:0;background:rgba(7,11,23,.92);border-bottom:1px solid rgba(255,255,255,.04);" id="tabs-bar">
    ${tabs.map(t=>`<button data-sub="${t.id}" class="btn" style="flex-shrink:0;padding:8px 12px;border-radius:10px;font-size:12px;white-space:nowrap;border:none;${S.sub===t.id?"background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;":"background:rgba(255,255,255,.06);color:#E8EEFF;"}">${t.l}</button>`).join("")}
  </div>`;
}

/* ── ADD PRODUCT ── */

  return `<div class="page" style="display:flex;flex-direction:column;gap:13px;">

    <!-- ALERTE BUCKET si problème détecté -->
    <div id="bucket-alert" style="display:none;background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.3);border-radius:12px;padding:13px;font-size:12px;color:#FFB800;line-height:1.8;">

/* ── PRODUCTS LIST ── */
function tProductsList() {
  if(!S.products.length) return tEmpty("Aucun produit publié","Ajoutez des produits via l'onglet ➕ Ajouter","📭");

    ${S.products.map(p=>{
      const c=tc(p.type);

          <div style="font-size:12px;color:#FFB800;font-weight:600;margin-top:2px;">${tp(p.price)} FCFA</div>

/* ── ADMINS & USERS ── */
function tAdmins() {

/* ── SETUP / SQL ── */
const SQL_CODE = `-- DIGIFORM — Configuration complète
-- Copiez et exécutez dans Supabase > SQL Editor

CREATE TABLE IF NOT EXISTS public.profiles (
  id         UUID REFERENCES auth.users(id) ON DELETE CASCADE PRIMARY KEY,
  email      TEXT, full_name TEXT DEFAULT '',
  phone      TEXT DEFAULT '', is_admin BOOLEAN DEFAULT false,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS public.products (
  id               UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title            TEXT NOT NULL, description TEXT DEFAULT '',
  price            NUMERIC NOT NULL DEFAULT 0, type TEXT NOT NULL DEFAULT 'livre',
  image_url        TEXT DEFAULT '', whatsapp_number TEXT DEFAULT '',
  featured         BOOLEAN DEFAULT false, created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS public.notifications (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title TEXT NOT NULL, body TEXT NOT NULL,
  created_by UUID REFERENCES auth.users(id),
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- RLS permissif (ajustez en production)
ALTER TABLE public.profiles      DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.products      DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.notifications DISABLE ROW LEVEL SECURITY;

GRANT ALL ON public.profiles      TO anon, authenticated;
GRANT ALL ON public.products      TO anon, authenticated;
GRANT ALL ON public.notifications TO anon, authenticated;

-- Trigger auto-profil
CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS TRIGGER LANGUAGE plpgsql SECURITY DEFINER AS $$
BEGIN
  INSERT INTO public.profiles (id, email, full_name)
  VALUES (NEW.id, NEW.email, COALESCE(NEW.raw_user_meta_data->>'full_name',''))
  ON CONFLICT (id) DO NOTHING;
  RETURN NEW;
END;
$$;
DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
CREATE TRIGGER on_auth_user_created
  AFTER INSERT ON auth.users FOR EACH ROW
  EXECUTE PROCEDURE public.handle_new_user();

-- DEVENIR ADMIN :
-- UPDATE public.profiles SET is_admin=true WHERE email='votre@email.com';

-- STORAGE : Dashboard > Storage > New bucket
-- Nom: digiform  ✅ Public  > Créer`;

  if(!S.session){el.innerHTML=tLogin();bindLogin();return;}
  el.innerHTML=`<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">
    ${tHeader()}
    ${tTabs()}
    <div id="content" style="flex:1;overflow-y:auto;padding:15px 13px;">
      ${renderSubContent()}
    </div>
  </div>`;

}

function renderSubContent() {
  if(S.sub==="add")    return tAddProduct();
  if(S.sub==="list")   return tProductsList();
  if(S.sub==="users")  return tAdmins();
  if(S.sub==="notifs") return tNotifAdmin();
  if(S.sub==="sql")    return tSqlGuide();
  return "";
}

function renderContent() {
  const el=document.getElementById("content");if(!el)return;
  el.innerHTML=renderSubContent();
  // Update tabs active state
  document.querySelectorAll("[data-sub]").forEach(b=>{
    const active=b.dataset.sub===S.sub;
    b.style.background=active?"linear-gradient(135deg,#00D4FF,#0099FF)":"rgba(255,255,255,.06)";
    b.style.color=active?"#070B17":"#E8EEFF";

}

/* ── BIND LOGIN ── */
function bindLogin() {
  const submit = async () => {
    const email=(document.getElementById("l-email")?.value||"").trim();
    const pwd=document.getElementById("l-pwd")?.value||"";
    if(!email||!pwd){rerender("Remplissez tous les champs");return;}
    rerender("",true);
    const d=await authReq("token?grant_type=password",{email,password:pwd});
    if(d.access_token){
      S.session={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};
      try{localStorage.setItem("dg_adm_sess",JSON.stringify(S.session));}catch{}
      const{ok,data}=await db(`profiles?id=eq.${S.session.user.id}`);
      if(ok&&Array.isArray(data)&&data[0]){
        S.profile=data[0];
        if(!S.profile.is_admin){
          S.session=null;localStorage.removeItem("dg_adm_sess");
          rerender("❌ Accès refusé — ce compte n'est pas administrateur");return;
        }
      }
      await Promise.all([loadProducts(),loadUsers(),loadNotifs()]);
      renderView();
    } else {
      rerender(d.error_description||d.message||"Identifiants incorrects");
    }
  };
  function rerender(err="",busy=false){
    document.getElementById("view").innerHTML=tLogin(err,busy);
    document.getElementById("l-submit")?.addEventListener("click",submit);
    document.getElementById("l-pwd")?.addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
  }
  document.getElementById("l-submit")?.addEventListener("click",submit);
  document.getElementById("l-pwd")?.addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
}

/* ── BIND PANEL ── */
function bindPanel() {
  document.getElementById("hdr-logout")?.addEventListener("click",()=>{
    S.session=null;S.profile=null;S.activeBucket=null;
    localStorage.removeItem("dg_adm_sess");renderView();
  });
  document.querySelectorAll("[data-sub]").forEach(el=>el.addEventListener("click",async()=>{
    S.sub=el.dataset.sub;
    if(S.sub==="users"){S.loadingUsers=true;renderContent();await loadUsers();}
    if(S.sub==="notifs"){S.loadingNotifs=true;renderContent();await loadNotifs();}
    renderContent();
  }));
  bindContent();
}

function bindContent() {
  /* ── ADD PRODUCT ── */
  if(S.sub==="add"){
    document.getElementById("img-zone")?.addEventListener("click",()=>document.getElementById("img-file")?.click());

      const file=e.target.files?.[0];if(!file)return;

        S.imgPreview=ev.target.result;

      reader.readAsDataURL(file);
      S.imgUploading=true;
      const url=await uploadImg(file);
      S.imgUploading=false;

        S.imgUrl=url;S.imgPreview=url;
        const inp=document.getElementById("f-imgurl");if(inp)inp.value=url;

        overlay.innerHTML=`<div style="font-size:13px;color:white;font-weight:600;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:20px;">✅ Image uploadée !</div>`;
        document.getElementById("img-zone")?.appendChild(overlay);
        showToast("✅ Image uploadée avec succès !");
        // Cacher l'alerte bucket si elle était visible
        const alert=document.getElementById("bucket-alert");if(alert)alert.style.display="none";
      } else {
        S.imgPreview="";S.imgUrl="";
        const iz=document.getElementById("img-zone");
        if(iz)iz.innerHTML=`<div style="font-size:30px;margin-bottom:7px;">❌</div><div style="font-size:13px;color:#FF5050;font-weight:600;">Upload échoué</div><div style="font-size:11px;color:#3A4A6E;margin-top:3px;">Vérifiez le bucket storage</div>`;
        showToast("❌ Upload échoué — allez dans l'onglet ⚙️ Setup","error");
        // Montrer l'alerte bucket
        const alert=document.getElementById("bucket-alert");if(alert)alert.style.display="block";
      }
    });
    document.getElementById("retry-bucket")?.addEventListener("click",()=>{
      S.activeBucket=null;
      document.getElementById("img-file")?.click();
    });
    document.getElementById("f-imgurl")?.addEventListener("input",e=>{S.imgUrl=e.target.value;S.imgPreview=e.target.value;});
    document.getElementById("feat-row")?.addEventListener("click",()=>{
      S.featured=!S.featured;
      const tog=document.getElementById("feat-tog");
      if(tog){tog.style.background=S.featured?"linear-gradient(135deg,#00D4FF,#0099FF)":"#1E2D55";tog.firstElementChild.style.left=S.featured?"22px":"2px";}
    });
    document.getElementById("f-save")?.addEventListener("click",async()=>{
      const title=(document.getElementById("f-title")?.value||"").trim();
      const price=document.getElementById("f-price")?.value||"";
      const desc=(document.getElementById("f-desc")?.value||"").trim();
      const type=document.getElementById("f-type")?.value||"livre";
      const image_url=S.imgUrl||(document.getElementById("f-imgurl")?.value||"").trim();
      const wa=(document.getElementById("f-wa")?.value||"").trim();
      if(!title||!price){showToast("⚠️ Titre et prix requis","error");return;}
      S.saving=true;const btn=document.getElementById("f-save");if(btn){btn.disabled=true;btn.innerHTML=`${spin()} Publication…`;}
      const{ok,data,status}=await db("products",{method:"POST",body:JSON.stringify({title,description:desc,price:Number(price),type,image_url,whatsapp_number:wa,featured:S.featured})});
      S.saving=false;
      if(ok){
        S.imgUrl="";S.imgPreview="";S.featured=false;
        await loadProducts();
        showToast("✅ Produit publié !");
        renderContent();
      } else {
        showToast(`❌ Erreur ${status} — allez dans ⚙️ Setup et exécutez le SQL`,"error");
        if(btn){btn.disabled=false;btn.textContent="✅ Publier le produit";}
      }
    });
  }

  /* ── LIST ── */
  if(S.sub==="list"){
    document.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click",async()=>{
      const id=el.dataset.del;S.deleting=id;el.disabled=true;el.innerHTML=spin();
      const{ok}=await db(`products?id=eq.${id}`,{method:"DELETE"});
      S.deleting=null;
      if(ok){await loadProducts();showToast("🗑️ Produit supprimé");renderContent();}
      else{showToast("❌ Erreur suppression","error");el.disabled=false;el.textContent="🗑️";}
    }));

  if(S.sub==="users"){

    document.getElementById("add-admin-btn")?.addEventListener("click",async()=>{
      const email=(document.getElementById("admin-email-inp")?.value||"").trim().toLowerCase();
      if(!email){showToast("⚠️ Email requis","error");return;}
      S.addingAdmin=true;
      const btn=document.getElementById("add-admin-btn");
      if(btn){btn.disabled=true;btn.innerHTML=spin();}
      // Chercher l'utilisateur par email
      const{ok,data}=await db(`profiles?email=eq.${encodeURIComponent(email)}`);

          const r=await db(`profiles?id=eq.${user.id}`,{method:"PATCH",body:JSON.stringify({is_admin:true})});

            showToast("❌ Erreur lors de la mise à jour","error");

        showToast(`❌ Aucun compte trouvé pour ${email}`,"error");
      }
      S.addingAdmin=false;
      if(btn){btn.disabled=false;btn.textContent="✅ Ajouter";}
    });
    // Retirer admin par email
    document.getElementById("remove-admin-btn")?.addEventListener("click",async()=>{
      const email=(document.getElementById("remove-admin-inp")?.value||"").trim().toLowerCase();
      if(!email){showToast("⚠️ Email requis","error");return;}

      if(ok&&Array.isArray(data)&&data.length>0){
        const user=data[0];
        const r=await db(`profiles?id=eq.${user.id}`,{method:"PATCH",body:JSON.stringify({is_admin:false})});
        if(r.ok){
          showToast(`✅ Droits admin retirés pour ${email}`);

      if(btn)btn.innerHTML=`${spin()} Test en cours…`;
      // Créer un blob test (1x1 px PNG)
      const b64="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";
      const bytes=atob(b64);const arr=new Uint8Array(bytes.length);for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
      const file=new File([arr],"test.png",{type:"image/png"});
      S.activeBucket=null;
      const url=await uploadImg(file);
      if(url&&res){
        res.style.display="block";
        res.innerHTML=`<div style="color:#00E5A0;font-weight:600;">✅ Upload réussi ! Bucket: ${S.activeBucket}</div>`;
        showToast(`✅ Bucket '${S.activeBucket}' fonctionne !`);
      } else if(res){
        res.style.display="block";
        res.innerHTML=`<div style="color:#FF5050;">❌ Aucun bucket accessible. Créez le bucket 'digiform' dans Supabase Storage.</div>`;
        showToast("❌ Aucun bucket trouvé","error");
      }
      if(btn)btn.textContent="🧪 Tester l'upload";
    });
  }
}

/* ── INIT ── */
async function init() {
  try {
    const s=JSON.parse(localStorage.getItem("dg_adm_sess")||"null");
    if(s?.access_token){
      S.session=s;
      const{ok,data}=await db(`profiles?id=eq.${s.user.id}`);
      if(ok&&Array.isArray(data)&&data[0]&&data[0].is_admin){
        S.profile=data[0];
        await Promise.all([loadProducts(),loadUsers(),loadNotifs()]);
      } else {
        S.session=null;localStorage.removeItem("dg_adm_sess");
      }
    }
  } catch {S.session=null;}
  renderView();
}

init();
</script>
