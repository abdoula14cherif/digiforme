<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>DIGIFORM · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F8F9FC;--bg2:#FFF;--bg3:#F1F3F8;--bg4:#E4E8F0;
  --border:#D8DCE8;--text:#111827;--text2:#4B5563;--text3:#9CA3AF;
  --blue:#2563EB;--blue2:#1D4ED8;--bl:#EFF6FF;--bb:#BFDBFE;
  --gold:#F59E0B;--gl:#FFFBEB;--gb:#FDE68A;
  --green:#10B981;--grl:#F0FDF4;--grb:#BBF7D0;
  --red:#EF4444;--rl:#FEF2F2;--rb:#FECACA;
  --wa:#25D366;--wa2:#128C7E;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 16px rgba(0,0,0,.1);
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
*::-webkit-scrollbar{width:3px;}*::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}

.logo{font-family:'Syne',sans-serif;font-weight:800;line-height:1;white-space:nowrap;}
.ld{color:#1E40AF;}.lf{color:var(--gold);}

/* ── BUTTONS ── */
.btn{border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.b-bl{background:var(--blue);color:#fff;border-radius:10px;}
.b-bl:hover:not(:disabled){background:var(--blue2);}
.b-rd{background:var(--rl);color:var(--red);border:1px solid var(--rb);border-radius:9px;}
.b-out{background:var(--bg2);color:var(--text);border:1.5px solid var(--border);border-radius:10px;}
.b-wa{background:var(--wa);color:#fff;border-radius:10px;}
.b-wa:hover:not(:disabled){background:var(--wa2);}

/* ── INPUTS ── */
.inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;padding:10px 13px;width:100%;outline:none;transition:all .2s;display:block;}
.inp:focus{border-color:var(--blue);background:var(--bl);}
.inp::placeholder{color:var(--text3);}
textarea.inp{resize:vertical;min-height:75px;}
select.inp{cursor:pointer;-webkit-appearance:none;}
.lbl{font-size:.7rem;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:var(--sh);}
.ct{font-size:.63rem;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ct::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--blue);flex-shrink:0;}

/* ── IMAGE UPLOAD ── */
.upload-area{width:100%;aspect-ratio:16/7;border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;background:var(--bg3);margin-bottom:9px;}
.upload-area:hover{border-color:var(--blue);background:var(--bl);}
.upload-area.uploading{border-style:solid;border-color:var(--blue);pointer-events:none;}
.upload-area.has-img{border-style:solid;border-color:var(--border);}
.upload-ico{font-size:1.8rem;margin-bottom:6px;}
.upload-txt{font-size:.82rem;font-weight:600;color:var(--text2);}
.upload-hint{font-size:.7rem;color:var(--text3);margin-top:2px;}
.upload-preview{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;}
.upload-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.upload-area.has-img:hover .upload-overlay{opacity:1;}
.upload-change{color:#fff;font-size:.82rem;font-weight:700;}
.upload-prog{position:absolute;bottom:0;left:0;height:3px;background:var(--blue);transition:width .3s;border-radius:0 0 10px 10px;}

/* ── TOGGLE ── */
.tog-r{display:flex;align-items:center;gap:10px;background:var(--bg3);padding:11px 13px;border-radius:10px;cursor:pointer;border:1px solid var(--border);user-select:none;}
.tog{width:40px;height:22px;border-radius:11px;background:var(--border);position:relative;transition:background .22s;flex-shrink:0;}
.tog.on{background:var(--blue);}
.tog-k{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .22s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on .tog-k{left:20px;}

/* ── HEADER ADMIN ── */
.ah{background:rgba(255,255,255,.97);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100;box-shadow:var(--sh);}
.ab{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);cursor:pointer;color:var(--text2);font-size:.9rem;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s;flex-shrink:0;}
.ab:hover{border-color:var(--blue);color:var(--blue);}

/* ── TABS ── */
.tabs{display:flex;gap:5px;overflow-x:auto;padding:8px 12px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);}
.tabs::-webkit-scrollbar{height:0;}
.tab{flex-shrink:0;padding:7px 12px;border-radius:9px;font-size:.76rem;background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;white-space:nowrap;transition:all .2s;}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;}

/* ── CONTENT ── */
.ac{flex:1;overflow-y:auto;padding:14px 13px;}
.sub{display:none;}
.sub.on{display:block;animation:rise .3s both;}

/* ── PRODUITS ── */
.pitem{background:var(--bg2);border-radius:12px;padding:11px;border:1px solid var(--border);display:flex;gap:10px;align-items:center;margin-bottom:8px;box-shadow:var(--sh);}
.pthumb{width:48px;height:48px;border-radius:9px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.3rem;overflow:hidden;position:relative;}
.pthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:9px;}

/* ── CONTACTS / MEMBRES ── */
.citem,.uitem{background:var(--bg2);border-radius:12px;padding:11px;border:1px solid var(--border);display:flex;gap:10px;align-items:center;margin-bottom:8px;box-shadow:var(--sh);}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0;}

/* ── GROUPES ── */
.gitem{background:var(--bg2);border-radius:12px;padding:11px;border:1px solid var(--border);display:flex;gap:10px;align-items:center;margin-bottom:8px;box-shadow:var(--sh);}
.gico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}

/* ── NOTIFS HISTORIQUE ── */
.nitem{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:9px;box-shadow:var(--sh);}

/* ── SQL ── */
.sql-wrap{background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px;}
.sql-hdr{padding:9px 12px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
pre.sql-code{padding:12px;font-size:9.5px;color:var(--text2);overflow-x:auto;line-height:1.9;font-family:monospace;margin:0;max-height:320px;white-space:pre-wrap;}

/* ── LOGIN ── */
.lw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.lb{width:100%;max-width:370px;background:var(--bg2);border-radius:18px;padding:22px 18px;border:1px solid var(--border);box-shadow:var(--sh2);}

/* ── MODAL EDIT USER ── */
#uov{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
#uov.open{display:flex;animation:fadeIn .25s;}
#ubox{width:100%;max-width:430px;background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;padding:20px 16px 44px;animation:slideUp .3s cubic-bezier(.22,1,.36,1);max-height:85vh;overflow-y:auto;}
.handle{width:36px;height:4px;border-radius:2px;background:var(--bg4);margin:0 auto 16px;}

/* ── STAT CARD ── */
.stat-c{background:var(--bg2);border-radius:11px;padding:12px 8px;border:1px solid var(--border);text-align:center;box-shadow:var(--sh);}
.stat-n{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;}
.stat-l{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

/* ── SPINNER ── */
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
.sp-d{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}

/* ── TOAST ── */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:999px;z-index:9999;font-weight:700;font-size:.82rem;box-shadow:0 8px 24px rgba(0,0,0,.15);white-space:nowrap;max-width:90vw;text-align:center;display:none;pointer-events:none;}
#toast.show{display:block;animation:rise .3s ease;}
#toast.ok{background:var(--green);color:#fff;}
#toast.err{background:var(--red);color:#fff;}
#toast.inf{background:var(--blue);color:#fff;}
#toast.warn{background:var(--gold);color:#111;}

@media(min-width:430px){#app{box-shadow:0 0 40px rgba(0,0,0,.08);}}
</style>
</head>
<body>
<div id="app">
  <div id="view"></div>
  <div id="uov" onclick="if(event.target===this)fermerUE()">
    <div id="ubox"><div id="ucnt"></div></div>
  </div>
</div>
<div id="toast"></div>

<script>
/* ══════════════════════════════════════
   DIGIFORM · PANNEAU ADMIN
   - Zéro backtick imbriqué
   - Upload image Supabase Storage
   - Produits / Contacts / Membres
   - Notifications / Groupes WA / SQL
══════════════════════════════════════ */

var SB   = 'https://rxhjuetoxyjrairroycb.supabase.co';
var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q';
var BUCKETS = ['digiform', 'images', 'products', 'public'];

/* ── ÉTAT ── */
var S = {
  sess: null, prof: null, sub: 'add',
  products: [], users: [], notifs: [], contacts: [], groups: [], nl: [], nlUnread: 0,
  cFilt: [], gFilt: [], uFilt: 'all',
  feat: false, uea: false, gFeat: false,
  imgUrl: '', activeBucket: '', gCat: '', gQ: '', gOff: 0
};

/* ── UTILS ── */
var toTm;
function toast(msg, t) {
  clearTimeout(toTm); t = t || 'ok';
  var e = document.getElementById('toast'); if (!e) return;
  e.textContent = msg; e.className = 'show ' + t;
  toTm = setTimeout(function() { e.classList.remove('show'); }, 4000);
}
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return Number(n || 0).toLocaleString('fr-FR'); }
function fmtD(d) { return d ? new Date(d).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'}) : ''; }
function ini(n) { return (n || '?').charAt(0).toUpperCase(); }
function tok() { return S.sess && S.sess.access_token ? S.sess.access_token : ANON; }
function spinS() { return '<span class="sp"></span>'; }
function spinD() { return '<span class="sp-d"></span>'; }

/* ── DB ── */
async function dbReq(path, opts) {
  opts = opts || {};
  try {
    var r = await fetch(SB + '/rest/v1/' + path, {
      method: opts.method || 'GET',
      headers: Object.assign({
        'apikey': ANON,
        'Authorization': 'Bearer ' + tok(),
        'Content-Type': 'application/json',
        'Prefer': (opts.method === 'POST' || opts.method === 'PATCH') ? 'return=representation' : ''
      }, opts.headers || {}),
      body: opts.body || undefined
    });
    var d; try { d = await r.json(); } catch(e) { d = null; }
    return { ok: r.ok, d: d, s: r.status };
  } catch(e) { return { ok: false, d: null, s: 0 }; }
}

async function authReq(ep, body) {
  try {
    var r = await fetch(SB + '/auth/v1/' + ep, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch(e) { return { error: 'network' }; }
}

async function fetchAll(path) {
  var PAGE = 1000, res = [], off = 0, done = false;
  while (!done) {
    try {
      var r = await fetch(SB + '/rest/v1/' + path, {
        headers: {
          'apikey': ANON, 'Authorization': 'Bearer ' + tok(),
          'Range-Unit': 'items', 'Range': off + '-' + (off + PAGE - 1),
          'Prefer': 'count=none'
        }
      });
      var d = await r.json();
      if (!Array.isArray(d) || d.length === 0) { done = true; }
      else { res = res.concat(d); if (d.length < PAGE) done = true; else off += PAGE; }
    } catch(e) { done = true; }
  }
  return res;
}

/* ── UPLOAD IMAGE ── */
async function tryUpload(file, bucket, name) {
  try {
    var r = await fetch(SB + '/storage/v1/object/' + bucket + '/' + name, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + tok(),
        'apikey': ANON,
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: file
    });
    if (r.ok || r.status === 200) return SB + '/storage/v1/object/public/' + bucket + '/' + name;
    return null;
  } catch(e) { return null; }
}

async function uploadImage(file) {
  var ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  var name = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
  if (S.activeBucket) return await tryUpload(file, S.activeBucket, name);
  for (var i = 0; i < BUCKETS.length; i++) {
    var url = await tryUpload(file, BUCKETS[i], name);
    if (url) { S.activeBucket = BUCKETS[i]; return url; }
  }
  return null;
}

/* ── LOAD DATA ── */
async function loadP() { var r = await dbReq('products?order=created_at.desc'); if (r.ok && Array.isArray(r.d)) S.products = r.d; }
async function loadU() { var r = await dbReq('profiles?order=created_at.desc'); if (r.ok && Array.isArray(r.d)) S.users = r.d; }
async function loadN() { var r = await dbReq('notifications?order=created_at.desc'); if (r.ok && Array.isArray(r.d)) S.notifs = r.d; }
async function loadC() { S.contacts = await fetchAll('pre_contacts?order=created_at.desc&select=id,full_name,phone,email,profession,country_code,created_at'); filtC(); }
async function loadNL() {
  var r = await dbReq('newsletter?order=created_at.desc&is_read=eq.false');
  var r2 = await dbReq('newsletter?order=created_at.desc');
  S.nlUnread = (r.ok && Array.isArray(r.d)) ? r.d.length : 0;
  S.nl = (r2.ok && Array.isArray(r2.d)) ? r2.d : [];
  renderNLBadge();
}
function renderNLBadge() {
  var tab = document.querySelector('[onclick="setSub(\'newsletter\')"]');
  if (tab && S.nlUnread > 0) {
    tab.innerHTML = 'Messages <span style="background:#EF4444;color:#fff;border-radius:999px;padding:1px 7px;font-size:.65rem;margin-left:4px;font-weight:800;">' + S.nlUnread + '</span>';
  }
}

async function loadG() {
  var path = 'wa_groups?order=created_at.desc&select=id,name,description,category,country,members_count,invite_link,is_featured,is_active';
  var r = await dbReq(path);
  if (r.ok && Array.isArray(r.d)) { S.groups = r.d; filtG(); }
}

/* ── FILTRES CONTACTS ── */
function filtC() {
  var q = (document.getElementById('csrch') ? document.getElementById('csrch').value : '').toLowerCase().trim();
  S.cFilt = S.contacts.filter(function(c) {
    return !q || (c.full_name||'').toLowerCase().indexOf(q) >= 0 || (c.phone||'').indexOf(q) >= 0;
  });
  renderClist();
}

function renderClist() {
  var el = document.getElementById('clist'); if (!el) return;
  var lbl = document.getElementById('clbl');
  if (lbl) lbl.textContent = S.contacts.length + ' contacts · ' + S.cFilt.length + ' résultats';
  var show = S.cFilt.slice(0, 60);
  if (!show.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);">Aucun résultat</div>'; return; }
  var html = '';
  for (var i = 0; i < show.length; i++) {
    var c = show[i];
    html += '<div class="citem">'
      + '<div class="av" style="background:var(--bl);color:var(--blue);">' + esc(ini(c.full_name)) + '</div>'
      + '<div style="flex:1;min-width:0;">'
      +   '<div style="font-size:.83rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(c.full_name || 'Sans nom') + '</div>'
      +   '<div style="font-size:.71rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(c.phone || '') + (c.profession ? ' · ' + esc(c.profession) : '') + (c.country_code ? ' · ' + esc(c.country_code) : '') + '</div>'
      + '</div>'
      + '<button onclick="supC(\'' + c.id + '\')" class="btn b-rd" style="padding:6px 9px;font-size:.75rem;flex-shrink:0;">🗑️</button>'
      + '</div>';
  }
  if (S.cFilt.length > 60) html += '<div style="text-align:center;padding:8px;color:var(--text3);font-size:.75rem;">+' + (S.cFilt.length - 60) + ' autres — affinez la recherche</div>';
  el.innerHTML = html;
}

/* ── FILTRES GROUPES ── */
var CAT_ICO = {marketing:'📣',tech:'💻',ecommerce:'🛒',formation:'🎓',design:'🎨',finance:'💰',sante:'🏥',emploi:'💼',autre:'💬',general:'💬'};
var CAT_COL = {marketing:'#2563EB',tech:'#7C3AED',ecommerce:'#D97706',formation:'#059669',design:'#DB2777',finance:'#0891B2',sante:'#DC2626',emploi:'#EA580C',autre:'#64748B',general:'#64748B'};

function filtG() {
  var q = S.gQ.toLowerCase().trim();
  S.gFilt = S.groups.filter(function(g) {
    var mq = !q || (g.name||'').toLowerCase().indexOf(q) >= 0;
    var mc = !S.gCat || g.category === S.gCat;
    return mq && mc;
  });
  renderGlist();
}

function renderGlist() {
  var el = document.getElementById('glist'); if (!el) return;
  var lbl = document.getElementById('glbl');
  if (lbl) lbl.textContent = S.groups.length + ' groupes · ' + S.gFilt.length + ' résultats';
  if (!S.gFilt.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);">Aucun groupe</div>'; return; }
  var html = '';
  for (var i = 0; i < S.gFilt.length; i++) {
    var g = S.gFilt[i];
    var col = CAT_COL[g.category] || '#64748B';
    var ico = CAT_ICO[g.category] || '💬';
    var hasLink = g.invite_link && g.invite_link.indexOf('whatsapp') >= 0;
    html += '<div class="gitem">'
      + '<div class="gico" style="background:' + col + '18;">' + ico + '</div>'
      + '<div style="flex:1;min-width:0;">'
      +   '<div style="font-size:.83rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(g.name) + '</div>'
      +   '<div style="font-size:.7rem;color:var(--text3);margin-top:1px;">' + (g.members_count || 0) + ' membres · ' + esc(g.country || '') + (g.is_featured ? ' · ⭐ Vedette' : '') + (hasLink ? ' · ✓ Lien actif' : '') + '</div>'
      + '</div>'
      + '<div style="display:flex;gap:5px;flex-shrink:0;">'

async function onImgFile(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Image trop lourde (max 5 Mo)', 'err'); return; }

  var a = document.getElementById('upload-area'); if (!a) return;
  a.className = 'upload-area uploading';
  a.innerHTML = '<div class="upload-ico">⏳</div><div class="upload-txt">Upload en cours…</div><div class="upload-prog" id="upload-prog" style="width:60%;background:var(--blue);"></div>';

  var url = await uploadImage(file);
  if (url) {
    setUploadImg(url);
    toast('Image uploadée !', 'ok');
  } else {
    a.className = 'upload-area';
    a.innerHTML = '<div class="upload-ico">❌</div><div class="upload-txt">Erreur upload</div><div class="upload-hint">Créez le bucket "digiform" dans Supabase Storage</div><div class="upload-prog" style="width:0%;"></div>';
    toast('Erreur : créez le bucket "digiform" dans Supabase Storage', 'err');
  }
  input.value = '';
}

function onImgUrl(val) {
  S.imgUrl = val;
  var a = document.getElementById('upload-area'); if (!a) return;
  if (val && val.startsWith('http')) {
    a.className = 'upload-area has-img';
    a.innerHTML = '<img class="upload-preview" src="' + esc(val) + '" alt="" onerror="this.style.display=\'none\'"/><div class="upload-overlay"><div class="upload-change">🔄 Changer</div></div>';
  } else if (!val) {
    resetUpload();
  }
}

  document.querySelectorAll('[id^="gchip-"]').forEach(function(el) {
    var isOn = (cat === '' && el.id === 'gchip-all') || (cat && el.id === 'gchip-' + cat);
    el.style.background = isOn ? 'var(--wa2)' : 'var(--bg2)';
    el.style.color = isOn ? '#fff' : 'var(--text2)';
    el.style.borderColor = isOn ? 'var(--wa2)' : 'var(--border)';
  });
}
var gSearchTm;
function onGSearch(v) {
  clearTimeout(gSearchTm);
  gSearchTm = setTimeout(function() { S.gQ = v; filtG(); }, 350);
}

async function ajoutG() {
  var name = (document.getElementById('gn-n') ? document.getElementById('gn-n').value : '').trim();
  var link = (document.getElementById('gn-l') ? document.getElementById('gn-l').value : '').trim();
  if (!name) { toast('Nom du groupe requis', 'warn'); return; }
  if (!link || link.indexOf('whatsapp') < 0) { toast('Lien WhatsApp valide requis', 'warn'); return; }
  var btn = document.getElementById('gn-btn'); btn.disabled = true; btn.innerHTML = spinS() + ' Ajout…';
  var body = {
    name: name,
    description: (document.getElementById('gn-d') ? document.getElementById('gn-d').value : '').trim(),
    category: document.getElementById('gn-c') ? document.getElementById('gn-c').value : 'general',
    country: document.getElementById('gn-pa') ? document.getElementById('gn-pa').value : 'OTHER',
    invite_link: link,
    members_count: parseInt(document.getElementById('gn-m') ? document.getElementById('gn-m').value : '0') || 0,
    is_featured: S.gFeat,
    is_active: true
  };
  var r = await dbReq('wa_groups', { method: 'POST', body: JSON.stringify(body) });
  btn.disabled = false; btn.textContent = 'Ajouter le groupe';
  var st = document.getElementById('gn-st');
  if (r.ok) {
    ['gn-n','gn-d','gn-l','gn-m'].forEach(function(id) { var e = document.getElementById(id); if (e) e.value = ''; });
    S.gFeat = false;
    if (st) { st.style.cssText = 'display:block;color:var(--green);background:var(--grl);border:1px solid var(--grb);border-radius:9px;padding:9px;font-size:.78rem;text-align:center;'; st.textContent = 'Groupe ajouté !'; setTimeout(function() { if(st) st.style.display='none'; }, 3000); }
    toast('Groupe ajouté !', 'ok');
    await loadG();
  } else {
    if (st) { st.style.cssText = 'display:block;color:var(--red);background:var(--rl);border:1px solid var(--rb);border-radius:9px;padding:9px;font-size:.78rem;text-align:center;'; st.textContent = 'Erreur ' + r.s; }
    toast('Erreur ' + r.s, 'err');
  }
}

async function supG(id) {
  if (!confirm('Supprimer ce groupe ?')) return;
  var r = await dbReq('wa_groups?id=eq.' + id, { method: 'DELETE' });
  if (r.ok) { toast('Groupe supprimé', 'ok'); S.groups = S.groups.filter(function(g) { return g.id !== id; }); filtG(); }
  else toast('Erreur', 'err');
}

/* SQL */
function copierSQL() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(SQL).then(function() {
      var b = document.getElementById('csql'); if (b) { b.textContent = 'Copié !'; setTimeout(function() { b.textContent = 'Copier'; }, 2500); }
    });

}

/* DÉCO */
function decoAdm() {
  S.sess = null; S.prof = null;
  try { localStorage.removeItem('dg_adm_sess'); } catch(e) {}
  renderView();
}

/* ─── EDIT USER ─── */
function ouvrirUE(id) {
  var u = S.users.find(function(x) { return x.id === id; }); if (!u) return;
  S.uea = u.is_admin;
  document.getElementById('ucnt').innerHTML = '<div class="handle"></div>'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">'
    +   '<div class="av" style="width:44px;height:44px;border-radius:50%;font-size:16px;background:' + (u.is_admin ? 'var(--blue)' : 'var(--bg3)') + ';color:' + (u.is_admin ? '#fff' : 'var(--blue)') + ';">' + ini(u.full_name || u.email || '?') + '</div>'
    +   '<div><div style="font-size:.95rem;font-weight:700;">' + esc(u.full_name || 'Sans nom') + '</div><div style="font-size:.75rem;color:var(--text3);">' + esc(u.email || '') + '</div></div>'
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px;">'
    +   '<div><label class="lbl">Nom complet</label><input id="ue-n" class="inp" value="' + esc(u.full_name || '') + '" placeholder="Nom complet"/></div>'
    +   '<div><label class="lbl">Téléphone</label><input id="ue-p" class="inp" value="' + esc(u.phone || '') + '" placeholder="+225…" type="tel"/></div>'
    +   '<div><label class="lbl">Profession</label><input id="ue-j" class="inp" value="' + esc(u.profession || '') + '" placeholder="Marketing Digital"/></div>'
    +   '<div class="tog-r" onclick="togUEA()">'
    +     '<div class="tog' + (u.is_admin ? ' on' : '') + '" id="ue-tg"><div class="tog-k" style="left:' + (u.is_admin ? '20px' : '2px') + ';"></div></div>'
    +     '<span style="font-size:.83rem;">Administrateur</span>'
    +   '</div>'
    + '</div>'
    + '<div style="display:flex;gap:9px;">'
    +   '<button onclick="sauveUE(\'' + id + '\')" class="btn b-bl" style="flex:1;padding:12px;border-radius:11px;font-size:.88rem;font-weight:700;" id="ue-sv">Sauvegarder</button>'
    +   '<button onclick="fermerUE()" class="btn b-out" style="flex:1;padding:12px;border-radius:11px;font-size:.88rem;">Annuler</button>'
    + '</div>';
  document.getElementById('uov').classList.add('open');
}

function togUEA() {
  S.uea = !S.uea;
  var t = document.getElementById('ue-tg'); if (!t) return;
  t.classList.toggle('on', S.uea);
  t.querySelector('.tog-k').style.left = S.uea ? '20px' : '2px';
}

function fermerUE() { document.getElementById('uov').classList.remove('open'); }

async function sauveUE(id) {
  var name = (document.getElementById('ue-n').value || '').trim();
  var phone = (document.getElementById('ue-p').value || '').trim();
  var prof  = (document.getElementById('ue-j').value || '').trim();
  var btn = document.getElementById('ue-sv'); btn.disabled = true; btn.textContent = 'Sauvegarde…';
  var r = await dbReq('profiles?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ full_name: name, phone: phone, profession: prof, is_admin: S.uea, updated_at: new Date().toISOString() }) });
  if (r.ok) {
    var u = S.users.find(function(x) { return x.id === id; });
    if (u) { u.full_name = name; u.phone = phone; u.profession = prof; u.is_admin = S.uea; }
    fermerUE(); toast('Mis à jour !', 'ok'); renderContent();
  } else { toast('Erreur ' + r.s, 'err'); btn.disabled = false; btn.textContent = 'Sauvegarder'; }
}

/* ─── BIND LOGIN ─── */
function bindLogin() {
  function go() {
    var em = (document.getElementById('l-em') ? document.getElementById('l-em').value : '').trim();
    var pw = document.getElementById('l-pw') ? document.getElementById('l-pw').value : '';
    if (!em || !pw) { rerender('Remplissez tous les champs'); return; }
    rerender('', true);
    authReq('token?grant_type=password', { email: em, password: pw }).then(function(d) {
      if (d.access_token) {
        S.sess = { access_token: d.access_token, refresh_token: d.refresh_token, user: d.user };
        try { localStorage.setItem('dg_adm_sess', JSON.stringify(S.sess)); } catch(e) {}
        dbReq('profiles?id=eq.' + S.sess.user.id).then(function(pr) {
          if (pr.ok && Array.isArray(pr.d) && pr.d[0]) {
            S.prof = pr.d[0];
            if (!S.prof.is_admin) {
              S.sess = null; localStorage.removeItem('dg_adm_sess');
              rerender('Accès refusé — ce compte n\'est pas administrateur');
              return;
            }
          }
          Promise.all([loadP(), loadU(), loadN()]).then(function() { renderView(); });
        });
      } else {
        rerender(d.error_description || d.message || 'Identifiants incorrects');
      }
    });
  }
  function rerender(err, busy) {
    document.getElementById('view').innerHTML = hLogin(err || '', busy || false);
    var btn = document.getElementById('l-btn'); if (btn) btn.addEventListener('click', go);
    var pw = document.getElementById('l-pw'); if (pw) pw.addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });
  }
  var btn = document.getElementById('l-btn'); if (btn) btn.addEventListener('click', go);
  var pw = document.getElementById('l-pw'); if (pw) pw.addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });
}

/* ─── BIND PANEL ─── */
function bindPanel() {}
function bindContent() {
  if (S.sub === 'newsletter') {
    setTimeout(function() {
      document.querySelectorAll('.nl-read').forEach(function(btn) {
        btn.onclick = function() { marquerLuNL(this.getAttribute('data-id')); };
      });
      document.querySelectorAll('.nl-del').forEach(function(btn) {
        btn.onclick = function() { supNL(this.getAttribute('data-id')); };
      });
      document.querySelectorAll('.nl-chip').forEach(function(el) {
        el.onclick = function(){setNLSrc(this.getAttribute('data-v'));};
      });
    }, 50);
  }
  if (S.sub === 'contacts' && S.contacts.length) filtC();
  if (S.sub === 'groups' && S.groups.length) filtG();
}

/* ─── INIT ─── */
async function init() {
  try {
    var s = JSON.parse(localStorage.getItem('dg_adm_sess') || 'null');
    if (s && s.access_token) {
      S.sess = s;
      var pr = await dbReq('profiles?id=eq.' + s.user.id);
      if (pr.ok && Array.isArray(pr.d) && pr.d[0] && pr.d[0].is_admin) {
        S.prof = pr.d[0];
        await Promise.all([loadP(), loadU(), loadN(), loadNL()]);
      } else {
        S.sess = null;
        localStorage.removeItem('dg_adm_sess');
      }
    }
  } catch(e) { S.sess = null; }
  renderView();
}

init();
</script>
