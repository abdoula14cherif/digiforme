<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIGIFORM Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;overscroll-behavior:none;}
body{background:#070B17;color:#E8EEFF;font-family:'DM Sans',sans-serif;}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:#070B17;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#1E2D55;border-radius:3px;}
@keyframes dg-spin{to{transform:rotate(360deg);}}
@keyframes dg-fin{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes dg-fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes dg-sh{from{background-position:-200%;}to{background-position:200%;}}
.page{animation:dg-fin .42s cubic-bezier(.22,1,.36,1) both;}
.shim{background:linear-gradient(90deg,#0D1426 25%,#1E2D55 50%,#0D1426 75%);background-size:200%;animation:dg-sh 1.5s infinite;}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:scale(.95);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.cy{background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;}
.cy:hover:not(:disabled){box-shadow:0 8px 24px rgba(0,212,255,.4);}
.go{background:linear-gradient(135deg,#FFB800,#FF7A00);color:#070B17;}
.rb{background:rgba(255,80,80,.1);color:#FF5050;border:1px solid rgba(255,80,80,.25)!important;}
.inp{background:#131C35;border:1px solid #1E2D55;border-radius:12px;color:#E8EEFF;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 15px;width:100%;outline:none;transition:border-color .2s;display:block;}
.inp:focus{border-color:#00D4FF;box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.inp::placeholder{color:#3A4A6E;}
textarea.inp{resize:vertical;min-height:80px;}
select.inp{cursor:pointer;-webkit-appearance:none;}
.grad-digi{background:linear-gradient(135deg,#fff 20%,#B0D8FF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.grad-form{background:linear-gradient(135deg,#FFB800,#FF6A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.lbl{font-size:11px;color:#5B6A90;display:block;margin-bottom:5px;font-weight:600;letter-spacing:.04em;}
.section-card{background:#0D1426;border-radius:15px;padding:15px;border:1px solid rgba(255,255,255,.07);margin-bottom:12px;}
</style>
</head>
<body>
<div id="app">
  <div id="toast-area"></div>
  <div id="view"></div>
</div>

<script>
/* ═══════════════════════════════════════
   DIGIFORM ADMIN — Version corrigée
   Fix: notifications en boucle réglé
═══════════════════════════════════════ */

const SB   = "https://rxhjuetoxyjrairroycb.supabase.co";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q";
const TC   = {livre:"#FFB800",formation:"#FF6B35",logiciel:"#00E5A0",audio:"#B04FFF"};
const TYPES= [{id:"all",l:"Tout",e:"🌐"},{id:"livre",l:"Livres",e:"📚"},{id:"formation",l:"Formations",e:"🎬"},{id:"logiciel",l:"Logiciels",e:"💻"},{id:"audio",l:"Audio",e:"🎧"}];
const BUCKETS = ["digiform","public","avatars","images","media"];

/* ── STATE ── */
const S = {
  session:null, profile:null, sub:"add",
  products:[], users:[], notifs:[],
  loadingUsers:false, loadingNotifs:false,
  featured:false, imgUploading:false, imgPreview:"", imgUrl:"",
  deleting:null, saving:false,
  sendingNotif:false,   /* ← clé du fix : géré proprement */
  addingAdmin:false,
  activeBucket:null
};

/* ── API ── */
const tok = () => S.session?.access_token || ANON;

async function db(path, opts={}) {
  try {
    const r = await fetch(`${SB}/rest/v1/${path}`, {
      ...opts,
      headers: {
        apikey: ANON,
        Authorization: `Bearer ${tok()}`,
        "Content-Type": "application/json",
        ...(["POST","PATCH","PUT"].includes(opts.method) ? {Prefer:"return=representation"} : {}),
        ...(opts.headers || {})
      }
    });
    let data;
    try { data = await r.json(); } catch {}
    return { ok: r.ok, data, status: r.status };
  } catch(e) {
    console.error("db error:", e);
    return { ok: false, data: null, status: 0 };
  }
}

async function authReq(ep, body) {
  try {
    const r = await fetch(`${SB}/auth/v1/${ep}`, {
      method: "POST",
      headers: {"Content-Type":"application/json", apikey: ANON},
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch { return {error:"network"}; }
}

/* ── IMAGE UPLOAD ── */
async function uploadImg(file) {
  const ext  = (file.name.split(".").pop() || "jpg").toLowerCase();
  const name = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  if (S.activeBucket) return await tryUpload(file, S.activeBucket, name);
  for (const bucket of BUCKETS) {
    const url = await tryUpload(file, bucket, name);
    if (url) { S.activeBucket = bucket; return url; }
  }
  return null;
}

async function tryUpload(file, bucket, name) {
  try {
    const r = await fetch(`${SB}/storage/v1/object/${bucket}/${name}`, {
      method: "POST",
      headers: {Authorization:`Bearer ${tok()}`, apikey:ANON, "Content-Type":file.type, "x-upsert":"true"},
      body: file
    });
    if (r.ok || r.status === 200)
      return `${SB}/storage/v1/object/public/${bucket}/${name}`;
    return null;
  } catch { return null; }
}

/* ── HELPERS ── */
const tc      = t => TC[t] || "#00D4FF";
const te      = t => TYPES.find(x => x.id === t)?.e || "📦";
const tp      = p => Number(p).toLocaleString("fr-FR");
const esc     = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtDate = d => new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const tLogo   = (sz=18) => `<span style="font-family:'Syne',sans-serif;font-weight:800;font-size:${sz}px;line-height:1;"><span class="grad-digi">DIGI</span><span class="grad-form">FORM</span></span>`;
const spin    = () => `<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.25);border-top-color:#070B17;border-radius:50%;animation:dg-spin .8s linear infinite;vertical-align:middle;"></span>`;

/* ── TOAST ── */
let _toastTm;
function showToast(msg, type="success") {
  clearTimeout(_toastTm);
  const colors = {
    success:"linear-gradient(135deg,#00E5A0,#00A060)",
    error:  "linear-gradient(135deg,#FF5050,#C00)",
    warning:"linear-gradient(135deg,#FFB800,#FF7A00)",
    info:   "linear-gradient(135deg,#00D4FF,#0099FF)"
  };
  const el = document.getElementById("toast-area");
  if (!el) return;
  el.innerHTML = `<div style="position:fixed;top:70px;left:50%;transform:translateX(-50%);background:${colors[type]||colors.info};color:#fff;padding:11px 22px;border-radius:20px;z-index:9999;font-weight:700;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.6);animation:dg-fin .3s ease;white-space:nowrap;max-width:92vw;text-align:center;">${msg}</div>`;
  _toastTm = setTimeout(() => { el.innerHTML=""; }, 3500);
}

/* ── DATA LOADERS ── */
async function loadProducts() {
  const {ok,data} = await db("products?order=created_at.desc");
  if (ok && Array.isArray(data)) S.products = data;
}
async function loadUsers() {
  S.loadingUsers = true;
  const {ok,data} = await db("profiles?order=created_at.desc");
  if (ok && Array.isArray(data)) S.users = data;
  S.loadingUsers = false;
}
async function loadNotifs() {
  S.loadingNotifs = true;
  const {ok,data} = await db("notifications?order=created_at.desc");
  if (ok && Array.isArray(data)) S.notifs = data;
  S.loadingNotifs = false;
}

/* ── EMPTY / SHIM ── */
function tEmpty(msg, sub="", emoji="📭") {
  return `<div style="display:flex;flex-direction:column;align-items:center;padding:52px 24px;gap:13px;text-align:center;">
    <div style="font-size:50px;animation:dg-fl 3s ease-in-out infinite;">${emoji}</div>
    <div style="font-size:15px;font-weight:600;color:#8899BB;">${esc(msg)}</div>
    ${sub ? `<div style="font-size:12px;color:#3A4A6E;line-height:1.6;">${sub}</div>` : ""}
  </div>`;
}
function tShim(n=3, h=64) {
  return `<div style="display:flex;flex-direction:column;gap:9px;">
    ${Array.from({length:n}, () => `<div class="shim" style="height:${h}px;border-radius:13px;"></div>`).join("")}
  </div>`;
}

/* ════════════════════════════════

════════════════════════════════ */

/* ── PRODUCTS LIST ── */

const SQL_FIX_NOTIFS = `-- ============================================
-- FIX NOTIFICATIONS — à exécuter si l'envoi
-- tourne en boucle ou retourne une erreur
-- ============================================

-- Désactiver RLS sur notifications
ALTER TABLE public.notifications DISABLE ROW LEVEL SECURITY;

-- Accès total
GRANT ALL ON public.notifications TO anon, authenticated;

-- Optionnel : vider les anciennes policies
DROP POLICY IF EXISTS "notifs_select" ON public.notifications;
DROP POLICY IF EXISTS "notifs_insert" ON public.notifications;
DROP POLICY IF EXISTS "notifs_all"    ON public.notifications;`;

const SQL_MAIN = `-- ================================================
--  DIGIFORM — SQL COMPLET
--  Supabase > SQL Editor > Coller > Exécuter
-- ================================================

CREATE TABLE IF NOT EXISTS public.profiles (
  id         UUID REFERENCES auth.users(id) ON DELETE CASCADE PRIMARY KEY,
  email      TEXT DEFAULT '',
  full_name  TEXT DEFAULT '',
  phone      TEXT DEFAULT '',
  is_admin   BOOLEAN DEFAULT false,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  updated_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS public.products (
  id              UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title           TEXT NOT NULL,
  description     TEXT DEFAULT '',
  price           NUMERIC NOT NULL DEFAULT 0,
  type            TEXT NOT NULL DEFAULT 'livre',
  image_url       TEXT DEFAULT '',
  whatsapp_number TEXT DEFAULT '',
  featured        BOOLEAN DEFAULT false,
  created_at      TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS public.notifications (
  id         UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title      TEXT NOT NULL,
  body       TEXT NOT NULL,
  created_by UUID REFERENCES auth.users(id) ON DELETE SET NULL,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS public.notification_reads (
  id              UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id         UUID REFERENCES auth.users(id) ON DELETE CASCADE,
  notification_id UUID REFERENCES public.notifications(id) ON DELETE CASCADE,
  read_at         TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(user_id, notification_id)
);

-- RLS profiles
ALTER TABLE public.profiles ENABLE ROW LEVEL SECURITY;
CREATE POLICY "profiles_select" ON public.profiles FOR SELECT USING (true);
CREATE POLICY "profiles_insert" ON public.profiles FOR INSERT WITH CHECK (auth.uid() = id);
CREATE POLICY "profiles_update" ON public.profiles FOR UPDATE
  USING (auth.uid()=id OR EXISTS(SELECT 1 FROM public.profiles m WHERE m.id=auth.uid() AND m.is_admin=true))
  WITH CHECK (auth.uid()=id OR EXISTS(SELECT 1 FROM public.profiles m WHERE m.id=auth.uid() AND m.is_admin=true));

-- Notifications : accès libre (pas de RLS)
ALTER TABLE public.notifications      DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.notification_reads DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.products           DISABLE ROW LEVEL SECURITY;

GRANT ALL ON public.profiles           TO anon, authenticated;
GRANT ALL ON public.products           TO anon, authenticated;
GRANT ALL ON public.notifications      TO anon, authenticated;
GRANT ALL ON public.notification_reads TO anon, authenticated;

-- Trigger auto-profil
CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS TRIGGER LANGUAGE plpgsql SECURITY DEFINER AS $$
BEGIN
  INSERT INTO public.profiles (id, email, full_name)
  VALUES (NEW.id, NEW.email, COALESCE(NEW.raw_user_meta_data->>'full_name',''))
  ON CONFLICT (id) DO UPDATE SET email = EXCLUDED.email;
  RETURN NEW;
END;
$$;
DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
CREATE TRIGGER on_auth_user_created
  AFTER INSERT ON auth.users FOR EACH ROW
  EXECUTE PROCEDURE public.handle_new_user();

-- Storage bucket
INSERT INTO storage.buckets (id,name,public,file_size_limit,allowed_mime_types)
VALUES ('digiform','digiform',true,5242880,
  ARRAY['image/jpeg','image/png','image/webp','image/gif','image/svg+xml'])
ON CONFLICT (id) DO UPDATE SET public=true;

DROP POLICY IF EXISTS "storage_select" ON storage.objects;
DROP POLICY IF EXISTS "storage_insert" ON storage.objects;
DROP POLICY IF EXISTS "storage_delete" ON storage.objects;
CREATE POLICY "storage_select" ON storage.objects FOR SELECT USING (bucket_id='digiform');
CREATE POLICY "storage_insert" ON storage.objects FOR INSERT WITH CHECK (bucket_id='digiform');
CREATE POLICY "storage_delete" ON storage.objects FOR DELETE USING (bucket_id='digiform');

-- ================================================

--   WHERE email='votre@email.com';
-- ================================================`;

/* ════════════════════════════════
   BIND LOGIN
════════════════════════════════ */
function bindLogin() {
  const doLogin = async () => {
    const email = (document.getElementById("l-email")?.value || "").trim();
    const pwd   = document.getElementById("l-pwd")?.value || "";
    if (!email || !pwd) { rerender("Remplissez tous les champs"); return; }
    rerender("", true);
    const d = await authReq("token?grant_type=password", {email, password:pwd});
    if (d.access_token) {
      S.session = {access_token:d.access_token, refresh_token:d.refresh_token, user:d.user};
      try { localStorage.setItem("dg_adm_sess", JSON.stringify(S.session)); } catch {}
      const {ok,data} = await db(`profiles?id=eq.${S.session.user.id}`);
      if (ok && Array.isArray(data) && data[0]) {
        S.profile = data[0];
        if (!S.profile.is_admin) {
          S.session = null; localStorage.removeItem("dg_adm_sess");
          rerender("❌ Accès refusé — ce compte n'est pas administrateur"); return;
        }
      }
      await Promise.all([loadProducts(), loadUsers(), loadNotifs()]);
      renderView();
    } else {
      rerender(d.error_description || d.message || "Identifiants incorrects");
    }
  };
  function rerender(err="", busy=false) {
    document.getElementById("view").innerHTML = tLogin(err, busy);
    document.getElementById("l-submit")?.addEventListener("click", doLogin);
    document.getElementById("l-pwd")?.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
  }
  document.getElementById("l-submit")?.addEventListener("click", doLogin);
  document.getElementById("l-pwd")?.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
}

function bindPanel() {
  document.getElementById("hdr-logout")?.addEventListener("click", () => {
    S.session = null; S.profile = null; S.activeBucket = null;
    localStorage.removeItem("dg_adm_sess");
    renderView();
  });
  document.querySelectorAll("[data-sub]").forEach(el => {
    el.addEventListener("click", async () => {
      S.sub = el.dataset.sub;
      if (S.sub === "users")  { S.loadingUsers=true;  renderContent(); await loadUsers(); }
      if (S.sub === "notifs") { S.loadingNotifs=true; renderContent(); await loadNotifs(); }
      renderContent();
    });
  });
  bindContent();
}

function bindContent() {

  /* ── ADD PRODUCT ── */
  if (S.sub === "add") {
    document.getElementById("img-zone")?.addEventListener("click", () =>
      document.getElementById("img-file")?.click()
    );
    document.getElementById("img-file")?.addEventListener("change", async e => {
      const file = e.target.files?.[0]; if (!file) return;
      // Aperçu local immédiat
      const reader = new FileReader();
      reader.onload = ev => {
        const iz = document.getElementById("img-zone"); if (!iz) return;
        S.imgPreview = ev.target.result;
        iz.innerHTML = `<img src="${ev.target.result}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          <div style="position:absolute;inset:0;background:rgba(7,11,23,.55);display:flex;align-items:center;justify-content:center;">
            <div style="font-size:13px;color:white;font-weight:600;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:20px;">⏳ Upload…</div>
          </div>`;
      };
      reader.readAsDataURL(file);
      S.imgUploading = true;
      const url = await uploadImg(file);
      S.imgUploading = false;
      const iz = document.getElementById("img-zone");
      if (url) {
        S.imgUrl = url; S.imgPreview = url;
        const inp = document.getElementById("f-imgurl"); if(inp) inp.value = url;
        if (iz) iz.innerHTML = `<img src="${url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
          <div style="position:absolute;inset:0;background:rgba(7,11,23,.55);display:flex;align-items:center;justify-content:center;">
            <div style="font-size:13px;color:white;font-weight:600;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:20px;">✅ Uploadée — Cliquer pour changer</div>
          </div>`;
        showToast("✅ Image uploadée !");
        const alert = document.getElementById("bucket-alert"); if(alert) alert.style.display="none";
      } else {
        S.imgPreview = ""; S.imgUrl = "";
        if (iz) iz.innerHTML = `<div style="font-size:30px;margin-bottom:7px;">❌</div><div style="font-size:13px;color:#FF5050;font-weight:600;">Upload échoué</div><div style="font-size:11px;color:#3A4A6E;margin-top:3px;">Vérifiez le bucket dans ⚙️ Setup</div>`;
        showToast("❌ Upload échoué — voir ⚙️ Setup","error");
        const alert = document.getElementById("bucket-alert"); if(alert) alert.style.display="block";
      }
    });
    document.getElementById("retry-bucket")?.addEventListener("click", () => {
      S.activeBucket = null;
      document.getElementById("img-file")?.click();
    });
    document.getElementById("f-imgurl")?.addEventListener("input", e => {
      S.imgUrl = e.target.value; S.imgPreview = e.target.value;
    });
    document.getElementById("feat-row")?.addEventListener("click", () => {
      S.featured = !S.featured;
      const tog = document.getElementById("feat-tog"); if (!tog) return;
      tog.style.background = S.featured ? "linear-gradient(135deg,#00D4FF,#0099FF)" : "#1E2D55";
      tog.firstElementChild.style.left = S.featured ? "22px" : "2px";
    });
    document.getElementById("f-save")?.addEventListener("click", async () => {
      const title = (document.getElementById("f-title")?.value || "").trim();
      const price = document.getElementById("f-price")?.value || "";
      if (!title || !price) { showToast("⚠️ Titre et prix requis","error"); return; }
      const btn = document.getElementById("f-save");
      S.saving = true; if(btn){btn.disabled=true; btn.innerHTML=`${spin()} Publication…`;}
      const payload = {
        title,
        description: (document.getElementById("f-desc")?.value||"").trim(),
        price: Number(price),
        type: document.getElementById("f-type")?.value || "livre",
        image_url: S.imgUrl || (document.getElementById("f-imgurl")?.value||"").trim(),
        whatsapp_number: (document.getElementById("f-wa")?.value||"").trim(),
        featured: S.featured
      };
      const {ok,status} = await db("products", {method:"POST", body:JSON.stringify(payload)});
      S.saving = false;
      if (ok) {
        S.imgUrl=""; S.imgPreview=""; S.featured=false;
        await loadProducts();
        showToast("✅ Produit publié !");
        renderContent();
      } else {
        showToast(`❌ Erreur ${status} — allez dans ⚙️ Setup et exécutez le SQL`, "error");
        if(btn){btn.disabled=false; btn.textContent="✅ Publier le produit";}
      }
    });
  }

  /* ── PRODUCTS LIST ── */
  if (S.sub === "list") {
    document.querySelectorAll("[data-del]").forEach(el => {
      el.addEventListener("click", async () => {
        const id = el.dataset.del;
        S.deleting = id; el.disabled=true; el.innerHTML=spin();
        const {ok} = await db(`products?id=eq.${id}`, {method:"DELETE"});
        S.deleting = null;
        if (ok) { await loadProducts(); showToast("🗑️ Produit supprimé"); renderContent(); }
        else { showToast("❌ Erreur suppression","error"); el.disabled=false; el.textContent="🗑️"; }
      });
    });
  }

  /* ── USERS / ADMINS ── */
  if (S.sub === "users") {
    // Ajouter admin par email
    document.getElementById("add-admin-btn")?.addEventListener("click", async () => {
      const email = (document.getElementById("admin-email-inp")?.value||"").trim().toLowerCase();
      if (!email) { showToast("⚠️ Email requis","error"); return; }
      S.addingAdmin = true;
      const btn = document.getElementById("add-admin-btn");
      if(btn){btn.disabled=true; btn.innerHTML=spin();}
      const {ok,data} = await db(`profiles?email=eq.${encodeURIComponent(email)}`);
      if (ok && Array.isArray(data) && data.length > 0) {
        const user = data[0];
        if (user.is_admin) {
          showToast("ℹ️ Déjà administrateur","warning");
        } else {
          const r = await db(`profiles?id=eq.${user.id}`, {method:"PATCH", body:JSON.stringify({is_admin:true})});
          if (r.ok) {
            showToast(`✅ ${email} est maintenant administrateur !`);
            const inp = document.getElementById("admin-email-inp"); if(inp) inp.value="";
            await loadUsers(); S.addingAdmin=false; renderContent(); return;
          } else { showToast("❌ Erreur mise à jour","error"); }
        }
      } else { showToast(`❌ Aucun compte trouvé pour ${email}`,"error"); }
      S.addingAdmin = false;
      if(btn){btn.disabled=false; btn.textContent="✅ Ajouter";}
    });
    // Retirer admin par email
    document.getElementById("remove-admin-btn")?.addEventListener("click", async () => {
      const email = (document.getElementById("remove-admin-inp")?.value||"").trim().toLowerCase();
      if (!email) { showToast("⚠️ Email requis","error"); return; }
      if (email === S.session?.user?.email) { showToast("❌ Vous ne pouvez pas vous retirer","error"); return; }
      const {ok,data} = await db(`profiles?email=eq.${encodeURIComponent(email)}`);
      if (ok && Array.isArray(data) && data.length > 0) {
        const r = await db(`profiles?id=eq.${data[0].id}`, {method:"PATCH", body:JSON.stringify({is_admin:false})});
        if (r.ok) {
          showToast(`✅ Droits admin retirés pour ${email}`);
          const inp = document.getElementById("remove-admin-inp"); if(inp) inp.value="";
          await loadUsers(); renderContent();
        } else { showToast("❌ Erreur","error"); }
      } else { showToast(`❌ Aucun compte trouvé pour ${email}`,"error"); }
    });
    // Toggle admin via liste
    document.querySelectorAll("[data-toggle-admin]").forEach(el => {
      el.addEventListener("click", async () => {
        const uid     = el.dataset.toggleAdmin;
        const isAdmin = el.dataset.isAdmin === "1";
        el.disabled=true; el.innerHTML=spin();
        const {ok} = await db(`profiles?id=eq.${uid}`, {method:"PATCH", body:JSON.stringify({is_admin:!isAdmin})});
        if (ok) {
          const u = S.users.find(x => x.id===uid); if(u) u.is_admin=!isAdmin;
          showToast("✅ Rôle mis à jour"); renderContent();
        } else {
          showToast("❌ Erreur","error"); el.disabled=false; el.textContent=isAdmin?"– Admin":"+ Admin";
        }
      });
    });
  }

  /* ════════════════════════════════
     ✅ FIX NOTIFICATIONS — plus de boucle
  ════════════════════════════════ */
  if (S.sub === "notifs") {
    const btn    = document.getElementById("n-send");
    const status = document.getElementById("n-status");

    const resetBtn = () => {
      if (btn) { btn.disabled=false; btn.innerHTML="📣 Envoyer à tous"; }
      S.sendingNotif = false;
    };

    const setStatus = (msg, color) => {
      if (!status) return;
      status.style.display   = "block";
      status.style.color     = color;
      status.style.background= color==="#00E5A0"?"rgba(0,229,160,.08)":"rgba(255,80,80,.08)";
      status.style.border    = `1px solid ${color}33`;
      status.textContent     = msg;
    };

    btn?.addEventListener("click", async () => {
      // Éviter double-clic
      if (S.sendingNotif) return;

      const title = (document.getElementById("n-title")?.value||"").trim();
      const body  = (document.getElementById("n-body")?.value||"").trim();

      if (!title || !body) { showToast("⚠️ Titre et message requis","error"); return; }

      // Verrouiller
      S.sendingNotif = true;
      if (btn) { btn.disabled=true; btn.innerHTML=`${spin()} Envoi en cours…`; }
      if (status) status.style.display="none";

      let ok=false, resStatus=0, resData=null;

      try {
        const res = await db("notifications", {
          method: "POST",
          body: JSON.stringify({
            title,
            body,
            created_by: S.session?.user?.id || null
          })
        });
        ok        = res.ok;
        resStatus = res.status;
        resData   = res.data;
      } catch(e) {
        console.error("Notif send error:", e);
        ok = false; resStatus = 0;
      }

      if (ok) {
        // ✅ Succès
        const tInp = document.getElementById("n-title");
        const bInp = document.getElementById("n-body");
        if (tInp) tInp.value = "";
        if (bInp) bInp.value = "";
        setStatus("✅ Notification envoyée à tous les utilisateurs !", "#00E5A0");
        showToast("✅ Notification envoyée !");
        await loadNotifs();
        renderContent();   // re-render met à jour l'historique + reset btn
      } else {
        // ❌ Erreur — reset immédiat, plus de boucle
        console.error(`Notif error ${resStatus}:`, resData);
        const errMsg = resStatus === 0
          ? "Erreur réseau — vérifiez votre connexion"
          : resStatus === 403 || resStatus === 401
            ? `Erreur ${resStatus} — exécutez le SQL Fix dans ⚙️ Setup`
            : `Erreur ${resStatus} — vérifiez la table notifications`;
        setStatus(`❌ ${errMsg}`, "#FF5050");
        showToast(`❌ ${errMsg}`, "error");
        resetBtn();
      }
    });
  }

  /* ── SQL / SETUP ── */
  if (S.sub === "sql") {
    document.getElementById("copy-sql")?.addEventListener("click", () => {
      navigator.clipboard?.writeText(SQL_MAIN).then(() => {
        const btn = document.getElementById("copy-sql");
        if (btn) { btn.textContent="✅ Copié !"; setTimeout(()=>btn.textContent="📋 Copier",2500); }
      });
    });
    document.getElementById("copy-fix")?.addEventListener("click", () => {
      navigator.clipboard?.writeText(SQL_FIX_NOTIFS).then(() => {
        const btn = document.getElementById("copy-fix");
        if (btn) { btn.textContent="✅ Copié !"; setTimeout(()=>btn.textContent="📋 Copier le Fix",2500); }
      });
    });
    document.getElementById("test-upload-btn")?.addEventListener("click", async () => {
      const btn = document.getElementById("test-upload-btn");
      const res = document.getElementById("test-result");
      if (btn) { btn.disabled=true; btn.innerHTML=`${spin()} Test…`; }
      // PNG 1×1px
      const b64 = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";
      const bytes = atob(b64); const arr = new Uint8Array(bytes.length);
      for (let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
      const file = new File([arr],"test.png",{type:"image/png"});
      S.activeBucket = null;
      const url = await uploadImg(file);
      if (url && res) {
        res.style.display="block";
        res.innerHTML=`<div style="color:#00E5A0;font-weight:600;padding:8px;background:rgba(0,229,160,.08);border-radius:8px;">✅ Bucket '${S.activeBucket}' fonctionne !</div>`;
        showToast(`✅ Bucket '${S.activeBucket}' OK`);
      } else if (res) {
        res.style.display="block";
        res.innerHTML=`<div style="color:#FF5050;font-weight:600;padding:8px;background:rgba(255,80,80,.08);border-radius:8px;">❌ Aucun bucket accessible. Créez le bucket 'digiform' dans Supabase Storage (Public).</div>`;
        showToast("❌ Aucun bucket trouvé","error");
      }
      if (btn) { btn.disabled=false; btn.textContent="🧪 Tester l'upload"; }
    });
  }
}

/* ════════════════════════════════
   INIT
════════════════════════════════ */
async function init() {
  try {
    const s = JSON.parse(localStorage.getItem("dg_adm_sess") || "null");
    if (s?.access_token) {
      S.session = s;
      const {ok,data} = await db(`profiles?id=eq.${s.user.id}`);
      if (ok && Array.isArray(data) && data[0] && data[0].is_admin) {
        S.profile = data[0];
        await Promise.all([loadProducts(), loadUsers(), loadNotifs()]);
      } else {
        S.session = null; localStorage.removeItem("dg_adm_sess");
      }
    }
  } catch { S.session=null; }
  renderView();
}

init();
</script>
