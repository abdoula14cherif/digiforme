<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>DIGIFORM · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F7FA;--bg2:#FFFFFF;--bg3:#F0F2F7;--bg4:#E2E6EF;
  --border:#D1D9E6;--text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --blue:#2563EB;--blue2:#1D4ED8;--blue-light:#EFF6FF;--blue-border:#BFDBFE;
  --gold:#D97706;--gold-bg:#FFFBEB;--gold-border:#FDE68A;
  --green:#059669;--green-bg:#ECFDF5;--green-border:#A7F3D0;
  --red:#DC2626;--red-bg:#FEF2F2;--red-border:#FECACA;
  --sh:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.1);
  --sh2:0 4px 6px rgba(0,0,0,.07);
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes shimmer{from{background-position:-200%;}to{background-position:200%;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}

.logo-brand{font-family:'Syne',sans-serif;font-weight:800;line-height:1;white-space:nowrap;display:inline-flex;}
.ld{background:linear-gradient(135deg,#1E3A8A,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.lf{background:linear-gradient(135deg,#D97706,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:hover:not(:disabled){transform:translateY(-1px);}
.btn:active:not(:disabled){transform:scale(.97);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
.btn-blue{background:var(--blue);color:#fff;border-radius:10px;}
.btn-blue:hover:not(:disabled){background:var(--blue2);}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:10px;}
.btn-outline{background:var(--bg2);color:var(--text);border:1.5px solid var(--border);border-radius:10px;}
.inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;width:100%;outline:none;transition:all .2s;display:block;}
.inp:focus{border-color:var(--blue);background:var(--blue-light);}
.inp::placeholder{color:var(--text3);}
textarea.inp{resize:vertical;min-height:80px;}
select.inp{cursor:pointer;-webkit-appearance:none;}
.lbl{font-size:.68rem;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.03em;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:var(--sh);}

/* HEADER */
.adm-hdr{background:rgba(255,255,255,.97);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:11px;flex-shrink:0;position:sticky;top:0;z-index:100;box-shadow:var(--sh);}
.adm-back{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border);cursor:pointer;color:var(--text2);font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s;}
.adm-back:hover{border-color:var(--blue);color:var(--blue);}
.adm-email{font-size:.7rem;color:var(--blue);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* TABS */
.adm-tabs{display:flex;gap:4px;overflow-x:auto;padding:8px 12px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);}
.adm-tabs::-webkit-scrollbar{height:0;}
.adm-tab{flex-shrink:0;padding:7px 12px;border-radius:9px;font-size:.78rem;background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;transition:all .2s;}
.adm-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;}

/* CONTENT */
.adm-content{flex:1;overflow-y:auto;padding:15px 13px;}
.adm-sub{display:none;animation:rise .35s ease both;}
.adm-sub.active{display:block;}

/* PRODUCT ITEMS */
.pitem{background:var(--bg2);border-radius:12px;padding:11px;border:1px solid var(--border);display:flex;gap:10px;align-items:center;margin-bottom:8px;box-shadow:var(--sh);}
.pthumb{width:48px;height:48px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background-size:cover;background-position:center;}

/* CONTACT ITEMS */
.citem{background:var(--bg2);border-radius:12px;padding:11px;border:1px solid var(--border);display:flex;gap:10px;align-items:center;margin-bottom:8px;box-shadow:var(--sh);}
.cav{width:36px;height:36px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0;}

/* USER ITEMS */
.uitem{background:var(--bg2);border-radius:12px;padding:11px;border:1px solid var(--border);display:flex;gap:10px;align-items:center;margin-bottom:8px;box-shadow:var(--sh);}

/* NOTIFICATION HISTORY */
.nh-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;box-shadow:var(--sh);}

/* SQL */
.sql-block{background:var(--bg2);border-radius:13px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px;box-shadow:var(--sh);}
.sql-hdr{padding:10px 13px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
pre.sql-code{padding:13px;font-size:10px;color:var(--text2);overflow:auto;line-height:1.9;font-family:monospace;margin:0;max-height:350px;white-space:pre-wrap;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 22px;background:var(--bg);}
.login-box{width:100%;max-width:370px;background:var(--bg2);border-radius:20px;padding:24px 20px;border:1px solid var(--border);box-shadow:var(--sh2);}

/* MODAL EDIT USER */
#ue-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
#ue-overlay.show{display:flex;animation:fadeIn .25s;}
#ue-modal{width:100%;max-width:430px;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid var(--border);border-bottom:none;padding:22px 18px 44px;animation:slideUp .3s cubic-bezier(.22,1,.36,1);max-height:85vh;overflow-y:auto;}

/* TOGGLE */
.tog-row{display:flex;align-items:center;gap:10px;background:var(--bg3);padding:11px 13px;border-radius:10px;cursor:pointer;border:1px solid var(--border);}
.tog{width:40px;height:22px;border-radius:11px;background:var(--border);position:relative;transition:background .22s;flex-shrink:0;}
.tog.on{background:var(--blue);}
.tog-k{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .22s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on .tog-k{left:20px;}

/* TOAST */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:999px;z-index:9999;font-weight:700;font-size:.82rem;box-shadow:0 8px 24px rgba(0,0,0,.15);white-space:nowrap;max-width:90vw;text-align:center;display:none;}
#toast.show{display:block;animation:rise .3s ease;}
#toast.ok{background:#059669;color:#fff;}
#toast.err{background:#DC2626;color:#fff;}
#toast.inf{background:var(--blue);color:#fff;}
#toast.warn{background:var(--gold);color:#fff;}

.spin-s{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
.spin-d{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}

@media(min-width:430px){#app{box-shadow:0 0 40px rgba(0,0,0,.1);}}
</style>
</head>
<body>
<div id="app">
  <div id="toast-area"></div>
  <div id="view"></div>
  <div id="ue-overlay" onclick="if(event.target===this)fermerUE()">
    <div id="ue-modal"><div id="ue-content"></div></div>
  </div>
</div>
<div id="toast"></div>

<script>
const SB='https://rxhjuetoxyjrairroycb.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q';
const TC={livre:'#D97706',formation:'#DC2626',logiciel:'#059669',audio:'#7C3AED'};
const PAYS_OPT=[['CI','🇨🇮 Côte d\'Ivoire'],['CM','🇨🇲 Cameroun'],['SN','🇸🇳 Sénégal'],['BJ','🇧🇯 Bénin'],['BF','🇧🇫 Burkina'],['ML','🇲🇱 Mali'],['GH','🇬🇭 Ghana'],['TG','🇹🇬 Togo'],['OTHER','🌍 International']];

const S={sess:null,prof:null,sub:'add',products:[],users:[],notifs:[],contacts:[],cFilt:[],userF:'all',saving:false,featured:false,imgUrl:'',imgPrev:'',bucket:null,ueAdmin:false,sendingNotif:false};
const tok=()=>S.sess?.access_token||ANON;
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=p=>Number(p).toLocaleString('fr-FR');
const fmtD=d=>new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
function spinS(){return`<span class="spin-s"></span>`;}
function spinD(){return`<span class="spin-d"></span>`;}

let toTm2;
function toast(msg,t='ok'){clearTimeout(toTm2);const e=document.getElementById('toast');if(!e)return;e.textContent=msg;e.className='show '+t;toTm2=setTimeout(()=>e.classList.remove('show'),4000);}

async function dbReq(path,opts={}){
  try{
    const r=await fetch(`${SB}/rest/v1/${path}`,{...opts,headers:{apikey:ANON,Authorization:`Bearer ${tok()}`,'Content-Type':'application/json',...(['POST','PATCH','PUT'].includes(opts.method)?{Prefer:'return=representation'}:{}),...(opts.headers||{})}});
    let d;try{d=await r.json();}catch{}
    return{ok:r.ok,d,status:r.status};
  }catch{return{ok:false,d:null,status:0};}
}
async function authReq(ep,body){
  try{const r=await fetch(`${SB}/auth/v1/${ep}`,{method:'POST',headers:{'Content-Type':'application/json',apikey:ANON},body:JSON.stringify(body)});return await r.json();}
  catch{return{error:'network'};}
}

async function chargerTout(path){
  const PAGE=1000;let res=[],off=0,done=false;
  while(!done){try{const r=await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:ANON,Authorization:`Bearer ${tok()}`,'Range-Unit':'items','Range':`${off}-${off+PAGE-1}`,'Prefer':'count=none'}});const d=await r.json();if(!Array.isArray(d)||d.length===0)done=true;else{res=[...res,...d];if(d.length<PAGE)done=true;else off+=PAGE;}}catch{done=true;}}
  return res;
}

async function loadProducts(){const{ok,d}=await dbReq('products?order=created_at.desc');if(ok&&Array.isArray(d))S.products=d;}
async function loadUsers(){const{ok,d}=await dbReq('profiles?order=created_at.desc');if(ok&&Array.isArray(d))S.users=d;}
async function loadNotifs(){const{ok,d}=await dbReq('notifications?order=created_at.desc');if(ok&&Array.isArray(d))S.notifs=d;}
async function loadContacts(){S.contacts=await chargerTout('pre_contacts?order=created_at.desc&select=id,full_name,phone,email,profession,country_code,created_at');filtrerContacts();}

function filtrerContacts(){
  const q=(document.getElementById('c-srch')?.value||'').toLowerCase().trim();
  S.cFilt=S.contacts.filter(c=>!q||(c.full_name||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.profession||'').toLowerCase().includes(q)||(c.country_code||'').toLowerCase().includes(q));
  afficherContacts();
}
function afficherContacts(){
  const el=document.getElementById('c-list');if(!el)return;
  const lbl=document.getElementById('c-lbl');if(lbl)lbl.textContent=`${S.contacts.length} contacts importés · ${S.cFilt.length} résultats`;
  const show=S.cFilt.slice(0,60);
  el.innerHTML=show.length===0?'<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">Aucun résultat</div>':
    show.map(c=>`
    <div class="citem">
      <div class="cav">${(c.full_name||'?').charAt(0).toUpperCase()}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.full_name||'Sans nom')}</div>
        <div style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.phone||'')}${c.profession?' · '+esc(c.profession):''}${c.country_code?' · '+esc(c.country_code):''}</div>
      </div>
      <button onclick="supprimerContact('${c.id}')" class="btn btn-red" style="padding:6px 9px;font-size:12px;flex-shrink:0;">🗑️</button>
    </div>`).join('')+(S.cFilt.length>60?`<div style="text-align:center;padding:8px;color:var(--text3);font-size:12px;">+${S.cFilt.length-60} autres — affinez la recherche</div>`:'');
}

/* ── SECTIONS HTML ── */
function tLogin(err='',busy=false){
  return`<div class="login-wrap">
    <div style="text-align:center;margin-bottom:26px;"><div class="logo-brand" style="font-size:1.8rem;"><span class="ld">DIGI</span><span class="lf">FORM</span></div><div style="font-size:.78rem;color:var(--text3);margin-top:6px;letter-spacing:.1em;text-transform:uppercase;">Panneau Administrateur</div></div>
    <div class="login-box">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div><label class="lbl">Email</label><input id="l-email" class="inp" type="email" placeholder="votre@email.com" autocomplete="email"/></div>
        <div><label class="lbl">Mot de passe</label><input id="l-pwd" class="inp" type="password" placeholder="••••••••"/></div>
      </div>
      ${err?`<div style="margin-top:10px;font-size:12px;color:var(--red);background:var(--red-bg);padding:10px;border-radius:9px;text-align:center;">${esc(err)}</div>`:''}
      <button id="l-btn" class="btn btn-blue" style="width:100%;padding:13px;border-radius:11px;font-size:.92rem;font-weight:700;margin-top:13px;" ${busy?'disabled':''}>${busy?spinS()+' Vérification…':'Accéder au panneau'}</button>
    </div>
    <a href="dashboard.html" style="color:var(--text3);font-size:.82rem;text-decoration:none;margin-top:18px;">← Retour à l'app</a>
  </div>`;
}

function tHeader(){
  return`<div class="adm-hdr">
    <a href="dashboard.html" class="adm-back">&#8592;</a>
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:6px;"><div class="logo-brand" style="font-size:1.1rem;"><span class="ld">DIGI</span><span class="lf">FORM</span></div><span style="color:var(--text3);font-size:.75rem;">Admin</span></div>
      <div class="adm-email">${esc(S.sess?.user?.email||'')}</div>
    </div>
    <button onclick="deconnecterAdmin()" class="btn btn-red" style="padding:7px 11px;font-size:.78rem;flex-shrink:0;">Déco</button>
  </div>`;
}

function tTabs(){
  const tabs=[{id:'add',l:'Ajouter'},{id:'list',l:'Produits'},{id:'contacts',l:'Contacts'},{id:'users',l:'Membres'},{id:'notifs',l:'Notifs'},{id:'sql',l:'Setup'}];
  return`<div class="adm-tabs">${tabs.map(t=>`<button data-sub="${t.id}" class="adm-tab${S.sub===t.id?' active':''}">${t.l}</button>`).join('')}</div>`;
}

function tAddProduct(){
  return`<div class="adm-sub active">
    <div class="card">
      <div class="card-hdr" style="font-size:.65rem;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:7px;"><span style="width:3px;height:12px;border-radius:2px;background:var(--blue);display:inline-block;flex-shrink:0;"></span>Informations produit</div>
      <div style="display:flex;flex-direction:column;gap:11px;">
        <div><label class="lbl">Titre *</label><input id="fp-title" class="inp" placeholder="Ex: Python pour débutants"/></div>
        <div><label class="lbl">Description</label><textarea id="fp-desc" class="inp" placeholder="Description détaillée…"></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div><label class="lbl">Prix (FCFA) *</label><input id="fp-price" class="inp" type="number" placeholder="5000"/></div>
          <div><label class="lbl">Type *</label>
            <select id="fp-type" class="inp">
              <option value="livre">📚 Livre</option><option value="formation">🎬 Formation</option>
              <option value="logiciel">💻 Logiciel</option><option value="audio">🎧 Audio</option>
            </select>
          </div>
        </div>
        <div><label class="lbl">URL Image</label><input id="fp-img" class="inp" placeholder="https://… (laissez vide si aucune)"/></div>
        <div><label class="lbl">WhatsApp vendeur</label><input id="fp-wa" class="inp" placeholder="+2250707070707"/></div>
        <div class="tog-row" onclick="toggleFeat()" id="feat-row">
          <div class="tog${S.featured?' on':''}" id="feat-tog"><div class="tog-k" style="left:${S.featured?'20px':'2px'};"></div></div>
          <span style="font-size:.83rem;font-weight:500;">Mettre en vedette (bannière accueil)</span>
        </div>
        <button id="fp-btn" class="btn btn-blue" style="padding:13px;border-radius:11px;font-size:.88rem;font-weight:700;" onclick="publierProduit()">Publier le produit</button>
      </div>
    </div>
  </div>`;
}

function tProductsList(){
  if(!S.products.length)return`<div class="adm-sub active"><div style="display:flex;flex-direction:column;align-items:center;padding:48px 24px;gap:13px;text-align:center;"><div style="font-size:3rem;animation:float 3s ease-in-out infinite;">📭</div><div style="font-size:.95rem;font-weight:700;color:var(--text2);">Aucun produit</div></div></div>`;
  return`<div class="adm-sub active">
    <div style="font-size:.75rem;color:var(--text3);margin-bottom:10px;">${S.products.length} produit(s)</div>
    ${S.products.map(p=>{const c=TC[p.type]||'var(--blue)';const icons={livre:'📚',formation:'🎬',logiciel:'💻',audio:'🎧'};return`<div class="pitem">
      <div class="pthumb" style="${p.image_url?`background-image:url('${esc(p.image_url)}');`:''}">${!p.image_url?icons[p.type]||'📦':''}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.title)}</div>
        <div style="font-size:12px;color:var(--gold);font-weight:700;margin-top:2px;">${fmt(p.price)} FCFA</div>
        <div style="font-size:10px;color:${c};margin-top:2px;">${esc(p.type||'')}${p.featured?' · Vedette':''}</div>
      </div>
      <button data-del="${p.id}" class="btn btn-red" style="padding:7px 10px;font-size:13px;flex-shrink:0;">🗑️</button>
    </div>`;}).join('')}
  </div>`;
}

function tContacts(){
  return`<div class="adm-sub active">
    <div class="card">
      <div style="font-size:.65rem;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:7px;"><span style="width:3px;height:12px;border-radius:2px;background:var(--blue);display:inline-block;flex-shrink:0;"></span>Ajouter un contact</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div><label class="lbl">Nom complet *</label><input id="cn-name" class="inp" placeholder="Prénom Nom"/></div>
          <div><label class="lbl">Téléphone *</label><input id="cn-phone" class="inp" placeholder="+2250700000000" type="tel"/></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div><label class="lbl">Email</label><input id="cn-email" class="inp" placeholder="email@exemple.com" type="email"/></div>
          <div><label class="lbl">Profession</label><input id="cn-prof" class="inp" placeholder="Marketing Digital"/></div>
        </div>
        <div><label class="lbl">Pays</label>

const SQL_SETUP=`-- DIGIFORM SQL SETUP v3
CREATE TABLE IF NOT EXISTS public.profiles (
  id UUID REFERENCES auth.users(id) ON DELETE CASCADE PRIMARY KEY,
  email TEXT DEFAULT '', full_name TEXT DEFAULT '',
  phone TEXT DEFAULT '', profession TEXT DEFAULT '',
  show_in_network BOOLEAN DEFAULT true,
  is_admin BOOLEAN DEFAULT false,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  updated_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.products (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title TEXT NOT NULL, description TEXT DEFAULT '',
  price NUMERIC DEFAULT 0, type TEXT DEFAULT 'livre',
  image_url TEXT DEFAULT '', whatsapp_number TEXT DEFAULT '',
  featured BOOLEAN DEFAULT false, created_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.pre_contacts (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  full_name TEXT DEFAULT '', phone TEXT DEFAULT '',
  email TEXT DEFAULT '', profession TEXT DEFAULT '',
  country_code TEXT DEFAULT '', show_in_network BOOLEAN DEFAULT true,
  source TEXT DEFAULT 'admin', created_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.notifications (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title TEXT NOT NULL, body TEXT NOT NULL,
  created_by UUID REFERENCES auth.users(id) ON DELETE SET NULL,
  created_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.notification_reads (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
  notification_id UUID REFERENCES public.notifications(id) ON DELETE CASCADE,
  read_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(user_id, notification_id)
);
ALTER TABLE public.profiles DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.products DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.pre_contacts DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.notifications DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.notification_reads DISABLE ROW LEVEL SECURITY;
GRANT ALL ON public.profiles TO anon, authenticated;
GRANT ALL ON public.products TO anon, authenticated;
GRANT ALL ON public.pre_contacts TO anon, authenticated;
GRANT ALL ON public.notifications TO anon, authenticated;
GRANT ALL ON public.notification_reads TO anon, authenticated;
CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS TRIGGER LANGUAGE plpgsql SECURITY DEFINER AS $$
BEGIN
  INSERT INTO public.profiles (id,email,full_name,phone,profession,show_in_network)
  VALUES (NEW.id,NEW.email,
    COALESCE(NEW.raw_user_meta_data->>'full_name',''),
    COALESCE(NEW.raw_user_meta_data->>'phone',''),
    COALESCE(NEW.raw_user_meta_data->>'profession',''),
    COALESCE((NEW.raw_user_meta_data->>'show_in_network')::boolean,true))
  ON CONFLICT (id) DO UPDATE SET email=EXCLUDED.email;
  RETURN NEW;
END;$$;
DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
CREATE TRIGGER on_auth_user_created AFTER INSERT ON auth.users FOR EACH ROW EXECUTE PROCEDURE public.handle_new_user();
-- DEVENIR ADMIN:
-- UPDATE public.profiles SET is_admin=true WHERE email='votre@email.com';`;

/* ── RENDER ── */
function renderView(){
  const el=document.getElementById('view');if(!el)return;
  if(!S.sess){el.innerHTML=tLogin();bindLogin();return;}
  el.innerHTML=`<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">${tHeader()}${tTabs()}<div id="content" style="flex:1;overflow-y:auto;padding:15px 13px;">${renderSub()}</div></div>`;
  bindPanel();
}
function renderSub(){
  if(S.sub==='add')      return tAddProduct();
  if(S.sub==='list')     return tProductsList();
  if(S.sub==='contacts') return tContacts();
  if(S.sub==='users')    return tUsers();
  if(S.sub==='notifs')   return tNotifs();
  if(S.sub==='sql')      return tSql();
  return '';
}
function renderContent(){
  const el=document.getElementById('content');if(!el)return;
  el.innerHTML=renderSub();
  document.querySelectorAll('[data-sub]').forEach(b=>{const a=b.dataset.sub===S.sub;b.classList.toggle('active',a);});
  bindContent();
  if(S.sub==='contacts'&&S.contacts.length===0)loadContacts();
}
function filtrerUsers(){renderContent();}

/* ── BIND LOGIN ── */
function bindLogin(){
  const go=async()=>{
    const email=(document.getElementById('l-email')?.value||'').trim();
    const pwd=document.getElementById('l-pwd')?.value||'';
    if(!email||!pwd){rerender('Remplissez tous les champs');return;}
    rerender('',true);
    const d=await authReq('token?grant_type=password',{email,password:pwd});
    if(d.access_token){
      S.sess={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};
      try{localStorage.setItem('dg_adm_sess',JSON.stringify(S.sess));}catch{}
      const{ok,d:pd}=await dbReq(`profiles?id=eq.${S.sess.user.id}`);
      if(ok&&Array.isArray(pd)&&pd[0]){S.prof=pd[0];if(!S.prof.is_admin){S.sess=null;localStorage.removeItem('dg_adm_sess');rerender('Accès refusé — ce compte n\'est pas administrateur');return;}}
      await Promise.all([loadProducts(),loadUsers(),loadNotifs()]);renderView();
    }else rerender(d.error_description||d.message||'Identifiants incorrects');
  };
  function rerender(err='',busy=false){document.getElementById('view').innerHTML=tLogin(err,busy);document.getElementById('l-btn')?.addEventListener('click',go);document.getElementById('l-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});}
  document.getElementById('l-btn')?.addEventListener('click',go);
  document.getElementById('l-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}

/* ── BIND PANEL ── */
function bindPanel(){
  document.querySelectorAll('[data-sub]').forEach(el=>el.addEventListener('click',async()=>{
    S.sub=el.dataset.sub;
    if(S.sub==='users')await loadUsers();
    if(S.sub==='notifs')await loadNotifs();
    if(S.sub==='list')await loadProducts();
    renderContent();
  }));
  bindContent();
}

/* ── BIND CONTENT ── */
function bindContent(){
  if(S.sub==='list'){
    document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',async()=>{
      const id=el.dataset.del;el.disabled=true;el.innerHTML=spinD();
      const{ok}=await dbReq(`products?id=eq.${id}`,{method:'DELETE'});
      if(ok){await loadProducts();toast('Produit supprimé');renderContent();}
      else{toast('Erreur suppression','err');el.disabled=false;el.textContent='🗑️';}
    }));
  }
  if(S.sub==='contacts'){if(S.contacts.length>0)afficherContacts();}
  if(S.sub==='users'){
    window.setUF=f=>{S.userF=f;renderContent();};
    document.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',async()=>{
      const uid=el.dataset.toggle,isAdm=el.dataset.is==='1';el.disabled=true;el.innerHTML=spinD();
      const{ok,status}=await dbReq(`profiles?id=eq.${uid}`,{method:'PATCH',body:JSON.stringify({is_admin:!isAdm})});
      if(ok){const u=S.users.find(x=>x.id===uid);if(u)u.is_admin=!isAdm;toast('Rôle mis à jour');renderContent();}
      else{toast(`Erreur ${status}`,'err');el.disabled=false;el.textContent=isAdm?'-Adm':'+Adm';}
    }));
    document.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',()=>ouvrirUE(el.dataset.edit)));
  }
  if(S.sub==='sql'){document.getElementById('copy-sql')?.addEventListener('click',copierSQL);}
}

function toggleFeat(){S.featured=!S.featured;const t=document.getElementById('feat-tog');if(!t)return;t.classList.toggle('on',S.featured);t.querySelector('.tog-k').style.left=S.featured?'20px':'2px';}

async function publierProduit(){
  const title=(document.getElementById('fp-title')?.value||'').trim();
  const price=document.getElementById('fp-price')?.value||'';
  if(!title||!price){toast('Titre et prix requis','warn');return;}
  const btn=document.getElementById('fp-btn');btn.disabled=true;btn.innerHTML=spinS()+' Publication…';
  const{ok,status}=await dbReq('products',{method:'POST',body:JSON.stringify({title,description:(document.getElementById('fp-desc')?.value||'').trim(),price:Number(price),type:document.getElementById('fp-type')?.value||'livre',image_url:(document.getElementById('fp-img')?.value||'').trim(),whatsapp_number:(document.getElementById('fp-wa')?.value||'').trim(),featured:S.featured})});
  btn.disabled=false;btn.textContent='Publier le produit';
  if(ok){S.featured=false;await loadProducts();toast('Produit publié !');['fp-title','fp-desc','fp-price','fp-img','fp-wa'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';})}
  else toast(`Erreur ${status}`,'err');
}

async function ajouterContact(){
  const name=(document.getElementById('cn-name')?.value||'').trim();
  const phone=(document.getElementById('cn-phone')?.value||'').trim();
  const email=(document.getElementById('cn-email')?.value||'').trim();
  const prof=(document.getElementById('cn-prof')?.value||'').trim();
  const pays=document.getElementById('cn-pays')?.value||'OTHER';
  if(!name||!phone){toast('Nom et téléphone requis','warn');return;}
  const btn=document.getElementById('cn-btn');btn.disabled=true;btn.innerHTML=spinS()+' Ajout…';
  const{ok,status}=await dbReq('pre_contacts',{method:'POST',body:JSON.stringify({full_name:name,phone,email,profession:prof,country_code:pays,show_in_network:true,source:'admin'})});
  btn.disabled=false;btn.textContent='Ajouter le contact';
  const st=document.getElementById('cn-status');
  if(ok){['cn-name','cn-phone','cn-email','cn-prof'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});if(st){st.style.display='block';st.style.color='var(--green)';st.style.background='var(--green-bg)';st.style.border='1px solid var(--green-border)';st.style.borderRadius='9px';st.textContent=`${name} ajouté avec succès !`;}toast(`${name} ajouté !`);await loadContacts();}
  else{if(st){st.style.display='block';st.style.color='var(--red)';st.style.background='var(--red-bg)';st.style.border='1px solid var(--red-border)';st.style.borderRadius='9px';st.textContent=`Erreur ${status}`;}toast(`Erreur ${status}`,'err');}
}

async function supprimerContact(id){
  if(!confirm('Supprimer ce contact ?'))return;
  const{ok}=await dbReq(`pre_contacts?id=eq.${id}`,{method:'DELETE'});
  if(ok){toast('Contact supprimé');S.contacts=S.contacts.filter(c=>c.id!==id);filtrerContacts();}
  else toast('Erreur suppression','err');
}

async function promouvoir(){
  const email=(document.getElementById('promo-inp')?.value||'').trim().toLowerCase();if(!email){toast('Email requis','warn');return;}
  const btn=document.getElementById('promo-btn');btn.disabled=true;btn.innerHTML=spinD();
  const{ok,d}=await dbReq(`profiles?email=eq.${encodeURIComponent(email)}`);
  if(ok&&Array.isArray(d)&&d[0]){
    if(d[0].is_admin){toast('Déjà admin','inf');}
    else{const r=await dbReq(`profiles?id=eq.${d[0].id}`,{method:'PATCH',body:JSON.stringify({is_admin:true})});if(r.ok){const inp=document.getElementById('promo-inp');if(inp)inp.value='';await loadUsers();toast(`${email} est admin !`);btn.disabled=false;btn.textContent='OK';renderContent();return;}else toast(`Erreur ${r.status}`,'err');}
  }else toast(`Aucun compte pour ${email}`,'err');
  btn.disabled=false;btn.textContent='OK';
}

async function envoyerNotif(){
  if(S.sendingNotif)return;
  const title=(document.getElementById('n-title')?.value||'').trim();
  const body=(document.getElementById('n-body')?.value||'').trim();
  if(!title||!body){toast('Titre et message requis','warn');return;}
  S.sendingNotif=true;const btn=document.getElementById('n-btn');btn.disabled=true;btn.innerHTML=spinS()+' Envoi…';
  const{ok,status}=await dbReq('notifications',{method:'POST',body:JSON.stringify({title,body,created_by:S.sess?.user?.id||null})});
  S.sendingNotif=false;btn.disabled=false;btn.textContent='Envoyer à tous';
  const st=document.getElementById('n-status');
  if(ok){const t=document.getElementById('n-title'),b=document.getElementById('n-body');if(t)t.value='';if(b)b.value='';if(st){st.style.display='block';st.style.color='var(--green)';st.style.background='var(--green-bg)';st.style.border='1px solid var(--green-border)';st.style.borderRadius='9px';st.textContent='Notification envoyée à tous !';}toast('Notification envoyée !');await loadNotifs();renderContent();}
  else{if(st){st.style.display='block';st.style.color='var(--red)';st.style.background='var(--red-bg)';st.style.border='1px solid var(--red-border)';st.style.borderRadius='9px';st.textContent=`Erreur ${status}`;}toast(`Erreur ${status}`,'err');}
}

function copierSQL(){navigator.clipboard?.writeText(SQL_SETUP).then(()=>{const b=document.getElementById('copy-sql');if(b){b.textContent='Copié !';setTimeout(()=>b.textContent='Copier',2500);}});}

  S.ueAdmin=u.is_admin;
  document.getElementById('ue-content').innerHTML=`
    <div style="width:36px;height:4px;border-radius:2px;background:var(--bg4);margin:0 auto 18px;"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
      <div style="width:44px;height:44px;border-radius:50%;background:${u.is_admin?'var(--blue)':'var(--bg3)'};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:${u.is_admin?'#fff':'var(--blue)'};font-family:'Syne',sans-serif;flex-shrink:0;">${(u.full_name||u.email||'?').charAt(0).toUpperCase()}</div>
      <div><div style="font-size:.95rem;font-weight:700;">${esc(u.full_name||'Sans nom')}</div><div style="font-size:.75rem;color:var(--text3);">${esc(u.email||'')}</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px;">
      <div><label class="lbl">Nom complet</label><input id="ue-name" class="inp" value="${esc(u.full_name||'')}" placeholder="Nom complet"/></div>
      <div><label class="lbl">Téléphone</label><input id="ue-phone" class="inp" value="${esc(u.phone||'')}" placeholder="+225…"/></div>
      <div><label class="lbl">Profession</label><input id="ue-prof" class="inp" value="${esc(u.profession||'')}" placeholder="Marketing Digital"/></div>
      <div class="tog-row" onclick="toggleUEAdmin()">
        <div class="tog${u.is_admin?' on':''}" id="ue-tog"><div class="tog-k" style="left:${u.is_admin?'20px':'2px'};"></div></div>
        <span style="font-size:.83rem;">Administrateur</span>
      </div>
    </div>
    <div style="display:flex;gap:9px;">
      <button onclick="sauvegarderUE('${u.id}')" class="btn btn-blue" style="flex:1;padding:12px;border-radius:11px;font-size:.88rem;font-weight:700;" id="ue-save">Sauvegarder</button>
      <button onclick="fermerUE()" class="btn btn-outline" style="flex:1;padding:12px;border-radius:11px;font-size:.88rem;">Annuler</button>
    </div>`;
  document.getElementById('ue-overlay').classList.add('show');
}
function toggleUEAdmin(){S.ueAdmin=!S.ueAdmin;const t=document.getElementById('ue-tog');if(!t)return;t.classList.toggle('on',S.ueAdmin);t.querySelector('.tog-k').style.left=S.ueAdmin?'20px':'2px';}
function fermerUE(){document.getElementById('ue-overlay').classList.remove('show');}
async function sauvegarderUE(id){
  const name=(document.getElementById('ue-name')?.value||'').trim();
  const phone=(document.getElementById('ue-phone')?.value||'').trim();
  const prof=(document.getElementById('ue-prof')?.value||'').trim();
  const btn=document.getElementById('ue-save');btn.disabled=true;btn.textContent='Sauvegarde…';
  const{ok,status}=await dbReq(`profiles?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({full_name:name,phone,profession:prof,is_admin:S.ueAdmin,updated_at:new Date().toISOString()})});
  if(ok){const u=S.users.find(x=>x.id===id);if(u){u.full_name=name;u.phone=phone;u.profession=prof;u.is_admin=S.ueAdmin;}fermerUE();toast('Utilisateur mis à jour !');renderContent();}
  else{toast(`Erreur ${status}`,'err');btn.disabled=false;btn.textContent='Sauvegarder';}
}

/* INIT */
async function init(){
  try{
    const s=JSON.parse(localStorage.getItem('dg_adm_sess')||'null');
    if(s?.access_token){S.sess=s;const{ok,d}=await dbReq(`profiles?id=eq.${s.user.id}`);if(ok&&Array.isArray(d)&&d[0]&&d[0].is_admin){S.prof=d[0];await Promise.all([loadProducts(),loadUsers(),loadNotifs()]);}else{S.sess=null;localStorage.removeItem('dg_adm_sess');}}
  }catch{S.sess=null;}
  renderView();
}
init();
</script>
</body>
</html>
