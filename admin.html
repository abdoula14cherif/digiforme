<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIGIFORM — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#070B17;color:#E8EEFF;font-family:'DM Sans',sans-serif;overscroll-behavior:none;}
#root{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:#070B17;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#1E2D55;border-radius:3px;}

@keyframes dg-fadein{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:none;}}
@keyframes dg-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes dg-shimmer{0%{background-position:-200%;}100%{background-position:200%;}}
@keyframes dg-spin{to{transform:rotate(360deg);}}

.dg-page{animation:dg-fadein .45s cubic-bezier(.22,1,.36,1) both;}
.dg-shimmer{background:linear-gradient(90deg,#0D1426 25%,#1E2D55 50%,#0D1426 75%);background-size:200%;animation:dg-shimmer 1.5s infinite;}
.dg-btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.dg-btn:hover{transform:translateY(-2px);}.dg-btn:active{transform:scale(.96);}
.dg-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.dg-cyan{background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;}.dg-cyan:hover:not(:disabled){box-shadow:0 8px 24px rgba(0,212,255,.35);}
.dg-danger{background:rgba(255,80,80,.12);color:#FF5050;border:1px solid rgba(255,80,80,.25)!important;}
.dg-input{background:#131C35;border:1px solid #1E2D55;border-radius:12px;color:#E8EEFF;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px;width:100%;outline:none;transition:border-color .2s;}
.dg-input:focus{border-color:#00D4FF;box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.dg-input::placeholder{color:#3A4A6E;}
textarea.dg-input{resize:vertical;min-height:80px;}
select.dg-input{appearance:none;cursor:pointer;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Constants ────────────────────────────────────────────────────────────────
const SB_URL="https://rxhjuetoxyjrairroycb.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q";
const TC={livre:"#FFB800",formation:"#FF6B35",logiciel:"#00E5A0",audio:"#B04FFF"};
const TYPES=[
  {id:"all",label:"Tout",emoji:"🌐",color:"#00D4FF"},
  {id:"livre",label:"Livres",emoji:"📚",color:"#FFB800"},
  {id:"formation",label:"Formations",emoji:"🎬",color:"#FF6B35"},
  {id:"logiciel",label:"Logiciels",emoji:"💻",color:"#00E5A0"},
  {id:"audio",label:"Audio",emoji:"🎧",color:"#B04FFF"},
];
const CORRECT_PIN="1234";

// ── State ────────────────────────────────────────────────────────────────────
const S={
  unlocked:false,
  subTab:"add",
  products:[],
  loading:false,
  saving:false,
  deletingId:null,
  featured:false,
  toast:null,
  toastTimer:null,
  sqlCopied:false,
};

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path,opts={}){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${path}`,{...opts,headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":"application/json",Prefer:opts.method==="POST"?"return=representation":"return=minimal",...(opts.headers||{})}});
    let data=null;try{data=await r.json();}catch{}
    return{ok:r.ok,data};
  }catch(e){return{ok:false,data:null};}
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const tc=t=>TC[t]||"#00D4FF";
const te=t=>TYPES.find(x=>x.id===t)?.emoji||"📦";
const tp=p=>Number(p).toLocaleString("fr-FR");
const esc=s=>(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── Actions ──────────────────────────────────────────────────────────────────
async function loadProducts(){
  S.loading=true;renderContent();
  const{ok,data}=await api("products?order=created_at.desc");
  if(ok&&Array.isArray(data))S.products=data;
  S.loading=false;renderContent();
}

function showToast(msg,type="success"){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toast={msg,type};renderToast();
  S.toastTimer=setTimeout(()=>{S.toast=null;renderToast();},3000);
}

function renderToast(){
  const el=document.getElementById("toast-area");
  if(!el)return;
  if(!S.toast){el.innerHTML="";return;}
  const bg=S.toast.type==="error"?"linear-gradient(135deg,#FF5050,#CC0000)":"linear-gradient(135deg,#00E5A0,#00B070)";
  el.innerHTML=`<div style="position:fixed;top:82px;left:50%;transform:translateX(-50%);background:${bg};color:white;padding:10px 22px;border-radius:20px;z-index:9999;font-weight:600;font-size:14px;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:dg-fadein .3s ease;white-space:nowrap;">${S.toast.msg}</div>`;
}

function checkPin(){
  const val=document.getElementById("pin-input")?.value||"";
  if(val===CORRECT_PIN){
    S.unlocked=true;
    render();
    loadProducts();
  }else{
    document.getElementById("pin-error")?.style&&(document.getElementById("pin-error").style.display="flex");
    document.getElementById("pin-input").value="";
    document.getElementById("pin-input").focus();
  }
}

async function saveProduct(){
  const title=(document.getElementById("f-title")?.value||"").trim();
  const description=(document.getElementById("f-description")?.value||"").trim();
  const price=(document.getElementById("f-price")?.value||"").trim();
  const type=document.getElementById("f-type")?.value||"livre";
  const image_url=(document.getElementById("f-image")?.value||"").trim();
  const whatsapp_number=(document.getElementById("f-wa")?.value||"").trim();
  const featured=S.featured;

  if(!title||!price){showToast("⚠️ Titre et prix requis","error");return;}
  S.saving=true;updateSaveBtn();

  const{ok}=await api("products",{method:"POST",body:JSON.stringify({title,description,price:Number(price),type,image_url,whatsapp_number,featured})});
  S.saving=false;updateSaveBtn();
  if(ok){
    // Reset form
    ["f-title","f-description","f-price","f-image","f-wa"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    document.getElementById("f-type").value="livre";
    S.featured=false;updateToggle();
    showToast("✅ Produit publié avec succès !");
    loadProducts();
  }else{
    showToast("❌ Erreur — vérifiez la configuration Supabase","error");
  }
}

function updateSaveBtn(){
  const btn=document.getElementById("save-btn");
  if(!btn)return;
  btn.disabled=S.saving;
  btn.textContent=S.saving?"⏳ Publication…":"✅ Publier le produit";
}

function updateToggle(){
  const toggle=document.getElementById("featured-toggle");
  const knob=document.getElementById("featured-knob");
  if(!toggle||!knob)return;
  toggle.style.background=S.featured?"linear-gradient(135deg,#00D4FF,#0099FF)":"#1E2D55";
  knob.style.left=S.featured?"22px":"2px";
}

async function deleteProduct(id){
  if(S.deletingId)return;
  S.deletingId=id;
  const btn=document.querySelector(`[data-delete="${id}"]`);
  if(btn)btn.textContent="…";
  const{ok}=await api(`products?id=eq.${id}`,{method:"DELETE"});
  S.deletingId=null;
  if(ok){showToast("🗑️ Produit supprimé","error");loadProducts();}
  else{showToast("❌ Erreur suppression","error");if(btn)btn.textContent="🗑️";}
}

function copySql(){
  const sql=document.getElementById("sql-code")?.textContent||"";
  navigator.clipboard.writeText(sql).then(()=>{
    S.sqlCopied=true;
    const btn=document.getElementById("copy-sql-btn");
    if(btn)btn.textContent="✅ Copié !";
    setTimeout(()=>{S.sqlCopied=false;const b=document.getElementById("copy-sql-btn");if(b)b.textContent="📋 Copier";},2500);
  });
}

// ── Templates ────────────────────────────────────────────────────────────────
const SQL_TEXT=`-- 1. Créer la table dans Supabase SQL Editor
CREATE TABLE products (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title TEXT NOT NULL,
  description TEXT,
  price NUMERIC NOT NULL DEFAULT 0,
  type TEXT NOT NULL DEFAULT 'livre',
  image_url TEXT,
  whatsapp_number TEXT,
  featured BOOLEAN DEFAULT false,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 2. Activer RLS avec accès public
ALTER TABLE products ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public access" ON products
  FOR ALL USING (true) WITH CHECK (true);`;

function tPinScreen(){
  return`<div class="dg-page" style="padding:60px 32px;display:flex;flex-direction:column;align-items:center;gap:24px;">
    <div style="font-size:64px;animation:dg-float 3s ease-in-out infinite;">🔐</div>
    <div style="text-align:center;">
      <div style="font-size:22px;font-family:'Syne',sans-serif;font-weight:700;margin-bottom:8px;">Zone Admin</div>
      <div style="color:#5B6A90;font-size:14px;">Code PIN requis pour accéder</div>
    </div>
    <input id="pin-input" type="password" class="dg-input" style="text-align:center;font-size:28px;letter-spacing:.6em;max-width:240px;" placeholder="••••" maxlength="6" />
    <div id="pin-error" style="color:#FF5050;font-size:12px;gap:6px;display:none;align-items:center;">❌ Code incorrect — réessayez</div>
    <button id="pin-btn" class="dg-btn dg-cyan" style="padding:14px 48px;border-radius:14px;font-size:16px;width:100%;max-width:260px;">🔓 Accéder</button>
    <div style="font-size:11px;color:#3A4A6E;">PIN par défaut : 1234</div>
    <a href="digiform.html" style="color:#5B6A90;font-size:13px;text-decoration:none;margin-top:8px;">← Retour à l'app</a>
  </div>`;
}

function tAddForm(){
  return`<div style="display:flex;flex-direction:column;gap:16px;">
    <div>
      <label style="font-size:12px;color:#5B6A90;margin-bottom:6px;display:block;">Titre du produit *</label>
      <input id="f-title" class="dg-input" placeholder="Ex : Python pour débutants" onfocus="this.style.borderColor='#00D4FF'" onblur="this.style.borderColor='#1E2D55'" />
    </div>
    <div>
      <label style="font-size:12px;color:#5B6A90;margin-bottom:6px;display:block;">Description</label>
      <textarea id="f-description" class="dg-input" placeholder="Description détaillée…" onfocus="this.style.borderColor='#00D4FF'" onblur="this.style.borderColor='#1E2D55'"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label style="font-size:12px;color:#5B6A90;margin-bottom:6px;display:block;">Prix (FCFA) *</label>
        <input id="f-price" type="number" class="dg-input" placeholder="5000" onfocus="this.style.borderColor='#00D4FF'" onblur="this.style.borderColor='#1E2D55'" />
      </div>
      <div>
        <label style="font-size:12px;color:#5B6A90;margin-bottom:6px;display:block;">Type *</label>
        <select id="f-type" class="dg-input" onfocus="this.style.borderColor='#00D4FF'" onblur="this.style.borderColor='#1E2D55'">
          <option value="livre">📚 Livre</option>
          <option value="formation">🎬 Formation</option>
          <option value="logiciel">💻 Logiciel</option>
          <option value="audio">🎧 Audio</option>
        </select>
      </div>
    </div>
    <div>
      <label style="font-size:12px;color:#5B6A90;margin-bottom:6px;display:block;">URL de l'image (optionnel)</label>
      <input id="f-image" class="dg-input" placeholder="https://…" onfocus="this.style.borderColor='#00D4FF'" onblur="this.style.borderColor='#1E2D55'" />
    </div>
    <div>
      <label style="font-size:12px;color:#5B6A90;margin-bottom:6px;display:block;">Numéro WhatsApp (avec indicatif)</label>
      <input id="f-wa" class="dg-input" placeholder="+2250707070707" onfocus="this.style.borderColor='#00D4FF'" onblur="this.style.borderColor='#1E2D55'" />
    </div>
    <div id="featured-row" style="display:flex;align-items:center;gap:12px;background:#0D1426;padding:14px 16px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,.06);">
      <div id="featured-toggle" style="width:44px;height:24px;border-radius:12px;background:#1E2D55;position:relative;transition:background .2s;flex-shrink:0;">
        <div id="featured-knob" style="position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:white;transition:left .2s;box-shadow:0 2px 4px rgba(0,0,0,.3);"></div>
      </div>
      <span style="font-size:14px;font-weight:500;">🔥 Mettre en vedette (bannière d'accueil)</span>
    </div>
    <button id="save-btn" class="dg-btn dg-cyan" style="padding:16px;border-radius:14px;font-size:16px;margin-top:8px;width:100%;">✅ Publier le produit</button>
  </div>`;
}

function tProductList(){
  if(S.loading)return`<div style="display:flex;flex-direction:column;gap:10px;">${[...Array(3)].map(()=>`<div class="dg-shimmer" style="height:80px;border-radius:14px;"></div>`).join("")}</div>`;
  if(!S.products.length)return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;gap:16px;text-align:center;">
    <div style="font-size:56px;animation:dg-float 3s ease-in-out infinite;">📭</div>
    <div style="font-size:15px;font-weight:600;color:#8899BB;">Aucun produit publié</div>
    <div style="font-size:13px;color:#3A4A6E;">Ajoutez des produits via l'onglet Ajouter</div>
  </div>`;
  return`<div style="display:flex;flex-direction:column;gap:10px;">
    ${S.products.map(p=>{
      const c=tc(p.type);
      return`<div style="background:#0D1426;border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.06);display:flex;gap:12px;align-items:center;">
        <div style="width:54px;height:54px;border-radius:10px;flex-shrink:0;${p.image_url?`background:url(${esc(p.image_url)}) center/cover`:`background:${c}20`};display:flex;align-items:center;justify-content:center;font-size:22px;">${!p.image_url?te(p.type):""}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:#E8EEFF;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.title)}</div>
          <div style="font-size:12px;color:#FFB800;margin-top:2px;">${tp(p.price)} FCFA</div>
          <div style="font-size:11px;color:${c};margin-top:2px;">${te(p.type)} ${esc(p.type||"")}${p.featured?" · 🔥 Vedette":""}</div>
        </div>
        <button data-delete="${p.id}" class="dg-btn dg-danger" style="padding:8px 12px;border-radius:10px;font-size:14px;flex-shrink:0;">${S.deletingId===p.id?"…":"🗑️"}</button>
      </div>`;
    }).join("")}
  </div>`;
}

function tSetupGuide(){
  return`<div style="display:flex;flex-direction:column;gap:18px;">
    <div style="background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:14px;padding:16px;">
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;">📋 Configuration Supabase</div>
      <div style="font-size:13px;color:#8899BB;line-height:1.8;">
        1. Ouvrez <strong style="color:#00D4FF;">supabase.com</strong> → votre projet<br>
        2. Allez dans <strong style="color:#00D4FF;">SQL Editor</strong><br>
        3. Collez et exécutez le SQL ci-dessous<br>
        4. Revenez ici et ajoutez vos produits ✅
      </div>
    </div>
    <div style="background:#0D1426;border-radius:14px;overflow:hidden;border:1px solid #1E2D55;">
      <div style="padding:10px 16px;background:#131C35;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:#5B6A90;font-family:monospace;">SQL</span>
        <button id="copy-sql-btn" class="dg-btn dg-cyan" style="padding:6px 14px;border-radius:8px;font-size:12px;">📋 Copier</button>
      </div>
      <pre id="sql-code" style="padding:16px;font-size:11px;color:#8899BB;overflow:auto;line-height:1.7;font-family:monospace;margin:0;white-space:pre-wrap;">${SQL_TEXT}</pre>
    </div>
    <div style="background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.2);border-radius:14px;padding:14px;font-size:13px;color:#FFB800;line-height:1.7;">
      ⚠️ Ce mode utilise un accès public complet. Pour la production, mettez en place une authentification sécurisée.
    </div>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function tHeader(){
  return`<header style="position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,11,23,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 20px;z-index:100;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:18px;font-family:'Syne',sans-serif;font-weight:800;background:linear-gradient(135deg,#FFFFFF,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Administration</div>
      <div style="font-size:11px;color:#5B6A90;margin-top:2px;">Gestion du contenu</div>
    </div>
    <a href="digiform.html" style="width:38px;height:38px;border-radius:50%;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);display:flex;align-items:center;justify-content:center;font-size:17px;text-decoration:none;" title="Retour à l'app">🏠</a>
  </header>`;
}

function renderContent(){
  const area=document.getElementById("content-area");
  if(!area)return;
  const tabs=[{id:"add",label:"➕ Ajouter"},{id:"list",label:"📋 Produits"},{id:"setup",label:"⚙️ Config"}];
  area.innerHTML=`<div class="dg-page" style="padding:20px 16px;">
    <div style="display:flex;gap:8px;margin-bottom:24px;">
      ${tabs.map(t=>`<button data-sub="${t.id}" class="dg-btn" style="flex:1;padding:10px 0;border-radius:12px;font-size:13px;${S.subTab===t.id?`background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;border:none;`:`background:rgba(255,255,255,.05);color:#E8EEFF;border:1px solid rgba(255,255,255,.08);`}">${t.label}</button>`).join("")}
    </div>
    ${S.subTab==="add"?tAddForm():S.subTab==="list"?tProductList():tSetupGuide()}
  </div>`;
  bindContentEvents();
}

function render(){
  const root=document.getElementById("root");
  if(!S.unlocked){
    root.innerHTML=`<div id="toast-area"></div>${tHeader()}<main style="padding-top:72px;min-height:100vh;">${tPinScreen()}</main>`;
    document.getElementById("pin-btn")?.addEventListener("click",checkPin);
    document.getElementById("pin-input")?.addEventListener("keydown",e=>{if(e.key==="Enter")checkPin();});
    return;
  }
  root.innerHTML=`<div id="toast-area"></div>${tHeader()}<main style="padding-top:72px;padding-bottom:32px;min-height:100vh;"><div id="content-area"></div></main>`;
  renderContent();
}

function bindContentEvents(){
  // Sub tabs
  document.querySelectorAll("[data-sub]").forEach(el=>{
    el.addEventListener("click",()=>{S.subTab=el.dataset.sub;renderContent();});
  });
  // Save btn
  const sb=document.getElementById("save-btn");
  if(sb)sb.addEventListener("click",saveProduct);
  // Featured toggle
  const fr=document.getElementById("featured-row");
  if(fr)fr.addEventListener("click",()=>{S.featured=!S.featured;updateToggle();});
  // Delete buttons
  document.querySelectorAll("[data-delete]").forEach(el=>{
    el.addEventListener("click",()=>deleteProduct(el.dataset.delete));
  });
  // Copy SQL
  const cs=document.getElementById("copy-sql-btn");
  if(cs)cs.addEventListener("click",copySql);
}

// ── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
