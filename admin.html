<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIGIFORM · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:#070B17;color:#E8EEFF;font-family:'Epilogue',sans-serif;overscroll-behavior:none;}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:#070B17;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#1E2D55;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes shimmer{from{background-position:-200%;}to{background-position:200%;}}
@keyframes ov{from{opacity:0;}to{opacity:1;}}
@keyframes bt{from{transform:translateY(100%);}to{transform:translateY(0);}}
.page{animation:rise .4s cubic-bezier(.22,1,.36,1) both;}
.shim{background:linear-gradient(90deg,#0D1426 25%,#1E2D55 50%,#0D1426 75%);background-size:200%;animation:shimmer 1.5s infinite;}
/* GRADIENT TEXT */
.gc{background:linear-gradient(135deg,#fff 20%,#B0D8FF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gg{background:linear-gradient(135deg,#FFB800,#FF6A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'Epilogue',sans-serif;font-weight:600;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:scale(.95);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
.btn-cy{background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;}
.btn-cy:hover:not(:disabled){box-shadow:0 8px 24px rgba(0,212,255,.4);}
.btn-go{background:linear-gradient(135deg,#FFB800,#FF7A00);color:#070B17;}
.btn-rb{background:rgba(255,80,80,.1);color:#FF5050;border:1px solid rgba(255,80,80,.25)!important;}
/* INPUTS */
.inp{background:#131C35;border:1px solid #1E2D55;border-radius:12px;color:#E8EEFF;font-family:'Epilogue',sans-serif;font-size:14px;padding:11px 14px;width:100%;outline:none;transition:border-color .2s;display:block;}
.inp:focus{border-color:#00D4FF;box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.inp::placeholder{color:#3A4A6E;}
textarea.inp{resize:vertical;min-height:80px;}
select.inp{cursor:pointer;-webkit-appearance:none;}
.lbl{font-size:11px;color:#5B6A90;display:block;margin-bottom:5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.card{background:#0D1426;border-radius:15px;padding:15px;border:1px solid rgba(255,255,255,.07);margin-bottom:12px;}
/* USER EDIT MODAL */
#ue-overlay{position:fixed;inset:0;background:rgba(7,11,23,.88);backdrop-filter:blur(14px);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
#ue-overlay.show{display:flex;animation:ov .25s;}
#ue-modal{width:100%;max-width:430px;background:#0D1426;border-radius:24px 24px 0 0;border:1px solid rgba(255,255,255,.09);border-bottom:none;padding:22px 18px 40px;animation:bt .3s cubic-bezier(.22,1,.36,1);max-height:85vh;overflow-y:auto;}
</style>
</head>
<body>
<div id="app">
  <div id="toast-area"></div>

    <div id="ue-modal"><div id="ue-content"></div></div>
  </div>
</div>
<script>
const SB='https://rxhjuetoxyjrairroycb.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q';
const TC={livre:'#FFB800',formation:'#FF6B35',logiciel:'#00E5A0',audio:'#B04FFF'};
const PAYS_OPT=[['CI','🇨🇮 Côte d\'Ivoire'],['CM','🇨🇲 Cameroun'],['SN','🇸🇳 Sénégal'],['BJ','🇧🇯 Bénin'],['BF','🇧🇫 Burkina Faso'],['ML','🇲🇱 Mali'],['GH','🇬🇭 Ghana'],['TG','🇹🇬 Togo'],['OTHER','🌍 International']];

const S={sess:null,prof:null,sub:'add',products:[],users:[],notifs:[],contacts:[],cFilt:[],userF:'all',saving:false,del:null,featured:false,imgUrl:'',imgPrev:'',bucket:null,ueAdmin:false};
const tok=()=>S.sess?.access_token||ANON;
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const tc=t=>TC[t]||'#00D4FF';
const fmt=p=>Number(p).toLocaleString('fr-FR');
const fmtD=d=>new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
function spin(){return`<span style="display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.25);border-top-color:#070B17;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;"></span>`;}
function spinW(){return`<span style="display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#E8EEFF;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;"></span>`;}
function tLogo(sz=18){return`<span style="display:inline-flex;align-items:center;"><span class="gc" style="font-family:'Syne',sans-serif;font-weight:800;font-size:${sz}px;">DIGI</span><span class="gg" style="font-family:'Syne',sans-serif;font-weight:800;font-size:${sz}px;">FORM</span></span>`;}

let _tt;
function showToast(msg,t='success'){
  clearTimeout(_tt);
  const c={success:'linear-gradient(135deg,#00E5A0,#00A060)',error:'linear-gradient(135deg,#FF5050,#C00)',warning:'linear-gradient(135deg,#FFB800,#FF7A00)',info:'linear-gradient(135deg,#00D4FF,#0099FF)'};
  const el=document.getElementById('toast-area');if(!el)return;
  el.innerHTML=`<div style="position:fixed;top:68px;left:50%;transform:translateX(-50%);background:${c[t]||c.info};color:#fff;padding:11px 22px;border-radius:20px;z-index:9999;font-weight:700;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.6);animation:rise .3s ease;white-space:nowrap;max-width:92vw;text-align:center;">${msg}</div>`;
  _tt=setTimeout(()=>{el.innerHTML='';},3500);
}

async function dbReq(path,opts={}){
  try{
    const r=await fetch(`${SB}/rest/v1/${path}`,{...opts,headers:{apikey:ANON,Authorization:`Bearer ${tok()}`,'Content-Type':'application/json',...(['POST','PATCH','PUT'].includes(opts.method)?{Prefer:'return=representation'}:{}),...(opts.headers||{})}});
    let d;try{d=await r.json();}catch{}
    return{ok:r.ok,d,status:r.status};
  }catch{return{ok:false,d:null,status:0};}
}
async function authReq(ep,body){
  try{const r=await fetch(`${SB}/auth/v1/${ep}`,{method:'POST',headers:{'Content-Type':'application/json',apikey:ANON},body:JSON.stringify(body)});return await r.json();}
  catch{return{error:'network'};}
}
async function chargerTout(path){
  const PAGE=1000;let res=[],off=0,done=false;
  while(!done){try{const r=await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:ANON,Authorization:`Bearer ${tok()}`,'Range-Unit':'items','Range':`${off}-${off+PAGE-1}`,'Prefer':'count=none'}});const d=await r.json();if(!Array.isArray(d)||d.length===0)done=true;else{res=[...res,...d];if(d.length<PAGE)done=true;else off+=PAGE;}}catch{done=true;}}
  return res;
}

async function loadProducts(){const{ok,d}=await dbReq('products?order=created_at.desc');if(ok&&Array.isArray(d))S.products=d;}
async function loadUsers(){const{ok,d}=await dbReq('profiles?order=created_at.desc');if(ok&&Array.isArray(d))S.users=d;}
async function loadNotifs(){const{ok,d}=await dbReq('notifications?order=created_at.desc');if(ok&&Array.isArray(d))S.notifs=d;}
async function loadContacts(){S.contacts=await chargerTout('pre_contacts?order=created_at.desc&select=id,full_name,phone,email,profession,country_code,created_at');filtrerContacts();}
function filtrerContacts(){
  const q=(document.getElementById('c-srch')?.value||'').toLowerCase().trim();
  S.cFilt=S.contacts.filter(c=>!q||(c.full_name||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.profession||'').toLowerCase().includes(q)||(c.country_code||'').toLowerCase().includes(q));
  afficherContacts();
}
function afficherContacts(){
  const el=document.getElementById('c-list');if(!el)return;
  const lbl=document.getElementById('c-lbl');
  if(lbl)lbl.textContent=`${S.contacts.length} contacts importés · ${S.cFilt.length} résultats`;
  const show=S.cFilt.slice(0,60);
  el.innerHTML=show.length===0?'<div style="text-align:center;padding:20px;color:#5B6A90;font-size:13px;">Aucun résultat</div>':
    show.map(c=>`
    <div style="background:#0D1426;border-radius:12px;padding:11px;border:1px solid rgba(255,255,255,.06);display:flex;gap:9px;align-items:center;margin-bottom:7px;">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(0,212,255,.12);color:#00D4FF;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0;">${(c.full_name||'?').charAt(0).toUpperCase()}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.full_name||'Sans nom')}</div>
        <div style="font-size:11px;color:#5B6A90;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.phone||'')}${c.profession?' · '+esc(c.profession):''}${c.country_code?' · '+esc(c.country_code):''}</div>
      </div>
      <button onclick="supprimerContact('${c.id}')" class="btn btn-rb" style="padding:6px 9px;border-radius:8px;font-size:13px;flex-shrink:0;">🗑️</button>
    </div>`).join('')+
    (S.cFilt.length>60?`<div style="text-align:center;padding:8px;color:#5B6A90;font-size:12px;">+${S.cFilt.length-60} autres — affinez la recherche</div>`:'');
}

/* MEMBRES */
function tUsers(){
  const admins=S.users.filter(u=>u.is_admin).length;

    const mf=S.userF==='all'||(S.userF==='admin'&&u.is_admin)||(S.userF==='user'&&!u.is_admin);

  });
  return`<div class="page" style="display:flex;flex-direction:column;gap:11px;">

      <div style="background:#0D1426;border-radius:12px;padding:12px 8px;border:1px solid rgba(255,255,255,.07);text-align:center;"><div style="font-size:22px;font-weight:800;font-family:'Syne',sans-serif;">${S.users.length}</div><div style="font-size:10px;color:#5B6A90;margin-top:2px;">Total</div></div>

/* SETUP SQL */
const SQL_TEXT=`-- DIGIFORM SETUP SQL
-- Supabase > SQL Editor > Exécuter

CREATE TABLE IF NOT EXISTS public.profiles (
  id UUID REFERENCES auth.users(id) ON DELETE CASCADE PRIMARY KEY,
  email TEXT DEFAULT '', full_name TEXT DEFAULT '',
  phone TEXT DEFAULT '', profession TEXT DEFAULT '',
  show_in_network BOOLEAN DEFAULT true,
  is_admin BOOLEAN DEFAULT false,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  updated_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.products (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title TEXT NOT NULL, description TEXT DEFAULT '',
  price NUMERIC DEFAULT 0, type TEXT DEFAULT 'livre',
  image_url TEXT DEFAULT '', whatsapp_number TEXT DEFAULT '',
  featured BOOLEAN DEFAULT false, created_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.pre_contacts (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  full_name TEXT DEFAULT '', phone TEXT DEFAULT '',
  email TEXT DEFAULT '', profession TEXT DEFAULT '',
  country_code TEXT DEFAULT '', show_in_network BOOLEAN DEFAULT true,
  source TEXT DEFAULT 'admin', created_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.notifications (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title TEXT NOT NULL, body TEXT NOT NULL,
  created_by UUID REFERENCES auth.users(id) ON DELETE SET NULL,
  created_at TIMESTAMPTZ DEFAULT NOW()
);
CREATE TABLE IF NOT EXISTS public.notification_reads (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
  notification_id UUID REFERENCES public.notifications(id) ON DELETE CASCADE,
  read_at TIMESTAMPTZ DEFAULT NOW(),
  UNIQUE(user_id, notification_id)
);
ALTER TABLE public.profiles DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.products DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.pre_contacts DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.notifications DISABLE ROW LEVEL SECURITY;
ALTER TABLE public.notification_reads DISABLE ROW LEVEL SECURITY;
GRANT ALL ON public.profiles TO anon, authenticated;
GRANT ALL ON public.products TO anon, authenticated;
GRANT ALL ON public.pre_contacts TO anon, authenticated;
GRANT ALL ON public.notifications TO anon, authenticated;
GRANT ALL ON public.notification_reads TO anon, authenticated;
CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS TRIGGER LANGUAGE plpgsql SECURITY DEFINER AS $$
BEGIN
  INSERT INTO public.profiles (id,email,full_name,phone,profession,show_in_network)
  VALUES (NEW.id,NEW.email,
    COALESCE(NEW.raw_user_meta_data->>'full_name',''),
    COALESCE(NEW.raw_user_meta_data->>'phone',''),
    COALESCE(NEW.raw_user_meta_data->>'profession',''),
    COALESCE((NEW.raw_user_meta_data->>'show_in_network')::boolean,true))
  ON CONFLICT (id) DO UPDATE SET email=EXCLUDED.email;
  RETURN NEW;
END;$$;
DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
CREATE TRIGGER on_auth_user_created AFTER INSERT ON auth.users FOR EACH ROW EXECUTE PROCEDURE public.handle_new_user();
-- DEVENIR ADMIN:
-- UPDATE public.profiles SET is_admin=true WHERE email='votre@email.com';`;

function renderView(){

  el.innerHTML=`<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">${tHeader()}${tTabs()}<div id="content" style="flex:1;overflow-y:auto;padding:15px 13px;">${renderSub()}</div></div>`;

}
function renderSub(){
  if(S.sub==='add')      return tAddProduct();
  if(S.sub==='list')     return tProductsList();
  if(S.sub==='contacts') return tContacts();
  if(S.sub==='users')    return tUsers();
  if(S.sub==='notifs')   return tNotifs();
  if(S.sub==='sql')      return tSql();
  return '';
}
function renderContent(){
  const el=document.getElementById('content');if(!el)return;

/* ── BIND LOGIN ── */
function bindLogin(){
  const go=async()=>{
    const email=(document.getElementById('l-email')?.value||'').trim();
    const pwd=document.getElementById('l-pwd')?.value||'';
    if(!email||!pwd){rerenderLogin('Remplissez tous les champs');return;}
    rerenderLogin('',true);
    const d=await authReq('token?grant_type=password',{email,password:pwd});
    if(d.access_token){
      S.sess={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};
      try{localStorage.setItem('dg_adm_sess',JSON.stringify(S.sess));}catch{}
      const{ok,d:pd}=await dbReq(`profiles?id=eq.${S.sess.user.id}`);
      if(ok&&Array.isArray(pd)&&pd[0]){
        S.prof=pd[0];
        if(!S.prof.is_admin){S.sess=null;localStorage.removeItem('dg_adm_sess');rerenderLogin('Accès refusé — ce compte n\'est pas administrateur');return;}
      }
      await Promise.all([loadProducts(),loadUsers(),loadNotifs()]);
      renderView();
    }else rerenderLogin(d.error_description||d.message||'Identifiants incorrects');
  };
  function rerenderLogin(err='',busy=false){
    document.getElementById('view').innerHTML=tLogin(err,busy);
    document.getElementById('l-btn')?.addEventListener('click',go);
    document.getElementById('l-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  }
  document.getElementById('l-btn')?.addEventListener('click',go);
  document.getElementById('l-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}

/* ── BIND PANEL ── */
function bindPanel(){
  document.querySelectorAll('[data-sub]').forEach(el=>el.addEventListener('click',async()=>{
    S.sub=el.dataset.sub;
    if(S.sub==='users')await loadUsers();
    if(S.sub==='notifs')await loadNotifs();
    if(S.sub==='list')await loadProducts();
    renderContent();
  }));
  bindContent();
}

/* ── BIND CONTENT ── */
function bindContent(){
  /* PRODUIT */
  if(S.sub==='add'){
    document.getElementById('fp-btn')?.removeAttribute('disabled');
  }
  if(S.sub==='list'){
    document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',async()=>{
      const id=el.dataset.del;S.del=id;el.disabled=true;el.innerHTML=spinW();
      const{ok}=await dbReq(`products?id=eq.${id}`,{method:'DELETE'});S.del=null;
      if(ok){await loadProducts();showToast('Produit supprimé');renderContent();}
      else{showToast('Erreur suppression','error');el.disabled=false;el.textContent='🗑️';}
    }));
  }
  /* CONTACTS */
  if(S.sub==='contacts'){
    if(S.contacts.length>0)afficherContacts();
  }
  /* USERS */
  if(S.sub==='users'){
    window.setUF=f=>{S.userF=f;renderContent();};
    document.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',async()=>{
      const uid=el.dataset.toggle,isAdm=el.dataset.is==='1';el.disabled=true;el.innerHTML=spinW();
      const{ok,status}=await dbReq(`profiles?id=eq.${uid}`,{method:'PATCH',body:JSON.stringify({is_admin:!isAdm})});
      if(ok){const u=S.users.find(x=>x.id===uid);if(u)u.is_admin=!isAdm;showToast('Rôle mis à jour');renderContent();}
      else{showToast(`Erreur ${status}`,'error');el.disabled=false;el.textContent=isAdm?'-Adm':'+Adm';}
    }));
    document.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',()=>ouvrirUE(el.dataset.edit)));
  }
  /* SQL */
  if(S.sub==='sql'){
    // bind via onclick dans le HTML
  }
}

function toggleFeat(){

async function publierProduit(){
  const title=(document.getElementById('fp-title')?.value||'').trim();
  const price=document.getElementById('fp-price')?.value||'';
  if(!title||!price){showToast('Titre et prix requis','error');return;}
  const btn=document.getElementById('fp-btn');S.saving=true;btn.disabled=true;btn.innerHTML=spin()+' Publication…';
  const{ok,status}=await dbReq('products',{method:'POST',body:JSON.stringify({title,description:(document.getElementById('fp-desc')?.value||'').trim(),price:Number(price),type:document.getElementById('fp-type')?.value||'livre',image_url:(document.getElementById('fp-img')?.value||'').trim(),whatsapp_number:(document.getElementById('fp-wa')?.value||'').trim(),featured:S.featured})});
  S.saving=false;btn.disabled=false;btn.textContent='Publier le produit';
  if(ok){S.featured=false;await loadProducts();showToast('Produit publié !');['fp-title','fp-desc','fp-price','fp-img','fp-wa'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});}
  else showToast(`Erreur ${status}`,'error');
}

async function ajouterContact(){
  const name=(document.getElementById('cn-name')?.value||'').trim();
  const phone=(document.getElementById('cn-phone')?.value||'').trim();
  const email=(document.getElementById('cn-email')?.value||'').trim();
  const prof=(document.getElementById('cn-prof')?.value||'').trim();
  const pays=document.getElementById('cn-pays')?.value||'OTHER';
  if(!name||!phone){showToast('Nom et téléphone requis','error');return;}
  const btn=document.getElementById('cn-btn');btn.disabled=true;btn.innerHTML=spin()+' Ajout…';
  const{ok,status}=await dbReq('pre_contacts',{method:'POST',body:JSON.stringify({full_name:name,phone,email,profession:prof,country_code:pays,show_in_network:true,source:'admin'})});
  btn.disabled=false;btn.textContent='Ajouter le contact';
  const st=document.getElementById('cn-status');
  if(ok){
    ['cn-name','cn-phone','cn-email','cn-prof'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
    if(st){st.style.display='block';st.style.color='#00E5A0';st.style.background='rgba(0,229,160,.08)';st.style.border='1px solid rgba(0,229,160,.3)';st.textContent=`${name} ajouté avec succès !`;}
    showToast(`${name} ajouté !`);
    await loadContacts();
  }else{
    if(st){st.style.display='block';st.style.color='#FF5050';st.style.background='rgba(255,80,80,.08)';st.style.border='1px solid rgba(255,80,80,.3)';st.textContent=`Erreur ${status}`;}
    showToast(`Erreur ${status}`,'error');
  }
}

async function supprimerContact(id){
  if(!confirm('Supprimer ce contact ?'))return;
  const{ok}=await dbReq(`pre_contacts?id=eq.${id}`,{method:'DELETE'});
  if(ok){showToast('Contact supprimé');S.contacts=S.contacts.filter(c=>c.id!==id);filtrerContacts();}
  else showToast('Erreur suppression','error');
}

async function promouvoir(){
  const email=(document.getElementById('promo-inp')?.value||'').trim().toLowerCase();
  if(!email){showToast('Email requis','error');return;}
  const btn=document.getElementById('promo-btn');btn.disabled=true;btn.innerHTML=spinW();
  const{ok,d}=await dbReq(`profiles?email=eq.${encodeURIComponent(email)}`);
  if(ok&&Array.isArray(d)&&d[0]){
    if(d[0].is_admin){showToast('Déjà admin','warning');}
    else{const r=await dbReq(`profiles?id=eq.${d[0].id}`,{method:'PATCH',body:JSON.stringify({is_admin:true})});if(r.ok){const inp=document.getElementById('promo-inp');if(inp)inp.value='';await loadUsers();showToast(`${email} est admin !`);btn.disabled=false;btn.textContent='OK';renderContent();return;}else showToast(`Erreur ${r.status}`,'error');}
  }else showToast(`Aucun compte pour ${email}`,'error');
  btn.disabled=false;btn.textContent='OK';
}

let sendingNotif=false;
async function envoyerNotif(){
  if(sendingNotif)return;
  const title=(document.getElementById('n-title')?.value||'').trim();
  const body=(document.getElementById('n-body')?.value||'').trim();
  if(!title||!body){showToast('Titre et message requis','error');return;}
  sendingNotif=true;const btn=document.getElementById('n-btn');btn.disabled=true;btn.innerHTML=spin()+' Envoi…';
  const{ok,status}=await dbReq('notifications',{method:'POST',body:JSON.stringify({title,body,created_by:S.sess?.user?.id||null})});
  sendingNotif=false;btn.disabled=false;btn.textContent='Envoyer à tous';

  if(ok){const t=document.getElementById('n-title'),b=document.getElementById('n-body');if(t)t.value='';if(b)b.value='';if(st){st.style.display='block';st.style.color='#00E5A0';st.style.background='rgba(0,229,160,.08)';st.style.border='1px solid rgba(0,229,160,.3)';st.textContent='Notification envoyée à tous !';}showToast('Notification envoyée !');await loadNotifs();renderContent();}
  else{if(st){st.style.display='block';st.style.color='#FF5050';st.style.background='rgba(255,80,80,.08)';st.style.border='1px solid rgba(255,80,80,.3)';st.textContent=`Erreur ${status}`;}showToast(`Erreur ${status}`,'error');}
}

      <div><label class="lbl">Profession</label><input id="ue-prof" class="inp" value="${esc(u.profession||'')}" placeholder="Ex: Marketing Digital"></div>
      <div onclick="toggleUEAdmin()" style="display:flex;align-items:center;gap:10px;background:#131C35;padding:11px 13px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,.06);">
        <div id="ue-tog" style="width:38px;height:20px;border-radius:10px;background:${u.is_admin?'linear-gradient(135deg,#00D4FF,#0099FF)':'#1E2D55'};position:relative;transition:background .22s;flex-shrink:0;">
          <div id="ue-knob" style="position:absolute;top:2px;left:${u.is_admin?20:2}px;width:16px;height:16px;border-radius:50%;background:white;transition:left .22s;box-shadow:0 2px 5px rgba(0,0,0,.3);"></div>
        </div>
        <span style="font-size:13px;color:#E8EEFF;">Administrateur</span>
      </div>
    </div>
    <div style="display:flex;gap:9px;">
      <button onclick="sauvegarderUE('${u.id}')" class="btn btn-cy" style="flex:1;padding:12px;border-radius:12px;font-size:14px;" id="ue-save">Sauvegarder</button>
      <button onclick="fermerUE()" class="btn" style="flex:1;padding:12px;border-radius:12px;font-size:14px;background:rgba(255,255,255,.06);color:#E8EEFF;border:1px solid rgba(255,255,255,.1);">Annuler</button>
    </div>`;
  document.getElementById('ue-overlay').classList.add('show');
}
function toggleUEAdmin(){
  S.ueAdmin=!S.ueAdmin;
  const tog=document.getElementById('ue-tog'),knob=document.getElementById('ue-knob');
  if(tog)tog.style.background=S.ueAdmin?'linear-gradient(135deg,#00D4FF,#0099FF)':'#1E2D55';
  if(knob)knob.style.left=S.ueAdmin?'20px':'2px';
}
function fermerUE(){document.getElementById('ue-overlay').classList.remove('show');}
async function sauvegarderUE(id){
  const name=(document.getElementById('ue-name')?.value||'').trim();
  const phone=(document.getElementById('ue-phone')?.value||'').trim();
  const prof=(document.getElementById('ue-prof')?.value||'').trim();
  const btn=document.getElementById('ue-save');btn.disabled=true;btn.textContent='Sauvegarde…';
  const{ok,status}=await dbReq(`profiles?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({full_name:name,phone,profession:prof,is_admin:S.ueAdmin,updated_at:new Date().toISOString()})});
  if(ok){const u=S.users.find(x=>x.id===id);if(u){u.full_name=name;u.phone=phone;u.profession=prof;u.is_admin=S.ueAdmin;}fermerUE();showToast('Utilisateur mis à jour !');renderContent();}
  else{showToast(`Erreur ${status}`,'error');btn.disabled=false;btn.textContent='Sauvegarder';}
}

/* ── INIT ── */
async function init(){
  try{
    const s=JSON.parse(localStorage.getItem('dg_adm_sess')||'null');
    if(s?.access_token){
      S.sess=s;
      const{ok,d}=await dbReq(`profiles?id=eq.${s.user.id}`);
      if(ok&&Array.isArray(d)&&d[0]&&d[0].is_admin){
        S.prof=d[0];await Promise.all([loadProducts(),loadUsers(),loadNotifs()]);
      }else{S.sess=null;localStorage.removeItem('dg_adm_sess');}
    }
  }catch{S.sess=null;}
  renderView();
}
init();
</script>
</body>
</html>
