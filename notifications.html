<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>DIGIFORM · Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04080F;--s1:#0A1020;--s2:#101828;--s3:#182035;--s4:#1E2D4A;
  --cyan:#00D4FF;--c2:#0099FF;--gold:#FFB800;--green:#00E5A0;--red:#FF4F6A;
  --tx:#E8EEFF;--t2:#8899BB;--t3:#4B5E80;--t4:#2A3A58;
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:'Epilogue',sans-serif;overflow-x:hidden;}
body{max-width:430px;margin:0 auto;}
@keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes pop{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:none;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.6);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shimmer{from{background-position:-200%;}to{background-position:200%;}}
.gc{background:linear-gradient(135deg,#fff 10%,#9DCFFF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gg{background:linear-gradient(135deg,var(--gold),#FF7A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* HEADER */
#hdr{position:sticky;top:0;z-index:200;background:rgba(4,8,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:11px 15px;display:flex;align-items:center;gap:10px;}
.hdr-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;line-height:1;letter-spacing:-.02em;}
.hdr-sub{font-size:.6rem;color:var(--t3);margin-top:2px;letter-spacing:.07em;text-transform:uppercase;}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--s2);border:1px solid var(--s4);color:var(--tx);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;transition:all .2s;}
.back-btn:hover{border-color:rgba(0,212,255,.3);color:var(--cyan);}

/* PAGE */
.pg{padding:14px 13px 90px;animation:rise .38s cubic-bezier(.22,1,.36,1) both;}

/* CONTROLS */
.ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:10px 14px;background:var(--s1);border:1px solid var(--s4);border-radius:13px;}
.ctrl-count{font-size:.82rem;font-weight:700;color:var(--tx);}
.ctrl-count span{color:var(--cyan);}
.mark-all{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);color:var(--cyan);border-radius:9px;padding:7px 12px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Epilogue',sans-serif;transition:all .2s;}
.mark-all:hover{background:rgba(0,212,255,.18);}
.mark-all:disabled{opacity:.4;cursor:not-allowed;}

/* NOTIF ITEMS */
.nitem{
  background:var(--s1);border:1px solid var(--s4);
  border-radius:14px;padding:14px;margin-bottom:9px;
  transition:all .2s;animation:rise .35s ease both;
}
.nitem.unread{
  background:rgba(0,212,255,.04);
  border-color:rgba(0,212,255,.18);
  cursor:pointer;
}
.nitem.unread:hover{border-color:rgba(0,212,255,.35);background:rgba(0,212,255,.07);}
.nitem.unread:active{transform:scale(.99);}
.nhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.ntitle{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--tx);flex:1;line-height:1.3;}
.ndot{width:9px;height:9px;border-radius:50%;background:var(--cyan);flex-shrink:0;margin-top:3px;animation:pulse 2s infinite;}
.nbody{font-size:.8rem;color:var(--t2);line-height:1.65;}
.ndate{font-size:.68rem;color:var(--t4);margin-top:7px;}
.ntype{font-size:.65rem;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}

/* SHIMMER */
.shim{background:linear-gradient(90deg,var(--s1) 25%,var(--s3) 50%,var(--s1) 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:14px;height:90px;margin-bottom:9px;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 24px;gap:13px;text-align:center;}
.empty-ico{font-size:3.5rem;animation:float 4s ease-in-out infinite;}
.empty-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.empty-sub{font-size:.82rem;color:var(--t2);line-height:1.65;max-width:240px;}

/* GATE */
.gate{display:flex;flex-direction:column;align-items:center;padding:70px 24px;gap:16px;text-align:center;}
.gate-ico{font-size:3.5rem;animation:float 4s ease-in-out infinite;}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'Epilogue',sans-serif;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:scale(.96);}
.btn-cy{background:linear-gradient(135deg,var(--cyan),var(--c2));color:#04080F;}
.btn-sm{padding:8px 16px;border-radius:10px;font-size:.82rem;}

/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(4,8,15,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:5px 6px 18px;display:flex;z-index:500;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:7px 4px;background:none;border:none;color:var(--t3);font-family:'Epilogue',sans-serif;position:relative;transition:color .2s;text-decoration:none;}
.nb.on{color:var(--cyan);}
.nb-dot{position:absolute;top:0;left:50%;transform:translateX(-50%);width:18px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--c2));display:none;}
.nb.on .nb-dot{display:block;}
.nb-ico{font-size:1.25rem;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.nb.on .nb-ico{transform:scale(1.2);}
.nb-lbl{font-size:.6rem;font-weight:600;letter-spacing:.02em;}
.nb.on .nb-lbl{font-weight:700;}

/* TOAST */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:999px;z-index:9999;font-weight:700;font-size:.82rem;box-shadow:0 12px 36px rgba(0,0,0,.6);white-space:nowrap;max-width:90vw;text-align:center;display:none;}
#toast.show{display:block;animation:rise .3s ease;}
#toast.ok{background:linear-gradient(135deg,var(--green),#00A070);color:#04080F;}
#toast.err{background:linear-gradient(135deg,var(--red),#C00);color:#fff;}
#toast.inf{background:linear-gradient(135deg,var(--cyan),var(--c2));color:#04080F;}

@media(min-width:430px){body{box-shadow:0 0 60px rgba(0,0,0,.6);}#nav,#hdr{max-width:430px;}}
</style>
</head>
<body>

<header id="hdr">
  <a class="back-btn" href="javascript:history.back()">←</a>
  <div style="flex:1;min-width:0;padding-left:8px;">
    <div class="hdr-logo"><span class="gc">DIGI</span><span class="gg">FORM</span></div>
    <div class="hdr-sub" id="hdr-sub">NOTIFICATIONS</div>
  </div>
</header>

<div class="pg">

  <!-- GATE -->
  <div id="gate" style="display:none;">
    <div class="gate">
      <div class="gate-ico">🔒</div>
      <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;">Réservé aux membres</div>
      <div style="font-size:.85rem;color:var(--t2);line-height:1.7;max-width:240px;">Connectez-vous pour recevoir les notifications de l'équipe DIGIFORM.</div>
      <a href="auth.html" class="btn btn-cy btn-sm" style="text-decoration:none;">🔑 Se connecter</a>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main" style="display:none;">

    <!-- CONTROLS -->
    <div class="ctrl">
      <div class="ctrl-count" id="unread-lbl">Chargement…</div>
      <button class="mark-all" id="mark-all-btn" onclick="markAll()">✅ Tout marquer lu</button>
    </div>

    <!-- SHIMMER -->
    <div id="shim">
      <div class="shim"></div>
      <div class="shim" style="height:70px;"></div>
      <div class="shim" style="height:100px;"></div>
    </div>

    <!-- LIST -->
    <div id="nlist"></div>

    <!-- EMPTY -->
    <div class="empty" id="empt" style="display:none;">
      <div class="empty-ico">🔕</div>
      <div class="empty-title">Aucune notification</div>
      <div class="empty-sub">Vous serez notifié des nouveaux produits et actualités DIGIFORM ici.</div>
    </div>

  </div>
</div>

<!-- NAV -->
<nav id="nav">
  <a class="nb" href="dashboard.html"><div class="nb-dot"></div><span class="nb-ico">🏠</span><span class="nb-lbl">Accueil</span></a>
  <a class="nb" href="dashboard.html"><div class="nb-dot"></div><span class="nb-ico">🗂️</span><span class="nb-lbl">Catalogue</span></a>
  <a class="nb" href="network.html"><div class="nb-dot"></div><span class="nb-ico">🌐</span><span class="nb-lbl">Réseau</span></a>
  <a class="nb" href="profile.html"><div class="nb-dot"></div><span class="nb-ico">👤</span><span class="nb-lbl">Profil</span></a>
</nav>

<div id="toast"></div>

<script>
const SB   = 'https://rxhjuetoxyjrairroycb.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q';

function getSess(){try{return JSON.parse(localStorage.getItem('dg_sess')||'null');}catch{return null;}}
const sess=getSess();

let notifs=[],reads=[],toTm;

function toast(msg,t='ok'){clearTimeout(toTm);const e=document.getElementById('toast');e.textContent=msg;e.className='show '+t;toTm=setTimeout(()=>e.classList.remove('show'),4000);}

async function dbGet(path,tok){
  try{const r=await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:ANON,Authorization:`Bearer ${tok||ANON}`}});const d=await r.json();return Array.isArray(d)?d:[];}
  catch{return[];}
}
async function dbPost(path,body,tok){
  try{await fetch(`${SB}/rest/v1/${path}`,{method:'POST',headers:{apikey:ANON,Authorization:`Bearer ${tok}`,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(body)});}
  catch{}
}

async function init(){
  if(!sess){document.getElementById('gate').style.display='block';return;}
  document.getElementById('main').style.display='block';
  const [n,r]=await Promise.all([
    dbGet('notifications?order=created_at.desc',sess.access_token),
    dbGet(`notification_reads?user_id=eq.${sess.user.id}&select=notification_id`,sess.access_token)
  ]);
  notifs=n;
  reads=r.map(x=>x.notification_id);
  document.getElementById('shim').style.display='none';
  render();
}

function render(){
  const unread=notifs.filter(n=>!reads.includes(n.id)).length;
  document.getElementById('unread-lbl').innerHTML=`<span>${unread}</span> non lu${unread>1?'s':''}`;
  document.getElementById('hdr-sub').textContent=`${notifs.length} NOTIFICATION${notifs.length>1?'S':''}`;
  document.getElementById('mark-all-btn').disabled=unread===0;
  if(!notifs.length){document.getElementById('nlist').innerHTML='';document.getElementById('empt').style.display='flex';return;}
  document.getElementById('empt').style.display='none';
  document.getElementById('nlist').innerHTML=notifs.map((n,i)=>{
    const isRead=reads.includes(n.id);
    const d=new Date(n.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    return `
    <div class="nitem${isRead?'':' unread'}" id="ni-${n.id}" onclick="${isRead?'':'markOne(\''+n.id+'\')'}" style="animation-delay:${i*.04}s;">
      <div class="nhead">
        <div class="ntitle">${n.title}</div>
        ${!isRead?'<div class="ndot"></div>':''}
      </div>
      <div class="nbody">${n.body}</div>
      <div class="ndate">${d} · DF</div>
    </div>`;
  }).join('');
}

async function markOne(nid){
  await dbPost('notification_reads',{user_id:sess.user.id,notification_id:nid},sess.access_token);
  reads.push(nid);
  const el=document.getElementById('ni-'+nid);
  if(el){
    el.classList.remove('unread');el.onclick=null;
    el.querySelector('.ndot')?.remove();
  }
  const unread=notifs.filter(n=>!reads.includes(n.id)).length;
  document.getElementById('unread-lbl').innerHTML=`<span>${unread}</span> non lu${unread>1?'s':''}`;
  document.getElementById('mark-all-btn').disabled=unread===0;
}

async function markAll(){
  const btn=document.getElementById('mark-all-btn');
  btn.disabled=true;btn.textContent='⏳…';
  const unreadIds=notifs.filter(n=>!reads.includes(n.id)).map(n=>n.id);
  await Promise.all(unreadIds.map(nid=>dbPost('notification_reads',{user_id:sess.user.id,notification_id:nid},sess.access_token)));
  reads=[...new Set([...reads,...unreadIds])];
  render();
  toast('✅ Toutes les notifications marquées comme lues','ok');
}

init();
</script>
</body>
</html>
