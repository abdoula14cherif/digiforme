<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>DIGIFORM · Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F8F9FC;--bg2:#FFFFFF;--bg3:#F1F3F8;--bg4:#E4E8F0;
  --border:#D8DCE8;--text:#111827;--text2:#4B5563;--text3:#9CA3AF;
  --blue:#2563EB;--blue2:#1D4ED8;--gold:#F59E0B;--green:#10B981;--red:#EF4444;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.1);
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;max-width:430px;margin:0 auto;overflow-x:hidden;}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}

/* LOGO */
.logo{font-family:'Syne',sans-serif;font-weight:800;line-height:1;white-space:nowrap;}
.logo-d{color:#1E40AF;}.logo-f{color:var(--gold);}

/* WRAP */
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 18px 48px;}
.back-link{align-self:flex-start;font-size:.82rem;color:var(--text3);text-decoration:none;margin-bottom:20px;display:flex;align-items:center;gap:5px;}
.back-link:hover{color:var(--blue);}
.logo-block{text-align:center;margin-bottom:22px;}
.logo-block .logo{font-size:2rem;}
.logo-sub{font-size:.62rem;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-top:5px;}

/* BOX */
.box{width:100%;max-width:390px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px 18px 26px;box-shadow:var(--sh2);animation:rise .4s cubic-bezier(.22,1,.36,1);}

/* TABS */
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:20px;border:1px solid var(--border);gap:3px;}
.tab{flex:1;padding:9px 0;border-radius:8px;font-size:.83rem;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;transition:all .2s;background:transparent;color:var(--text3);}
.tab.on{background:var(--bg2);color:var(--blue);box-shadow:var(--sh);}

/* FORM */
.section-lbl{font-size:.6rem;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.fg{margin-bottom:11px;}
.lbl{font-size:.72rem;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;}
.inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;padding:11px 14px;width:100%;outline:none;transition:all .2s;display:block;}
.inp:focus{border-color:var(--blue);background:#EFF6FF;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.inp::placeholder{color:var(--text3);}
select.inp{cursor:pointer;-webkit-appearance:none;}
.inp-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pw-wrap{position:relative;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--text3);padding:4px;}

/* TOGGLE VISIBLE */
.vis-row{display:flex;align-items:flex-start;gap:10px;background:var(--bg3);padding:11px 12px;border-radius:10px;border:1px solid var(--border);cursor:pointer;margin-top:4px;}
.vis-row input[type=checkbox]{width:17px;height:17px;margin-top:1px;accent-color:var(--blue);flex-shrink:0;cursor:pointer;}
.vis-row label{font-size:.77rem;color:var(--text2);cursor:pointer;line-height:1.6;}

/* MESSAGES */
.msg{margin-top:10px;font-size:.79rem;text-align:center;padding:10px 13px;border-radius:9px;line-height:1.55;display:none;}
.msg.show{display:block;}
.msg-err{color:#B91C1C;background:#FEF2F2;border:1px solid #FECACA;}
.msg-ok{color:#065F46;background:#ECFDF5;border:1px solid #A7F3D0;}

/* CTA */
.cta{width:100%;padding:13px;margin-top:14px;background:var(--blue);color:#fff;border:none;border-radius:11px;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:8px;}
.cta:hover:not(:disabled){background:var(--blue2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.3);}
.cta:disabled{opacity:.45;cursor:not-allowed;}
.foot{text-align:center;margin-top:14px;font-size:.8rem;color:var(--text3);}
.foot a{color:var(--blue);font-weight:600;text-decoration:none;cursor:pointer;}
.forgot{text-align:right;margin-top:-4px;margin-bottom:6px;}
.forgot a{font-size:.74rem;color:var(--text3);text-decoration:none;}
.forgot a:hover{color:var(--blue);}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}

/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:999px;z-index:9999;font-weight:700;font-size:.82rem;box-shadow:0 12px 36px rgba(0,0,0,.15);white-space:nowrap;max-width:90vw;text-align:center;display:none;}
#toast.show{display:block;animation:rise .3s ease;}
#toast.ok{background:#10B981;color:#fff;}
#toast.err{background:#EF4444;color:#fff;}
#toast.inf{background:var(--blue);color:#fff;}

@media(min-width:430px){body{box-shadow:0 0 40px rgba(0,0,0,.08);}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html">← Accueil</a>

  <div class="logo-block">
    <div class="logo"><span class="logo-d">DIGI</span><span class="logo-f">FORM</span></div>
    <div class="logo-sub">Plateforme Digitale Africaine</div>
  </div>

  <div class="box">
    <div class="tabs">
      <button class="tab on" id="tab-login" onclick="setMode('login')">Connexion</button>
      <button class="tab" id="tab-register" onclick="setMode('register')">Inscription</button>
    </div>

    <div id="fields"></div>

    <div class="msg msg-err" id="msg-err"></div>
    <div class="msg msg-ok" id="msg-ok"></div>

    <button class="cta" id="cta" onclick="doSubmit()">Se connecter</button>

    <div class="foot">
      <span id="sw-txt">Pas encore membre ?</span>
      <a onclick="switchMode()"><span id="sw-lnk">S'inscrire gratuitement</span></a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB='https://rxhjuetoxyjrairroycb.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q';

function getSess(){try{return JSON.parse(localStorage.getItem('dg_sess')||'null');}catch{return null;}}
function setSess(s){try{localStorage.setItem('dg_sess',JSON.stringify(s));}catch{}}
if(getSess())window.location.replace('dashboard.html');

let mode=new URLSearchParams(location.search).get('mode')==='register'?'register':'login';
let toTm;

function toast(msg,t='ok'){clearTimeout(toTm);const e=document.getElementById('toast');e.textContent=msg;e.className='show '+t;toTm=setTimeout(()=>e.classList.remove('show'),3500);}

function setMode(m){
  mode=m;
  document.getElementById('tab-login').classList.toggle('on',m==='login');
  document.getElementById('tab-register').classList.toggle('on',m==='register');
  document.getElementById('cta').textContent=m==='login'?'Se connecter':'Créer mon compte';
  document.getElementById('sw-txt').textContent=m==='login'?'Pas encore membre ?':'Déjà inscrit ?';
  document.getElementById('sw-lnk').textContent=m==='login'?'S\'inscrire gratuitement':'Se connecter';
  hideMsg();renderFields();
}
function switchMode(){setMode(mode==='login'?'register':'login');}

function renderFields(){
  const el=document.getElementById('fields');
  if(mode==='login'){
    el.innerHTML=`
      <div class="fg"><label class="lbl">Email</label><input class="inp" type="email" id="f-email" placeholder="vous@email.com" autocomplete="email"/></div>
      <div class="fg">
        <label class="lbl">Mot de passe</label>
        <div class="pw-wrap"><input class="inp" type="password" id="f-pwd" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSubmit()"/><button class="pw-eye" onclick="togglePw('f-pwd',this)" type="button">👁</button></div>
      </div>
      <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>`;
  }else{
    el.innerHTML=`
      <div class="section-lbl">Identité</div>
      <div class="inp-2col fg">
        <div><label class="lbl">Prénom *</label><input class="inp" id="f-prenom" placeholder="Prénom"/></div>
        <div><label class="lbl">Nom *</label><input class="inp" id="f-nom" placeholder="Nom"/></div>
      </div>
      <div class="section-lbl">Contact</div>
      <div class="fg"><label class="lbl">WhatsApp *</label><input class="inp" type="tel" id="f-phone" placeholder="+225 07 00 00 00 00"/></div>
      <div class="fg"><label class="lbl">Email *</label><input class="inp" type="email" id="f-email" placeholder="vous@email.com" autocomplete="email"/></div>
      <div class="section-lbl">Profession</div>
      <div class="fg"><label class="lbl">Domaine d'activité *</label>
        <select class="inp" id="f-job">
          <option value="">— Choisir —</option>
          <option>Marketing Digital</option><option>SEO / SEA</option><option>Réseaux Sociaux</option>
          <option>Design / Branding</option><option>Développement Web</option><option>E-commerce</option>
          <option>Content Marketing</option><option>Email Marketing</option><option>Analytics / Data</option>
          <option>Consultant Digital</option><option>Formation / Coach</option><option>Vidéo / Photo</option>
          <option>Audio / Podcast</option><option>Autre</option>
        </select>
      </div>
      <div class="section-lbl">Sécurité</div>
      <div class="fg">
        <label class="lbl">Mot de passe (6 min) *</label>
        <div class="pw-wrap"><input class="inp" type="password" id="f-pwd" placeholder="••••••••" autocomplete="new-password"/><button class="pw-eye" onclick="togglePw('f-pwd',this)" type="button">👁</button></div>
      </div>
      <div class="vis-row" onclick="toggleVis()">
        <input type="checkbox" id="f-visible" checked onclick="event.stopPropagation()"/>
        <label for="f-visible" onclick="event.stopPropagation()">Être visible dans le réseau DIGIFORM et apparaître dans les contacts des membres</label>
      </div>`;
  }
  setTimeout(()=>document.getElementById('f-email')?.focus(),80);
}

function togglePw(id,btn){const i=document.getElementById(id);const h=i.type==='password';i.type=h?'text':'password';btn.textContent=h?'🔒':'👁';}
function toggleVis(){const cb=document.getElementById('f-visible');if(cb)cb.checked=!cb.checked;}

function showErr(msg){const e=document.getElementById('msg-err');e.textContent=msg;e.classList.add('show');}
function showOk(msg){const e=document.getElementById('msg-ok');e.textContent=msg;e.classList.add('show');}
function hideMsg(){document.getElementById('msg-err').classList.remove('show');document.getElementById('msg-ok').classList.remove('show');}

function setBusy(busy,lbl=''){
  const btn=document.getElementById('cta');btn.disabled=busy;
  btn.innerHTML=busy?`<span class="spin"></span> ${lbl}`:(mode==='login'?'Se connecter':'Créer mon compte');
}

async function doSubmit(){
  hideMsg();
  const email=(document.getElementById('f-email')?.value||'').trim();
  const pwd=document.getElementById('f-pwd')?.value||'';
  if(!email){showErr('Email requis');return;}
  if(!pwd){showErr('Mot de passe requis');return;}

  if(mode==='login'){
    setBusy(true,'Connexion…');
    try{
      const r=await fetch(`${SB}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'Content-Type':'application/json',apikey:ANON},body:JSON.stringify({email,password:pwd})});
      const d=await r.json();setBusy(false);
      if(!r.ok||d?.error){showErr(d?.error_description||d?.message||'Email ou mot de passe incorrect');return;}
      setSess({access_token:d.access_token,refresh_token:d.refresh_token,user:d.user});
      toast('Connecté ! Redirection…','ok');
      setTimeout(()=>window.location.replace('dashboard.html'),900);
    }catch{setBusy(false);showErr('Erreur réseau');}
  }else{
    const prenom=(document.getElementById('f-prenom')?.value||'').trim();
    const nom=(document.getElementById('f-nom')?.value||'').trim();
    const phone=(document.getElementById('f-phone')?.value||'').trim();
    const job=document.getElementById('f-job')?.value||'';
    const vis=document.getElementById('f-visible')?.checked!==false;
    if(!prenom||!nom){showErr('Prénom et nom requis');return;}
    if(!phone){showErr('Numéro WhatsApp requis');return;}
    if(!job){showErr('Choisissez votre domaine d\'activité');return;}
    if(pwd.length<6){showErr('Mot de passe : 6 caractères minimum');return;}
    setBusy(true,'Création du compte…');
    try{
      const r=await fetch(`${SB}/auth/v1/signup`,{method:'POST',headers:{'Content-Type':'application/json',apikey:ANON},body:JSON.stringify({email,password:pwd,data:{full_name:`${prenom} ${nom}`.trim(),phone,profession:job,show_in_network:vis}})});
      const d=await r.json();setBusy(false);
      if(!r.ok||d?.error){showErr(d?.error_description||d?.message||'Erreur inscription');return;}
      if(d.access_token){
        setSess({access_token:d.access_token,refresh_token:d.refresh_token,user:d.user});
        toast('Bienvenue dans DIGIFORM !','ok');
        setTimeout(()=>window.location.replace('dashboard.html'),900);
      }else{
        showOk('Compte créé ! Vérifiez votre email pour confirmer, puis connectez-vous.');
        setMode('login');
      }
    }catch{setBusy(false);showErr('Erreur réseau');}
  }
}

renderFields();setMode(mode);
</script>
</body>
</html>
