<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIGIFORM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;overscroll-behavior:none;}
body{background:#070B17;color:#E8EEFF;font-family:'DM Sans',sans-serif;}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden;background:#070B17;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:#1E2D55;border-radius:3px;}

@keyframes dg-spin {to{transform:rotate(360deg);}}
@keyframes dg-fin  {from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes dg-cin  {from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;}}
@keyframes dg-sc   {from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes dg-fl   {0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes dg-sh   {from{background-position:-200%;}to{background-position:200%;}}
@keyframes dg-ov   {from{opacity:0;}to{opacity:1;}}
@keyframes dg-bt   {from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes dg-rt   {from{transform:translateX(100%);}to{transform:translateX(0);}}
@keyframes dg-logo {0%{opacity:0;transform:translateY(28px) scale(.88);}70%{transform:translateY(-3px) scale(1.01);}100%{opacity:1;transform:none;}}
@keyframes dg-shake{0%,100%{transform:translateX(0);}25%,75%{transform:translateX(-5px);}50%{transform:translateX(5px);}}

.page  {animation:dg-fin .42s cubic-bezier(.22,1,.36,1) both;}
.card  {cursor:pointer;animation:dg-cin .4s cubic-bezier(.22,1,.36,1) both;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;}
.card:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 20px 44px rgba(0,0,0,.55);}
.banner{animation:dg-sc 32s linear infinite;display:flex;gap:13px;width:max-content;}
.banner:hover{animation-play-state:paused;}
.shim  {background:linear-gradient(90deg,#0D1426 25%,#1E2D55 50%,#0D1426 75%);background-size:200%;animation:dg-sh 1.5s infinite;}
.btn   {border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:scale(.95);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.cy{background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;}
.cy:hover:not(:disabled){box-shadow:0 8px 24px rgba(0,212,255,.4);}
.go{background:linear-gradient(135deg,#FFB800,#FF7A00);color:#070B17;}
.go:hover:not(:disabled){box-shadow:0 8px 24px rgba(255,184,0,.4);}
.wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;}
.wa:hover:not(:disabled){box-shadow:0 8px 24px rgba(37,211,102,.4);}
.rb{background:rgba(255,80,80,.1);color:#FF5050;border:1px solid rgba(255,80,80,.25)!important;}
.inp{background:#131C35;border:1px solid #1E2D55;border-radius:12px;color:#E8EEFF;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 15px;width:100%;outline:none;transition:border-color .2s;display:block;}
.inp:focus{border-color:#00D4FF;box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.inp::placeholder{color:#3A4A6E;}
textarea.inp{resize:vertical;min-height:80px;}
select.inp{cursor:pointer;-webkit-appearance:none;}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:7px 0;flex:1;background:none;border:none;font-family:'DM Sans',sans-serif;transition:all .2s;}
.nb:hover{opacity:.8;}
.grad-digi{background:linear-gradient(135deg,#fff 20%,#B0D8FF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.grad-form{background:linear-gradient(135deg,#FFB800,#FF6A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.grad-white{background:linear-gradient(135deg,#fff,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.shake{animation:dg-shake .35s ease;}
</style>
</head>
<body>
<div id="app"><div id="toast-area"></div></div>
<script>
/* ───────────── CONSTANTS ─────────────────────────────────── */
const SB   = "https://rxhjuetoxyjrairroycb.supabase.co";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q";
const TC   = {livre:"#FFB800",formation:"#FF6B35",logiciel:"#00E5A0",audio:"#B04FFF"};
const TYPES= [{id:"all",label:"Tout",emoji:"🌐",color:"#00D4FF"},{id:"livre",label:"Livres",emoji:"📚",color:"#FFB800"},{id:"formation",label:"Formations",emoji:"🎬",color:"#FF6B35"},{id:"logiciel",label:"Logiciels",emoji:"💻",color:"#00E5A0"},{id:"audio",label:"Audio",emoji:"🎧",color:"#B04FFF"}];

/* ───────────── STATE ─────────────────────────────────────── */
const S = {
  splash:true,
  session: null,
  profile: null,
  tab:"home", trans:false,
  products:[], loading:true,
  favs: (()=>{try{return JSON.parse(localStorage.getItem("dg_favs")||"[]");}catch{return[];}}()),
  selected:null, search:"", filter:"all",
  notifs:[], reads:new Set(),
  notifOpen:false, authOpen:false, authMode:"login",
  authBusy:false, authErr:"",
  toast:null, toastTimer:null
};

/* ───────────── API ───────────────────────────────────────── */
const tok = () => S.session?.access_token || ANON;

async function db(path, opts={}) {
  try {
    const r = await fetch(`${SB}/rest/v1/${path}`, {
      ...opts,
      headers: {
        apikey:ANON,
        Authorization:`Bearer ${tok()}`,
        "Content-Type":"application/json",
        ...(["POST","PATCH","PUT"].includes(opts.method)?{Prefer:"return=representation"}:{}),
        ...(opts.headers||{})
      }
    });
    let data; try{data=await r.json();}catch{data=null;}
    return {ok:r.ok, data};
  } catch(e) {
    console.warn("db error:", e);
    return {ok:false, data:null};
  }
}

async function authReq(ep, body) {
  try {
    const r = await fetch(`${SB}/auth/v1/${ep}`, {
      method:"POST", headers:{"Content-Type":"application/json", apikey:ANON},
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch { return {error:"network"}; }
}

async function uploadImg(file) {
  try {
    const ext = (file.name.split(".").pop()||"jpg").toLowerCase();
    const name = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const r = await fetch(`${SB}/storage/v1/object/digiform/${name}`, {
      method:"POST",
      headers:{Authorization:`Bearer ${tok()}`, apikey:ANON, "Content-Type":file.type, "x-upsert":"true"},
      body:file
    });
    return r.ok ? `${SB}/storage/v1/object/public/digiform/${name}` : null;
  } catch { return null; }
}

/* ───────────── HELPERS ──────────────────────────────────── */
const tc = t => TC[t]||"#00D4FF";
const te = t => TYPES.find(x=>x.id===t)?.emoji||"📦";
const tp = p => { try{ return Number(p).toLocaleString("fr-FR"); }catch{ return p||"0"; }};
const esc= s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtDate = d => { try{ return new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}); }catch{ return "—"; }};
const fmtTime = d => { try{ const diff=Date.now()-new Date(d); if(diff<60000)return"À l'instant"; if(diff<3600000)return`${Math.floor(diff/60000)}min`; if(diff<86400000)return`${Math.floor(diff/3600000)}h`; return fmtDate(d); }catch{ return "—"; }};
const tLogo = (sz=22) => `<span style="font-family:'Syne',sans-serif;font-weight:800;font-size:${sz}px;line-height:1;display:inline-block;"><span class="grad-digi">DIGI</span><span class="grad-form">FORM</span></span>`;

/* ───────────── ACTIONS ──────────────────────────────────── */
async function loadProducts() {
  S.loading=true;
  try {
    const {ok,data} = await db("products?order=created_at.desc");
    if(ok && Array.isArray(data)) S.products=data;
    else S.products=[];
  } catch(e) {
    console.warn("loadProducts error:", e);
    S.products=[];
  } finally {
    S.loading=false;
  }
}

async function loadNotifs() {
  try {
    const {ok,data} = await db("notifications?order=created_at.desc");
    if(ok && Array.isArray(data)) S.notifs=data;
    else S.notifs=[];
  } catch(e) {
    console.warn("loadNotifs error:", e);
    S.notifs=[];
  }
}

async function loadProfile() {
  if(!S.session) return;
  try {
    const {ok,data} = await db(`profiles?id=eq.${S.session.user.id}`);
    if(ok && Array.isArray(data) && data[0]) S.profile=data[0];
  } catch(e) { console.warn("loadProfile error:", e); }
}

async function loadReads() {
  if(!S.session) return;
  try {
    const {ok,data} = await db(`notification_reads?user_id=eq.${S.session.user.id}&select=notification_id`);
    if(ok && Array.isArray(data)) data.forEach(r=>S.reads.add(r.notification_id));
  } catch(e) { console.warn("loadReads error:", e); }
}

async function markRead(nid) {
  if(!S.session || S.reads.has(nid)) return;
  try {
    await db("notification_reads",{method:"POST",body:JSON.stringify({user_id:S.session.user.id,notification_id:nid})});
    S.reads.add(nid);
  } catch(e) { console.warn("markRead error:", e); }
}

function getUnread() { return (S.notifs||[]).filter(n=>!S.reads.has(n.id)).length; }

function toggleFav(id) {
  if(!S.session){ openAuth(); return; }
  S.favs = S.favs.includes(id) ? S.favs.filter(x=>x!==id) : [...S.favs, id];
  try{localStorage.setItem("dg_favs",JSON.stringify(S.favs));}catch{}
}

function openAuth(mode="login") { S.authMode=mode; S.authOpen=true; S.authErr=""; safeRender(); }

async function doLogin(email,pwd) {
  S.authBusy=true; S.authErr=""; renderAuthInner();
  try {
    const d = await authReq("token?grant_type=password",{email,password:pwd});
    S.authBusy=false;
    if(d && d.access_token) {
      S.session = {access_token:d.access_token, refresh_token:d.refresh_token, user:d.user};
      try{localStorage.setItem("dg_sess",JSON.stringify(S.session));}catch{}
      S.authOpen=false;
      await Promise.all([loadProfile(),loadReads()]);
      showToast("✅ Connecté avec succès !");
      safeRender();
    } else {
      S.authErr = (d&&(d.error_description||d.message))||"Identifiants incorrects";
      renderAuthInner();
    }
  } catch(e) {
    S.authBusy=false;
    S.authErr="Erreur réseau, réessayez";
    renderAuthInner();
  }
}

async function doSignup(name,email,pwd) {
  S.authBusy=true; S.authErr=""; renderAuthInner();
  try {
    const d = await authReq("signup",{email,password:pwd,data:{full_name:name}});
    S.authBusy=false;
    if(d && d.access_token) {
      S.session = {access_token:d.access_token, refresh_token:d.refresh_token, user:d.user};
      try{localStorage.setItem("dg_sess",JSON.stringify(S.session));}catch{}
      S.authOpen=false;
      await Promise.all([loadProfile(),loadReads()]);
      showToast("✅ Compte créé ! Bienvenue 🎉");
      safeRender();
    } else if(d && d.user && !d.access_token) {
      S.authErr="✉️ Confirmez votre email, puis connectez-vous.";
      renderAuthInner();
    } else {
      S.authErr = (d&&(d.error_description||d.message))||"Erreur d'inscription";
      renderAuthInner();
    }
  } catch(e) {
    S.authBusy=false;
    S.authErr="Erreur réseau, réessayez";
    renderAuthInner();
  }
}

async function doLogout() {
  try{await fetch(`${SB}/auth/v1/logout`,{method:"POST",headers:{apikey:ANON,Authorization:`Bearer ${tok()}`}});}catch{}
  try{localStorage.removeItem("dg_sess");}catch{}
  S.session=null; S.profile=null; S.reads=new Set(); S.tab="home";
  showToast("👋 À bientôt !"); safeRender();
}

function switchTab(t) {
  if(t===S.tab||S.trans) return;
  S.trans=true; safeRender();
  setTimeout(()=>{ S.tab=t; S.trans=false; safeRender(); }, 360);
}

function showToast(msg,type="success") {
  if(S.toastTimer) clearTimeout(S.toastTimer);
  S.toast={msg,type};
  S.toastTimer = setTimeout(()=>{ S.toast=null; renderToast(); }, 3200);
  renderToast();
}

function renderToast() {
  const el = document.getElementById("toast-area");
  if(!el) return;
  if(!S.toast){el.innerHTML="";return;}
  const bg = S.toast.type==="error"?"linear-gradient(135deg,#FF5050,#C00)":"linear-gradient(135deg,#00E5A0,#00A060)";
  el.innerHTML = `<div style="position:fixed;top:70px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;padding:10px 22px;border-radius:20px;z-index:9999;font-weight:600;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.6);animation:dg-fin .3s ease;white-space:nowrap;max-width:90vw;text-align:center;">${S.toast.msg}</div>`;
}

function openWhatsApp(p) {
  const num = (p.whatsapp_number||"").replace(/[^0-9+]/g,"");
  if(!num){showToast("⚠️ Aucun WhatsApp pour ce produit","error");return;}
  const msg = encodeURIComponent(`Bonjour 👋\nJe souhaite acquérir :\n\n📦 *${p.title}*\n💰 Prix : *${tp(p.price)} FCFA*\n\nMerci de confirmer la disponibilité et les modalités 🙏`);
  window.open(`https://wa.me/${num}?text=${msg}`,"_blank");
}

/* ───────────── TEMPLATE HELPERS ────────────────────────── */
function tEmpty(msg,sub,emoji="📭") {
  return `<div style="display:flex;flex-direction:column;align-items:center;padding:52px 24px;gap:13px;text-align:center;">
    <div style="font-size:50px;animation:dg-fl 3s ease-in-out infinite;">${emoji}</div>
    <div style="font-size:15px;font-weight:600;color:#8899BB;">${esc(msg)}</div>
    ${sub?`<div style="font-size:12px;color:#3A4A6E;line-height:1.6;">${esc(sub)}</div>`:""}
  </div>`;
}

function tShim(n=6) {
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;">${Array.from({length:n},()=>`<div class="shim" style="height:195px;border-radius:14px;"></div>`).join("")}</div>`;
}

function tBannerCard(p) {
  if(!p) return "";
  const c=tc(p.type||"");
  return `<div class="card" data-sel="${esc(p.id)}" style="width:246px;height:152px;border-radius:17px;flex-shrink:0;overflow:hidden;position:relative;${p.image_url?`background:url(${esc(p.image_url)}) center/cover`:`background:linear-gradient(135deg,${c}26,#0D1A3A)`};border:1px solid ${c}24;">
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(7,11,23,.97),rgba(7,11,23,.12) 55%,transparent);"></div>
    <div style="position:absolute;bottom:13px;left:12px;right:12px;">
      <div style="display:inline-block;background:${c}22;border:1px solid ${c}40;color:${c};border-radius:7px;padding:2px 9px;font-size:10px;font-weight:700;margin-bottom:5px;">${te(p.type)} ${esc((p.type||"").toUpperCase())}</div>
      <div style="font-size:13px;font-family:'Syne',sans-serif;font-weight:700;color:#E8EEFF;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.title||"")}</div>
      <div style="font-size:12px;color:#FFB800;font-weight:700;margin-top:4px;">${tp(p.price)} FCFA</div>
    </div>
  </div>`;
}

function tProductCard(p,idx) {
  if(!p) return "";
  const c=tc(p.type||""); const isFav=S.favs.includes(p.id);
  return `<div class="card" data-sel="${esc(p.id)}" style="background:#0D1426;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.06);animation-delay:${(idx||0)*.07}s;position:relative;">
    <div style="height:110px;position:relative;${p.image_url?`background:url(${esc(p.image_url)}) center/cover`:`background:linear-gradient(135deg,${c}18,#070B17 85%)`};display:flex;align-items:center;justify-content:center;">
      ${!p.image_url?`<span style="font-size:34px;">${te(p.type)}</span>`:""}
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,#0D1426);"></div>
      <button data-fav="${esc(p.id)}" style="position:absolute;top:7px;right:7px;width:27px;height:27px;border-radius:50%;background:rgba(7,11,23,.78);backdrop-filter:blur(6px);border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;">${isFav?"❤️":"🤍"}</button>
      <div style="position:absolute;top:7px;left:7px;background:${c}22;border:1px solid ${c}38;color:${c};border-radius:6px;padding:2px 7px;font-size:9px;font-weight:700;">${esc((p.type||"").toUpperCase())}</div>
    </div>
    <div style="padding:9px 10px 12px;">
      <div style="font-size:12px;font-family:'Syne',sans-serif;font-weight:700;color:#E8EEFF;line-height:1.35;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.title||"")}</div>
      <div style="font-size:14px;font-weight:700;color:#FFB800;">${tp(p.price)} <span style="font-size:9px;color:#5B6A90;">FCFA</span></div>
    </div>
  </div>`;
}

function tProductGrid(items) {
  if(S.loading) return tShim(6);
  if(!items||!items.length) return tEmpty("Aucun résultat","","🔎");
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;">${items.map((p,i)=>tProductCard(p,i)).join("")}</div>`;
}

function filteredP() {
  return (S.products||[]).filter(p=>(S.filter==="all"||p.type===S.filter)&&(!S.search||(p.title||"").toLowerCase().includes(S.search.toLowerCase())||(p.description||"").toLowerCase().includes(S.search.toLowerCase())));
}

/* ───────────── SPLASH ───────────────────────────────────── */
function tSplash() {
  return `<div style="position:fixed;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 40%,#0D1D40,#070B17);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:28px;overflow:hidden;">
    <div style="position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(0,212,255,.07);top:10%;left:5%;filter:blur(55px);animation:dg-fl 4.2s ease-in-out infinite;"></div>
    <div style="position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,184,0,.05);top:62%;left:62%;filter:blur:55px;animation:dg-fl 5.5s ease-in-out infinite;animation-delay:.9s;"></div>
    <div style="text-align:center;animation:dg-logo 1s cubic-bezier(.22,1,.36,1) both;animation-delay:.3s;padding:0 20px;width:100%;">
      <div style="font-size:11px;letter-spacing:.38em;color:#00D4FF;font-family:'Syne',sans-serif;font-weight:600;margin-bottom:18px;opacity:.9;">◆ PLATEFORME DIGITALE ◆</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(36px,12vw,52px);line-height:1;letter-spacing:-.01em;white-space:nowrap;">
        <span class="grad-digi">DIGI</span><span class="grad-form">FORM</span>
      </div>
      <div style="font-size:12px;color:#5B6A90;margin-top:14px;letter-spacing:.22em;animation:dg-fin .5s ease both;animation-delay:1.2s;">Savoir&nbsp; • &nbsp;Technologie&nbsp; • &nbsp;Excellence</div>
    </div>
    <div style="width:180px;height:3px;background:#0D1426;border-radius:3px;overflow:hidden;">
      <div id="sp-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#00D4FF,#FFB800);border-radius:3px;transition:width .055s linear;box-shadow:0 0 12px rgba(0,212,255,.8);"></div>
    </div>
    <div id="sp-lbl" style="font-size:10px;color:#3A4A6E;letter-spacing:.2em;">CHARGEMENT...</div>
  </div>`;
}

/* ───────────── HEADER ──────────────────────────────────── */
function tHeader() {
  const unread = getUnread();
  return `<header style="position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,11,23,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);padding:10px 14px;z-index:200;display:flex;align-items:center;justify-content:space-between;">
    <div>
      ${tLogo(21)}
      <div style="font-size:10px;color:#5B6A90;margin-top:3px;">Livres · Formations · Logiciels · Audio</div>
    </div>
    <div style="display:flex;gap:9px;">
      <button id="bell-btn" style="width:38px;height:38px;border-radius:50%;background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.22);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:17px;">🔔
        ${unread>0?`<div style="position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#FF5050;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">${unread>9?"9+":unread}</div>`:""}
      </button>

/* ───────────── SAFE RENDER ────────────────────────────── */
function safeRender() {
  try { render(); }
  catch(e) {
    console.error("render() crash:", e);
    // Fallback minimal pour ne jamais rester en écran noir
    const app = document.getElementById("app");
    if(app) app.innerHTML = `<div id="toast-area"></div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px;text-align:center;">
        <div style="font-size:40px;">⚠️</div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px;">Erreur d'affichage</div>
        <div style="color:#8899BB;font-size:13px;">${e.message||"Erreur inconnue"}</div>
        <button onclick="location.reload()" style="margin-top:8px;padding:12px 28px;background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">🔄 Recharger</button>
      </div>`;
  }
}

/* ───────────── RENDER ──────────────────────────────────── */
function render() {
  const app = document.getElementById("app");
  if(!app) return;
  app.innerHTML = `<div id="toast-area"></div>`;

  if(S.splash) { app.innerHTML += tSplash(); return; }

  let page = "";
  if(S.tab==="home")           page = tHome();
  else if(S.tab==="catalogue") page = tCatalogue();
  else if(S.tab==="favs")      page = tFavs();
  else if(S.tab==="profile")   page = tProfile();

  app.innerHTML += `
    ${S.trans ? tLoader() : ""}
    ${tHeader()}
    <main style="padding-top:68px;padding-bottom:90px;min-height:100vh;">${page}</main>
    ${tNav()}
    ${S.selected ? tProductModal(S.selected) : ""}
    ${S.notifOpen ? tNotifPanel() : ""}
    ${S.authOpen ? tAuthModal() : ""}
  `;

  renderToast();
  bindAll();
}

/* ───────────── BIND EVENTS ─────────────────────────────── */
function bindAll() {
  // tabs — boutons ET divs
  document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const t = el.dataset.tab;
    if(t) switchTab(t);
  }));
  // filter
  document.querySelectorAll("[data-filter]").forEach(el=>el.addEventListener("click",()=>{S.filter=el.dataset.filter;safeRender();}));
  // search input (catalogue) — bind via event listener, pas oninput inline
  const sinp = document.getElementById("s-inp");
  if(sinp) sinp.addEventListener("input",()=>{
    S.search=sinp.value;
    const grid=document.getElementById("cat-grid");
    if(grid){grid.innerHTML=tProductGrid(filteredP());bindCards();}
  });
  // cards
  bindCards();
  // header
  document.getElementById("bell-btn")?.addEventListener("click",()=>{S.notifOpen=true;safeRender();});
  document.getElementById("profile-btn")?.addEventListener("click",()=>{if(S.session)switchTab("profile");else openAuth();});
  // notif panel
  document.getElementById("notif-bg")?.addEventListener("click",()=>{S.notifOpen=false;safeRender();});
  document.getElementById("notif-close")?.addEventListener("click",()=>{S.notifOpen=false;safeRender();});
  document.querySelectorAll("[data-nid]").forEach(el=>el.addEventListener("click",async()=>{
    const nid=el.dataset.nid;
    await markRead(nid);
    el.style.background="transparent";
    el.style.border="1px solid rgba(255,255,255,.04)";
    el.style.cursor="default";
    el.querySelector("div[style*='background:#00D4FF']")?.remove();
  }));
  // auth
  document.getElementById("auth-bg")?.addEventListener("click",()=>{S.authOpen=false;safeRender();});
  document.getElementById("auth-cancel")?.addEventListener("click",()=>{S.authOpen=false;safeRender();});
  document.getElementById("auth-tab-login")?.addEventListener("click",()=>{S.authMode="login";S.authErr="";renderAuthInner();});
  document.getElementById("auth-tab-reg")?.addEventListener("click",()=>{S.authMode="register";S.authErr="";renderAuthInner();});
  bindAuthInner();
  // product modal
  document.getElementById("pm-bg")?.addEventListener("click",()=>{S.selected=null;safeRender();});
  document.getElementById("pm-close")?.addEventListener("click",()=>{S.selected=null;safeRender();});
  document.getElementById("pm-close2")?.addEventListener("click",()=>{S.selected=null;safeRender();});
  document.getElementById("pm-buy")?.addEventListener("click",()=>{if(!S.session){openAuth();return;}if(S.selected)openWhatsApp(S.selected);});
  // profile
  document.getElementById("go-login")?.addEventListener("click",()=>openAuth());
  document.getElementById("logout-btn")?.addEventListener("click",doLogout);
  document.getElementById("edit-btn")?.addEventListener("click",()=>{
    const area = document.getElementById("prof-edit-area");
    if(!area) return;
    const p = S.profile||{};
    area.innerHTML = `
      <div style="background:#0D1426;border-radius:16px;padding:15px;border:1px solid rgba(255,255,255,.07);margin-bottom:11px;">
        <div style="font-size:13px;font-weight:600;color:#E8EEFF;margin-bottom:11px;">✏️ Modifier le profil</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div><label style="font-size:11px;color:#5B6A90;display:block;margin-bottom:4px;">Nom complet</label><input id="pf-name" class="inp" value="${esc(p.full_name||"")}" placeholder="Votre nom"></div>
          <div><label style="font-size:11px;color:#5B6A90;display:block;margin-bottom:4px;">Téléphone</label><input id="pf-phone" class="inp" value="${esc(p.phone||"")}" placeholder="+225…"></div>
          <div style="display:flex;gap:9px;">
            <button id="pf-save" class="btn cy" style="flex:1;padding:12px;border-radius:11px;font-size:14px;">💾 Sauvegarder</button>
            <button id="pf-cancel" class="btn" style="flex:1;padding:12px;border-radius:11px;font-size:14px;background:rgba(255,255,255,.05);color:#E8EEFF;border:1px solid rgba(255,255,255,.1);">Annuler</button>
          </div>
        </div>
      </div>`;
    document.getElementById("pf-cancel")?.addEventListener("click",()=>safeRender());
    document.getElementById("pf-save")?.addEventListener("click",async()=>{
      const name=(document.getElementById("pf-name")?.value||"").trim();
      const phone=(document.getElementById("pf-phone")?.value||"").trim();
      const btn=document.getElementById("pf-save");
      if(btn){btn.disabled=true;btn.textContent="⏳…";}
      const {ok}=await db(`profiles?id=eq.${S.session.user.id}`,{method:"PATCH",body:JSON.stringify({full_name:name,phone,updated_at:new Date().toISOString()})});
      if(ok){S.profile={...S.profile,full_name:name,phone};showToast("✅ Profil mis à jour !");safeRender();}
      else{showToast("❌ Erreur","error");if(btn){btn.disabled=false;btn.textContent="💾 Sauvegarder";}}
    });
  });
}

function bindCards() {
  document.querySelectorAll("[data-sel]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const p=S.products.find(x=>x.id===el.dataset.sel);
    if(p){S.selected=p;safeRender();}
  }));
  document.querySelectorAll("[data-fav]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    if(!S.session){openAuth();return;}
    toggleFav(el.dataset.fav);
    safeRender();
  }));
}

function bindAuthInner() {
  const go = () => {
    if(S.authBusy) return;
    if(S.authMode==="login") {
      const email=(document.getElementById("a-email")?.value||"").trim();
      const pwd=document.getElementById("a-pwd")?.value||"";
      if(!email||!pwd){S.authErr="Remplissez tous les champs";renderAuthInner();return;}
      doLogin(email,pwd);
    } else {
      const name=(document.getElementById("a-name")?.value||"").trim();
      const email=(document.getElementById("a-email")?.value||"").trim();
      const pwd=document.getElementById("a-pwd")?.value||"";
      const pwd2=document.getElementById("a-pwd2")?.value||"";
      if(!name||!email||!pwd){S.authErr="Remplissez tous les champs";renderAuthInner();return;}
      if(pwd!==pwd2){S.authErr="Mots de passe différents";const el2=document.getElementById("a-pwd2");if(el2){el2.classList.add("shake");setTimeout(()=>el2.classList.remove("shake"),400);}renderAuthInner();return;}
      if(pwd.length<6){S.authErr="Mot de passe trop court (6+ car.)";renderAuthInner();return;}
      doSignup(name,email,pwd);
    }
  };
  document.getElementById("a-submit")?.addEventListener("click",go);
  document.getElementById("a-pwd")?.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  document.getElementById("a-pwd2")?.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
}

/* ───────────── INIT ─────────────────────────────────────── */
async function init() {
  // Restore session immédiatement pour éviter le splash si déjà connecté
  try{
    const raw = localStorage.getItem("dg_sess");
    if(raw){ const s=JSON.parse(raw); if(s?.access_token) S.session=s; }
  } catch(e){ console.warn("session restore error:", e); }

  // Afficher le splash seulement si pas de session rapide, sinon on pourrait le court-circuiter
  // mais on laisse le splash pour l'expérience utilisateur
  
  safeRender(); // Affiche le splash immédiatement
  
  let prog=0;
  const iv = setInterval(()=>{
    prog = Math.min(prog+2.1,100);
    const b=document.getElementById("sp-bar"), l=document.getElementById("sp-lbl");
    if(b) b.style.width=prog+"%";
    if(l) l.textContent=prog>=100?"PRÊT ✓":"CHARGEMENT...";
    if(prog>=100) clearInterval(iv);
  }, 54);

  // Timeout de sécurité : force la sortie du splash après 4s même si les loads échouent
  const splashTimeout = setTimeout(()=>{
    if(S.splash) {
      S.splash=false;
      S.loading=false;
      safeRender();
    }
  }, 4000);

  try {
    // Parallel loads avec timeout individuel
    const loads = [loadProducts(), loadNotifs()];
    if(S.session) loads.push(loadProfile(), loadReads());
    await Promise.allSettled(loads);
  } catch(e) {
    console.warn("init load error:", e);
    S.loading=false;
  }

  clearTimeout(splashTimeout);
  clearInterval(iv);
  
  // Attendre un peu pour que la barre de progression soit agréable
  await new Promise(r=>setTimeout(r, 300));
  S.splash=false;
  safeRender();
}

// Démarrer l'application immédiatement
init();
</script>
