<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIGIFORM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#070B17;color:#E8EEFF;font-family:'DM Sans',sans-serif;overscroll-behavior:none;}
#root{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden;background:#070B17;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#1E2D55;border-radius:3px;}

@keyframes dg-logo{0%{opacity:0;transform:translateY(40px) scale(.8);filter:blur(10px);}100%{opacity:1;transform:none;filter:blur(0);}}
@keyframes dg-fadein{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:none;}}
@keyframes dg-cardin{0%{opacity:0;transform:translateY(24px) scale(.96);}100%{opacity:1;transform:none;}}
@keyframes dg-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@keyframes dg-spin{to{transform:rotate(360deg);}}
@keyframes dg-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes dg-shimmer{0%{background-position:-200%;}100%{background-position:200%;}}
@keyframes dg-overlay{0%{opacity:0;}100%{opacity:1;}}
@keyframes dg-sheet{0%{transform:translateY(100%);}100%{transform:translateY(0);}}

.dg-page{animation:dg-fadein .45s cubic-bezier(.22,1,.36,1) both;}
.dg-card{animation:dg-cardin .4s cubic-bezier(.22,1,.36,1) both;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;cursor:pointer;}
.dg-card:hover{transform:translateY(-6px) scale(1.03)!important;box-shadow:0 24px 48px rgba(0,0,0,.5)!important;}
.dg-banner{animation:dg-scroll 30s linear infinite;display:flex;gap:16px;width:max-content;}
.dg-banner:hover{animation-play-state:paused;}
.dg-shimmer{background:linear-gradient(90deg,#0D1426 25%,#1E2D55 50%,#0D1426 75%);background-size:200%;animation:dg-shimmer 1.5s infinite;}
.dg-btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.dg-btn:hover{transform:translateY(-2px);}.dg-btn:active{transform:scale(.96);}
.dg-cyan{background:linear-gradient(135deg,#00D4FF,#0099FF);color:#070B17;}.dg-cyan:hover{box-shadow:0 8px 24px rgba(0,212,255,.35);}
.dg-gold{background:linear-gradient(135deg,#FFB800,#FF7A00);color:#070B17;}.dg-gold:hover{box-shadow:0 8px 24px rgba(255,184,0,.35);}
.dg-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:white;}.dg-wa:hover{box-shadow:0 8px 24px rgba(37,211,102,.35);}
.dg-nav{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 0;flex:1;background:none;border:none;font-family:'DM Sans',sans-serif;transition:opacity .2s;}
.dg-nav:hover{opacity:.8;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Constants ────────────────────────────────────────────────────────────────
const SB_URL = "https://rxhjuetoxyjrairroycb.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4aGp1ZXRveHlqcmFpcnJveWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxMjksImV4cCI6MjA5MTY3NTEyOX0.FTk6DNeI2FSsY6Eg1mKC64lj1-aS9fzTyzTlQbuGn-Q";
const TC = {livre:"#FFB800",formation:"#FF6B35",logiciel:"#00E5A0",audio:"#B04FFF"};
const TYPES = [
  {id:"all",label:"Tout",emoji:"🌐",color:"#00D4FF"},
  {id:"livre",label:"Livres",emoji:"📚",color:"#FFB800"},
  {id:"formation",label:"Formations",emoji:"🎬",color:"#FF6B35"},
  {id:"logiciel",label:"Logiciels",emoji:"💻",color:"#00E5A0"},
  {id:"audio",label:"Audio",emoji:"🎧",color:"#B04FFF"},
];

// ── State ────────────────────────────────────────────────────────────────────
const S = {
  splash:true, tab:"home", transitioning:false,
  products:[], loading:true,
  favs:(()=>{try{return JSON.parse(localStorage.getItem("dg_favs")||"[]");}catch{return [];}})(),
  selected:null, search:"", filter:"all",
  toast:null, toastTimer:null,
};

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path,opts={}){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${path}`,{...opts,headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":"application/json",Prefer:opts.method==="POST"?"return=representation":"return=minimal",...(opts.headers||{})}});
    let data=null;try{data=await r.json();}catch{}
    return{ok:r.ok,data};
  }catch(e){return{ok:false,data:null};}
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const tc=t=>TC[t]||"#00D4FF";
const te=t=>TYPES.find(x=>x.id===t)?.emoji||"📦";
const tp=p=>Number(p).toLocaleString("fr-FR");
const esc=s=>(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── Actions ──────────────────────────────────────────────────────────────────
async function loadProducts(){
  S.loading=true; render();
  const{ok,data}=await api("products?order=created_at.desc");
  if(ok&&Array.isArray(data))S.products=data;
  S.loading=false; render();
}

function switchTab(t){
  if(t===S.tab||S.transitioning)return;
  S.transitioning=true; render();
  setTimeout(()=>{S.tab=t;S.transitioning=false;render();},480);
}

function toggleFav(id){
  S.favs=S.favs.includes(id)?S.favs.filter(x=>x!==id):[...S.favs,id];
  try{localStorage.setItem("dg_favs",JSON.stringify(S.favs));}catch{}
  render();
}

function showToast(msg,type="success"){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toast={msg,type};render();
  S.toastTimer=setTimeout(()=>{S.toast=null;render();},3000);
}

function openWhatsApp(p){
  const num=(p.whatsapp_number||"").replace(/[^0-9+]/g,"");
  const msg=encodeURIComponent(`Bonjour 👋\nJe souhaite acquérir :\n\n📦 *${p.title}*\n💰 Prix : *${tp(p.price)} FCFA*\n\nMerci de confirmer la disponibilité et les modalités de paiement.`);
  window.open(`https://wa.me/${num}?text=${msg}`,"_blank");
}

function handleSearch(v){
  S.search=v;
  const grid=document.getElementById("product-grid");
  if(grid){grid.innerHTML=tProductGrid(filteredProducts());bindGridEvents(grid);}
}

function filteredProducts(){
  return S.products.filter(p=>{
    const mt=S.filter==="all"||p.type===S.filter;
    const ms=!S.search||(p.title||"").toLowerCase().includes(S.search.toLowerCase());
    return mt&&ms;
  });
}

// ── Templates ────────────────────────────────────────────────────────────────
function tShimmerGrid(n=6){
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">${Array.from({length:n},()=>`<div class="dg-shimmer" style="height:220px;border-radius:16px;"></div>`).join("")}</div>`;
}

function tEmpty(msg,sub,emoji="📭"){
  return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;gap:16px;text-align:center;">
    <div style="font-size:56px;animation:dg-float 3s ease-in-out infinite;">${emoji}</div>
    <div style="font-size:15px;font-weight:600;color:#8899BB;">${esc(msg)}</div>
    ${sub?`<div style="font-size:13px;color:#3A4A6E;">${esc(sub)}</div>`:""}
  </div>`;
}

function tBannerCard(p){
  const c=tc(p.type);
  return`<div class="dg-card" data-select="${p.id}" style="width:260px;height:165px;border-radius:20px;flex-shrink:0;overflow:hidden;position:relative;
    ${p.image_url?`background:url(${esc(p.image_url)}) center/cover`:`background:linear-gradient(135deg,${c}30,#0D1A3A)`};border:1px solid ${c}25;">
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(7,11,23,.95),rgba(7,11,23,.2) 55%,transparent);"></div>
    <div style="position:absolute;bottom:14px;left:14px;right:14px;">
      <div style="display:inline-block;background:${c}20;border:1px solid ${c}40;color:${c};border-radius:8px;padding:2px 10px;font-size:10px;font-weight:700;margin-bottom:6px;">${te(p.type)} ${esc((p.type||"").toUpperCase())}</div>
      <div style="font-size:14px;font-family:'Syne',sans-serif;font-weight:700;color:#E8EEFF;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.title)}</div>
      <div style="font-size:13px;color:#FFB800;font-weight:700;margin-top:4px;">${tp(p.price)} FCFA</div>
    </div>
  </div>`;
}

function tProductCard(p,idx){
  const c=tc(p.type);const isFav=S.favs.includes(p.id);
  return`<div class="dg-card" data-select="${p.id}" style="background:#0D1426;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.06);animation-delay:${idx*.08}s;position:relative;">
    <div style="height:120px;position:relative;${p.image_url?`background:url(${esc(p.image_url)}) center/cover`:`background:linear-gradient(135deg,${c}20,#070B17 80%)`};display:flex;align-items:center;justify-content:center;">
      ${!p.image_url?`<span style="font-size:40px;">${te(p.type)}</span>`:""}
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,#0D1426);"></div>
      <button data-fav="${p.id}" style="position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(7,11,23,.75);backdrop-filter:blur(8px);border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">${isFav?"❤️":"🤍"}</button>
      <div style="position:absolute;top:8px;left:8px;background:${c}20;border:1px solid ${c}40;color:${c};border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;">${esc((p.type||"").toUpperCase())}</div>
    </div>
    <div style="padding:10px 12px 14px;">
      <div style="font-size:13px;font-family:'Syne',sans-serif;font-weight:700;color:#E8EEFF;line-height:1.3;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.title)}</div>
      <div style="font-size:15px;font-weight:700;color:#FFB800;">${tp(p.price)} <span style="font-size:11px;color:#5B6A90;">FCFA</span></div>
    </div>
  </div>`;
}

function tProductGrid(items){
  if(S.loading)return tShimmerGrid(6);
  if(!items.length)return tEmpty("Aucun produit trouvé","","🔎");
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">${items.map((p,i)=>tProductCard(p,i)).join("")}</div>`;
}

function tHeader(){
  const map={home:["DIGIFORM","Votre bibliothèque digitale"],catalogue:["Catalogue","Explorez nos produits"],favs:["Favoris","Vos coups de cœur"]};
  const[t,sub]=map[S.tab]||map.home;
  const title=S.tab==="home"?`DIGI<span style="background:linear-gradient(135deg,#FFB800,#FF7A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">FORM</span>`:t;
  return`<header style="position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,11,23,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 20px;z-index:100;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:${S.tab==="home"?22:18}px;font-family:'Syne',sans-serif;font-weight:800;background:linear-gradient(135deg,#FFFFFF,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${title}</div>
      <div style="font-size:11px;color:#5B6A90;margin-top:2px;">${sub}</div>
    </div>
    <div style="display:flex;gap:10px;">
      <div style="width:38px;height:38px;border-radius:50%;background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.2);display:flex;align-items:center;justify-content:center;font-size:17px;">🔔</div>
      <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#00D4FF,#0099FF);display:flex;align-items:center;justify-content:center;font-size:17px;">📖</div>
    </div>
  </header>`;
}

function tBottomNav(){
  const favCount=S.products.filter(p=>S.favs.includes(p.id)).length;
  const nav=[{id:"home",emoji:"🏠",label:"Accueil"},{id:"catalogue",emoji:"🗂️",label:"Catalogue"},{id:"favs",emoji:"❤️",label:"Favoris",badge:favCount}];
  return`<nav style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,11,23,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:6px 8px 18px;display:flex;z-index:500;">
    ${nav.map(n=>`<button class="dg-nav" data-tab="${n.id}" style="color:${S.tab===n.id?"#00D4FF":"#5B6A90"};position:relative;">
      ${S.tab===n.id?`<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:2px;background:linear-gradient(90deg,#00D4FF,#0099FF);"></div>`:""}
      <div style="font-size:22px;transform:${S.tab===n.id?"scale(1.2)":"scale(1)"};transition:transform .25s cubic-bezier(.34,1.56,.64,1);">${n.emoji}</div>
      <span style="font-size:10px;font-weight:${S.tab===n.id?600:400};">${n.label}</span>
      ${n.badge>0?`<div style="position:absolute;top:8px;right:22%;width:16px;height:16px;border-radius:50%;background:#FF5050;color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;">${n.badge}</div>`:""}
    </button>`).join("")}
  </nav>`;
}

function tToast(){
  if(!S.toast)return"";
  const bg=S.toast.type==="error"?"linear-gradient(135deg,#FF5050,#CC0000)":"linear-gradient(135deg,#00E5A0,#00B070)";
  return`<div style="position:fixed;top:82px;left:50%;transform:translateX(-50%);background:${bg};color:white;padding:10px 22px;border-radius:20px;z-index:9999;font-weight:600;font-size:14px;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:dg-fadein .3s ease;white-space:nowrap;">${S.toast.msg}</div>`;
}

function tModal(p){
  const c=tc(p.type);const isFav=S.favs.includes(p.id);
  return`<div id="modal-overlay" style="position:fixed;inset:0;background:rgba(7,11,23,.85);backdrop-filter:blur(14px);z-index:1000;animation:dg-overlay .3s ease;"></div>
  <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0D1426;border-radius:24px 24px 0 0;z-index:1001;animation:dg-sheet .35s cubic-bezier(.22,1,.36,1);max-height:88vh;overflow-y:auto;border:1px solid rgba(255,255,255,.08);border-bottom:none;">
    <div style="height:220px;position:relative;${p.image_url?`background:url(${esc(p.image_url)}) center/cover`:`background:linear-gradient(135deg,${c}28,#070B17)`};display:flex;align-items:center;justify-content:center;">
      ${!p.image_url?`<span style="font-size:80px;">${te(p.type)}</span>`:""}
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,#0D1426);"></div>
      <button id="modal-close" style="position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(7,11,23,.75);backdrop-filter:blur(8px);border:none;cursor:pointer;color:#E8EEFF;font-size:18px;display:flex;align-items:center;justify-content:center;">✕</button>
      <button data-fav="${p.id}" style="position:absolute;top:16px;left:16px;width:36px;height:36px;border-radius:50%;background:rgba(7,11,23,.75);backdrop-filter:blur(8px);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">${isFav?"❤️":"🤍"}</button>
      <div style="position:absolute;bottom:16px;left:16px;background:${c}20;border:1px solid ${c}40;color:${c};border-radius:8px;padding:4px 12px;font-size:12px;font-weight:700;">${te(p.type)} ${esc((p.type||"").toUpperCase())}</div>
    </div>
    <div style="padding:20px 20px 40px;">
      <div style="font-size:22px;font-family:'Syne',sans-serif;font-weight:800;color:#E8EEFF;line-height:1.3;margin-bottom:10px;">${esc(p.title)}</div>
      ${p.description?`<div style="font-size:14px;color:#8899BB;line-height:1.8;margin-bottom:20px;">${esc(p.description)}</div>`:""}
      <div style="background:#131C35;border-radius:16px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border:1px solid rgba(255,184,0,.15);">
        <div>
          <div style="font-size:11px;color:#5B6A90;margin-bottom:4px;">Prix</div>
          <div style="font-size:28px;font-weight:800;color:#FFB800;">${tp(p.price)} <span style="font-size:14px;color:#5B6A90;">FCFA</span></div>
        </div>
        ${p.featured?`<div style="background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.3);color:#FF6B35;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:600;">🔥 Vedette</div>`:""}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <button id="modal-buy" class="dg-btn dg-wa" style="padding:16px;border-radius:14px;font-size:16px;width:100%;">💬 Acheter via WhatsApp</button>
        <button id="modal-close2" class="dg-btn" style="padding:14px;border-radius:14px;font-size:14px;width:100%;background:rgba(255,255,255,.05);color:#E8EEFF;border:1px solid rgba(255,255,255,.1);">Fermer</button>
      </div>
    </div>
  </div>`;
}

// ── Pages ────────────────────────────────────────────────────────────────────
function tHomePage(){
  const featured=S.products.filter(p=>p.featured);
  const bannerSrc=featured.length>0?featured:S.products.slice(0,5);
  const bannerItems=bannerSrc.length>0?[...bannerSrc,...bannerSrc]:[];
  const recent=S.products.slice(0,6);
  return`<div class="dg-page" style="padding:20px 16px;">
    <div style="background:linear-gradient(135deg,#0D1A3A,#0D2745 50%,#0D1A3A);border-radius:20px;padding:22px 20px;margin-bottom:24px;border:1px solid rgba(0,212,255,.1);position:relative;overflow:hidden;">
      <div style="position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(0,212,255,.06);filter:blur(30px);"></div>
      <div style="position:absolute;left:-20px;bottom:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,184,0,.05);filter:blur(30px);"></div>
      <div style="font-size:12px;color:#5B6A90;margin-bottom:4px;">Bienvenue sur</div>
      <div style="font-size:26px;font-family:'Syne',sans-serif;font-weight:800;background:linear-gradient(135deg,#FFFFFF,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;">
        DIGI<span style="background:linear-gradient(135deg,#FFB800,#FF7A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">FORM</span>
      </div>
      <div style="font-size:13px;color:#8899BB;margin-bottom:16px;">Livres · Formations · Logiciels · Audio</div>
      <div style="display:flex;gap:10px;">
        <button class="dg-btn dg-cyan" data-tab="catalogue" style="padding:10px 18px;border-radius:10px;font-size:13px;">🔍 Explorer</button>
        <button class="dg-btn dg-gold" data-tab="catalogue" style="padding:10px 18px;border-radius:10px;font-size:13px;">🔥 Tendances</button>
      </div>
    </div>

    ${bannerItems.length>0?`<div style="margin-bottom:28px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:16px;font-family:'Syne',sans-serif;font-weight:700;">🔥 À la Une</span>
        <button style="background:none;border:none;color:#00D4FF;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;" data-tab="catalogue">Voir tout →</button>
      </div>
      <div style="overflow:hidden;border-radius:20px;"><div class="dg-banner">${bannerItems.map(p=>tBannerCard(p)).join("")}</div></div>
    </div>`:""}

    <div style="margin-bottom:28px;">
      <div style="font-size:16px;font-family:'Syne',sans-serif;font-weight:700;margin-bottom:14px;">Catégories</div>
      <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;">
        ${TYPES.filter(t=>t.id!=="all").map(t=>`<div data-tab="catalogue" style="flex-shrink:0;padding:14px 18px;border-radius:16px;background:linear-gradient(135deg,${t.color}18,${t.color}06);border:1px solid ${t.color}25;text-align:center;cursor:pointer;transition:all .2s;min-width:86px;">
          <div style="font-size:28px;margin-bottom:6px;">${t.emoji}</div>
          <div style="font-size:12px;font-weight:600;color:${t.color};">${t.label}</div>
        </div>`).join("")}
      </div>
    </div>

    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <span style="font-size:16px;font-family:'Syne',sans-serif;font-weight:700;">📦 Récents</span>
        <button style="background:none;border:none;color:#00D4FF;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;" data-tab="catalogue">Voir tout →</button>
      </div>
      ${S.loading?tShimmerGrid(4):recent.length===0?tEmpty("Aucun produit pour le moment","L'admin peut en ajouter via le panneau Admin","🛍️"):`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">${recent.map((p,i)=>tProductCard(p,i)).join("")}</div>`}
    </div>
  </div>`;
}

function tCataloguePage(){
  return`<div class="dg-page" style="padding:20px 16px;">
    <div style="position:relative;margin-bottom:14px;">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;">🔍</span>
      <input id="search-input" style="background:#131C35;border:1px solid #1E2D55;border-radius:12px;color:#E8EEFF;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px 12px 42px;width:100%;outline:none;transition:border-color .2s;" placeholder="Rechercher un produit…" value="${esc(S.search)}" oninput="handleSearch(this.value)" onfocus="this.style.borderColor='#00D4FF'" onblur="this.style.borderColor='#1E2D55'" />
    </div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;">
      ${TYPES.map(t=>`<button data-filter="${t.id}" class="dg-btn" style="flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;${S.filter===t.id?`background:linear-gradient(135deg,${t.color},${t.color}99);color:#070B17;border:none;`:`background:rgba(255,255,255,.05);color:#E8EEFF;border:1px solid rgba(255,255,255,.1);`}">${t.emoji} ${t.label}</button>`).join("")}
    </div>
    <div id="product-grid">${tProductGrid(filteredProducts())}</div>
  </div>`;
}

function tFavsPage(){
  const fp=S.products.filter(p=>S.favs.includes(p.id));
  return`<div class="dg-page" style="padding:20px 16px;">
    ${fp.length===0?tEmpty("Aucun favori","Appuyez sur 🤍 pour sauvegarder","💔"):`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">${fp.map((p,i)=>tProductCard(p,i)).join("")}</div>`}
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");
  if(S.splash){
    root.innerHTML=`<div style="position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,#0D1A3A,#070B17);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:32px;">
      <div style="position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(0,212,255,.06);top:15%;left:5%;filter:blur(60px);animation:dg-float 4s ease-in-out infinite;"></div>
      <div style="position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,184,0,.05);top:65%;left:62%;filter:blur(60px);animation:dg-float 5s ease-in-out infinite;animation-delay:1s;"></div>
      <div style="position:absolute;width:130px;height:130px;border-radius:50%;background:rgba(176,79,255,.05);top:45%;left:35%;filter:blur(60px);animation:dg-float 3s ease-in-out infinite;animation-delay:2s;"></div>
      <div style="text-align:center;animation:dg-logo .9s cubic-bezier(.22,1,.36,1) both;animation-delay:.2s;">
        <div style="font-size:13px;letter-spacing:.3em;color:#00D4FF;font-family:'Syne',sans-serif;font-weight:600;margin-bottom:14px;opacity:.7;">◆ PLATEFORME DIGITALE ◆</div>
        <div style="font-size:56px;font-family:'Syne',sans-serif;font-weight:800;background:linear-gradient(135deg,#FFFFFF 30%,#00D4FF 65%,#FFB800 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em;line-height:1;">
          DIGI<span style="background:linear-gradient(135deg,#FFB800,#FF7A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">FORM</span>
        </div>
        <div style="font-size:12px;color:#5B6A90;margin-top:14px;letter-spacing:.18em;animation:dg-fadein .6s ease both;animation-delay:.9s;">Savoir  •  Technologie  •  Excellence</div>
      </div>
      <div style="width:200px;height:3px;background:#0D1426;border-radius:3px;overflow:hidden;">
        <div id="splash-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#00D4FF,#FFB800);border-radius:3px;transition:width .06s linear;box-shadow:0 0 10px rgba(0,212,255,.6);"></div>
      </div>
      <div id="splash-label" style="font-size:11px;color:#3A4A6E;letter-spacing:.12em;">CHARGEMENT...</div>
    </div>`;
    return;
  }

  let page="";
  if(S.tab==="home")page=tHomePage();
  else if(S.tab==="catalogue")page=tCataloguePage();
  else if(S.tab==="favs")page=tFavsPage();

  root.innerHTML=`
    ${S.transitioning?`<div style="position:fixed;inset:0;background:rgba(7,11,23,.88);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5000;animation:dg-overlay .2s ease;">
      <div style="position:relative;width:56px;height:56px;">
        <div style="position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top:2px solid #00D4FF;animation:dg-spin .8s linear infinite;"></div>
        <div style="position:absolute;inset:8px;border-radius:50%;border:2px solid transparent;border-top:2px solid #FFB800;animation:dg-spin 1.2s linear infinite reverse;"></div>
        <div style="position:absolute;inset:16px;border-radius:50%;border:2px solid transparent;border-top:2px solid #FF6B35;animation:dg-spin 1.6s linear infinite;"></div>
      </div>
      <div style="font-size:11px;letter-spacing:.3em;color:#5B6A90;margin-top:18px;font-family:'Syne',sans-serif;">CHARGEMENT…</div>
    </div>`:""}
    ${tToast()}${tHeader()}
    <main style="padding-top:72px;padding-bottom:90px;min-height:100vh;">${page}</main>
    ${tBottomNav()}
    ${S.selected?tModal(S.selected):""}
  `;
  bindEvents();
}

function bindGridEvents(container){
  container.querySelectorAll("[data-select]").forEach(el=>{
    el.addEventListener("click",()=>{const p=S.products.find(x=>x.id===el.dataset.select);if(p){S.selected=p;render();}});
  });
  container.querySelectorAll("[data-fav]").forEach(el=>{
    el.addEventListener("click",e=>{e.stopPropagation();toggleFav(el.dataset.fav);});
  });
}

function bindEvents(){
  document.querySelectorAll("[data-tab]").forEach(el=>{
    el.addEventListener("click",e=>{e.stopPropagation();switchTab(el.dataset.tab);});
  });
  document.querySelectorAll("[data-fav]").forEach(el=>{
    el.addEventListener("click",e=>{e.stopPropagation();toggleFav(el.dataset.fav);});
  });
  document.querySelectorAll("[data-select]").forEach(el=>{
    el.addEventListener("click",()=>{const p=S.products.find(x=>x.id===el.dataset.select);if(p){S.selected=p;render();}});
  });
  document.querySelectorAll("[data-filter]").forEach(el=>{
    el.addEventListener("click",()=>{S.filter=el.dataset.filter;render();});
  });
  const ov=document.getElementById("modal-overlay");if(ov)ov.addEventListener("click",()=>{S.selected=null;render();});
  const mc=document.getElementById("modal-close");if(mc)mc.addEventListener("click",()=>{S.selected=null;render();});
  const mc2=document.getElementById("modal-close2");if(mc2)mc2.addEventListener("click",()=>{S.selected=null;render();});
  const mb=document.getElementById("modal-buy");if(mb)mb.addEventListener("click",()=>{if(S.selected)openWhatsApp(S.selected);});
}

// ── Init ─────────────────────────────────────────────────────────────────────
function init(){
  render();
  let progress=0;
  const iv=setInterval(()=>{
    progress=Math.min(progress+2.2,100);
    const bar=document.getElementById("splash-bar");
    const lbl=document.getElementById("splash-label");
    if(bar)bar.style.width=progress+"%";
    if(lbl)lbl.textContent=progress>=100?"PRÊT":"CHARGEMENT...";
    if(progress>=100)clearInterval(iv);
  },60);
  setTimeout(()=>{S.splash=false;render();},3200);
  loadProducts();
}

init();
</script>
</body>
</html>
